<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RockNRoad · Aventures · Carnet 2025</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">











<style>

/* AUTH SCREEN */
#auth-check{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#0a1a0c,#2C5016 50%,#C8A84B);
  display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;text-align:center;padding:20px;}
#auth-check .aicon{font-size:48px;margin-bottom:8px;}
#auth-check h2{font-family:'Playfair Display',serif;font-size:26px;margin:8px 0 6px;}
#auth-check p{font-size:12px;opacity:.6;letter-spacing:2px;}
.auth-spinner{width:36px;height:36px;border:3px solid rgba(200,168,75,.3);border-top-color:#C8A84B;
  border-radius:50%;animation:spin 1s linear infinite;margin:18px auto 0;}
@keyframes spin{to{transform:rotate(360deg)}}
#main-content{display:none;}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --sb:215px;--gold:#C8A84B;--dark:#0f0d09;--dark2:#161410;
  --creme:#F7F3EC;--beige:#EDE6D8;--text:#1a1208;--muted:#6B5F4A;
  --pyr:#2C5016;--atl:#1a5a7a;--bou:#6B3288;
  --sh:0 2px 12px rgba(0,0,0,.07);--shhov:0 8px 28px rgba(0,0,0,.13);--r:10px;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--dark);color:var(--text);display:flex;min-height:100vh;overflow-x:hidden;}

/* ── SIDEBAR ── */
#sidebar{
  grid-row:1/4;grid-column:1;
  background:rgba(15,13,9,.95);
  border-right:1px solid rgba(200,168,75,.1);
  display:flex;flex-direction:column;
  padding:0;
  position:relative;z-index:10;
}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(200,168,75,.08);cursor:pointer;}
.sb-logo-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:white;line-height:1;}
.sb-logo-title span{color:var(--gold);}
.sb-logo-sub{font-size:7px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:rgba(200,168,75,.4);margin-top:3px;}
.sb-nav{flex:1;padding:12px 0;display:flex;flex-direction:column;gap:2px;overflow-y:auto;scrollbar-width:none;}
.sb-nav::-webkit-scrollbar{display:none;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 8px;cursor:pointer;transition:all .2s;border-radius:8px;margin:0 8px;text-decoration:none;}
.sb-item:hover{background:rgba(200,168,75,.07);}
.sb-item.active{background:rgba(200,168,75,.1);}
.sb-icon{width:22px;height:22px;color:rgba(255,255,255,.4);transition:color .2s;flex-shrink:0;}
.sb-item:hover .sb-icon,.sb-item.active .sb-icon{color:var(--gold);}
.sb-item-label{font-size:8.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.35);transition:color .2s;text-align:center;}
.sb-item:hover .sb-item-label,.sb-item.active .sb-item-label{color:var(--gold);}
.sb-sep-icon{height:1px;background:rgba(200,168,75,.07);margin:6px 16px;}
.sb-footer{padding:14px 16px 16px;border-top:1px solid rgba(200,168,75,.07);}
.sb-quote{font-family:'Playfair Display',serif;font-size:9.5px;font-style:italic;color:rgba(200,168,75,.45);text-align:center;line-height:1.6;margin-bottom:12px;}
.sb-compass{width:60px;height:60px;margin:0 auto;display:block;opacity:.4;}

/* ── HERO MAP ── */
#hero{
  grid-row:1;grid-column:2;
  position:relative;overflow:hidden;
}
#hero-bg{
  position:absolute;inset:0;
  background:
    url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=80') center/cover no-repeat;
  transform:scale(1.05);
  animation:slowzoom 30s ease-in-out infinite alternate;
}
@keyframes slowzoom{from{transform:scale(1.05);}to{transform:scale(1.12);}}
#hero-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(to right, rgba(15,13,9,.5) 0%, rgba(15,13,9,.1) 50%, rgba(15,13,9,.6) 100%),
    linear-gradient(to bottom, rgba(15,13,9,.3) 0%, transparent 40%, rgba(15,13,9,.4) 100%);
}

/* Header */
#hero-header{
  position:absolute;top:0;left:0;right:0;
  padding:24px 28px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:3;
}
.hero-greeting h1{
  font-family:'Playfair Display',serif;
  font-size:32px;font-weight:700;color:white;line-height:1.1;
}
.hero-greeting p{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-style:italic;color:var(--cream-dim);margin-top:4px;
}
.hero-actions{display:flex;align-items:center;gap:12px;}
.avatars{display:flex;}
.avatar{width:34px;height:34px;border-radius:50%;border:2px solid rgba(200,168,75,.6);overflow:hidden;margin-left:-8px;background:var(--dark-3);}
.avatar:first-child{margin-left:0;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.btn-share{
  padding:9px 18px;background:var(--gold);color:var(--dark);
  border:none;border-radius:20px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.5px;
  display:flex;align-items:center;gap:7px;transition:all .2s;
  white-space:nowrap;
}
.btn-share:hover{background:var(--gold-light);transform:translateY(-1px);}

/* SVG Route */
#route-svg{position:absolute;inset:0;z-index:2;pointer-events:none;}

/* Markers */
.marker{
  position:absolute;z-index:3;
  display:flex;align-items:center;gap:8px;
  transform:translate(-50%,-50%);
  cursor:pointer;
}
.marker-circle{
  width:32px;height:32px;border-radius:50%;
  background:var(--dark-2);border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:13px;font-weight:700;
  color:var(--gold);flex-shrink:0;
  box-shadow:0 0 20px rgba(200,168,75,.3);
  transition:all .25s;
}
.marker:hover .marker-circle{background:var(--gold);color:var(--dark);transform:scale(1.15);}
.marker.active .marker-circle{background:var(--gold);color:var(--dark);box-shadow:0 0 30px rgba(200,168,75,.5);}
.marker-label{
  font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;
  color:white;text-shadow:0 1px 8px rgba(0,0,0,.8);white-space:nowrap;
}
.marker-sub{font-size:10px;color:var(--cream-dim);font-style:normal;display:block;}

/* Citation sur la carte */
#map-citation{
  position:absolute;left:28px;bottom:28px;z-index:3;
  max-width:220px;
}
#map-citation p{
  font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;
  color:rgba(245,239,224,.7);line-height:1.6;text-shadow:0 1px 8px rgba(0,0,0,.6);
}

/* ── RIGHT PANEL ── */
#panel{
  grid-row:1;grid-column:3;
  background:rgba(20,17,12,.88);
  border-left:1px solid rgba(200,168,75,.12);
  backdrop-filter:blur(24px);
  display:flex;flex-direction:column;
  overflow-y:auto;scrollbar-width:none;
}
#panel::-webkit-scrollbar{display:none;}

.panel-etape-header{
  padding:16px 20px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.panel-etape-label{
  font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);
  display:flex;align-items:center;gap:5px;
}
.panel-etape-label::before{content:'📍';font-size:10px;}
.panel-etape-dots{display:flex;gap:4px;}
.panel-dot{width:5px;height:5px;border-radius:50%;background:rgba(200,168,75,.2);}
.panel-dot.active{background:var(--gold);width:14px;border-radius:3px;}

.panel-photo{
  margin:14px 20px 0;border-radius:10px;overflow:hidden;
  height:170px;position:relative;flex-shrink:0;
}
.panel-photo-img{
  width:100%;height:100%;
  background:url('https://images.unsplash.com/photo-1510672981848-a1c4f1cb5ccf?w=700&q=80') center/cover;
}
.panel-photo-badge{
  position:absolute;top:10px;left:10px;
  background:rgba(15,13,9,.75);backdrop-filter:blur(8px);
  border:1px solid rgba(200,168,75,.25);
  padding:4px 10px;border-radius:20px;
  font-size:9px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--gold);
}

.panel-body{padding:14px 20px;flex:1;}
.panel-etape-num{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--gold);margin-bottom:3px;}
.panel-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:white;line-height:1.2;margin-bottom:8px;}
.panel-desc{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--cream-dim);line-height:1.6;margin-bottom:14px;}

.panel-meta{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.panel-meta-row{display:flex;align-items:center;gap:10px;}
.panel-meta-icon{width:20px;height:20px;opacity:.6;flex-shrink:0;}
.panel-meta-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(200,168,75,.6);min-width:70px;}
.panel-meta-val{font-size:12px;color:var(--cream-dim);}

.panel-weather{
  display:flex;gap:10px;margin-bottom:14px;
  padding:10px 14px;background:rgba(200,168,75,.05);
  border-radius:8px;border:1px solid rgba(200,168,75,.1);
}
.panel-weather-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--cream-dim);}
.panel-weather-item span{font-size:15px;}

.panel-journal{
  padding:12px 14px;background:rgba(200,168,75,.04);
  border-radius:8px;border:1px solid rgba(200,168,75,.08);
  margin-bottom:12px;
}
.panel-journal-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.panel-journal-text{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--cream-dim);line-height:1.6;}

.panel-photos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.panel-photo-thumb{border-radius:6px;overflow:hidden;aspect-ratio:4/3;}
.panel-photo-thumb div{width:100%;height:100%;background-size:cover!important;background-position:center!important;transition:transform .3s;}
.panel-photo-thumb:hover div{transform:scale(1.08);}

/* ── STATS BAR ── */
#stats-bar{
  grid-row:2;grid-column:2/4;
  background:rgba(10,8,5,.95);
  border-top:1px solid rgba(200,168,75,.1);
  display:flex;align-items:center;
  padding:0 28px;
  gap:0;
  position:relative;z-index:5;
}
.stats-quote{
  flex:1;
  font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;
  color:rgba(200,168,75,.5);line-height:1.4;padding-right:28px;
  border-right:1px solid rgba(200,168,75,.1);
}
.stats-items{display:flex;gap:0;flex:2;}
.stat-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 20px;border-right:1px solid rgba(200,168,75,.08);gap:3px;
}
.stat-item:last-child{border-right:none;}
.stat-icon{font-size:18px;opacity:.7;margin-bottom:2px;}
.stat-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);line-height:1;}
.stat-label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(200,168,75,.4);}
.stats-badge{
  width:58px;height:58px;border-radius:50%;
  border:1.5px solid rgba(200,168,75,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin-left:20px;flex-shrink:0;
}
.stats-badge-rnr{font-family:'Playfair Display',serif;font-size:13px;font-weight:900;color:var(--gold);letter-spacing:1px;}
.stats-badge-sub{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(200,168,75,.4);}

/* ── CARDS ITINÉRAIRE ── */
#itineraire{
  grid-row:3;grid-column:2/4;
  background:rgba(15,13,9,.97);
  border-top:1px solid rgba(200,168,75,.08);
  padding:14px 0;
  position:relative;z-index:5;
}
.itin-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;margin-bottom:12px;
}
.itin-title{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.itin-link{font-size:11px;color:rgba(200,168,75,.5);cursor:pointer;transition:color .2s;display:flex;align-items:center;gap:4px;}
.itin-link:hover{color:var(--gold);}

.itin-track{
  display:flex;gap:10px;padding:0 28px;
  overflow-x:auto;scrollbar-width:none;
  padding-bottom:4px;
}
.itin-track::-webkit-scrollbar{display:none;}

/* Timeline line */
.itin-timeline{
  position:absolute;bottom:24px;left:28px;right:28px;
  height:2px;background:rgba(200,168,75,.1);
}
.itin-progress{
  height:100%;background:linear-gradient(to right, var(--gold), rgba(200,168,75,.3));
  width:37%;border-radius:1px;
}
.itin-timeline-dots{
  position:absolute;top:50%;transform:translateY(-50%);
  width:100%;display:flex;justify-content:space-between;padding:0 0;
}
.itin-tdot{width:7px;height:7px;border-radius:50%;background:rgba(200,168,75,.2);border:1.5px solid rgba(200,168,75,.3);flex-shrink:0;}
.itin-tdot.done{background:var(--gold);border-color:var(--gold);}
.itin-tdot.active{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(200,168,75,.5);width:10px;height:10px;}

.card-stop{
  flex-shrink:0;width:140px;border-radius:10px;overflow:hidden;
  position:relative;cursor:pointer;transition:all .25s;
  border:2px solid transparent;height:100px;
}
.card-stop:hover{transform:translateY(-3px);border-color:rgba(200,168,75,.3);}
.card-stop.active{border-color:var(--gold);box-shadow:0 0 20px rgba(200,168,75,.25);}
.card-stop-bg{width:100%;height:100%;background-size:cover!important;background-position:center!important;position:relative;}
.card-stop-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(0,0,0,.65) 100%);}
.card-stop-jour{position:absolute;top:8px;left:9px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(200,168,75,.9);}
.card-stop-info{position:absolute;bottom:8px;left:9px;right:9px;}
.card-stop-city{font-size:13px;font-weight:700;color:white;line-height:1.1;}
.card-stop-region{font-size:9px;color:rgba(245,239,224,.6);margin-top:1px;}

/* Nav arrows */
.itin-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.2);
  color:var(--gold);width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;transition:all .2s;z-index:2;
}
.itin-nav:hover{background:rgba(200,168,75,.2);}
#itin-prev{left:4px;top:60px;}
#itin-next{right:368px;top:60px;}

/* ── ANIMATIONS ── */
@keyframes fadeup{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fadeup{animation:fadeup .6s ease forwards;}
.fadeup-2{animation:fadeup .6s .15s ease forwards;opacity:0;}
.fadeup-3{animation:fadeup .6s .3s ease forwards;opacity:0;}
.fadeup-4{animation:fadeup .6s .45s ease forwards;opacity:0;}

/* Route SVG animation */
.sb-user{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;background:rgba(255,255,255,.03);margin-bottom:6px;}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:var(--gold);color:var(--dark);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.sb-user-name{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.sb-user-role{font-size:9.5px;color:rgba(255,255,255,.4);margin-top:1px;}
.sb-logout{width:100%;padding:6px;background:rgba(200,168,75,.06);border:1px solid rgba(200,168,75,.2);color:rgba(200,168,75,.75);font-size:10px;font-weight:600;letter-spacing:1px;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.sb-logout:hover{background:rgba(200,168,75,.14);color:var(--gold);}
.sb-quote{font-family:'Playfair Display',serif;font-size:10px;font-style:italic;color:rgba(200,168,75,.45);text-align:center;line-height:1.5;margin-bottom:10px;}
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:190;}
.sb-sub{display:none;flex-direction:column;padding-left:8px;margin-top:2px;}
.sb-sub.open{display:flex;}
.sb-sub-btn{display:flex;align-items:center;gap:7px;width:100%;padding:6px 10px;background:none;border:none;color:rgba(245,239,224,.45);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .15s;text-align:left;text-decoration:none;}
.sb-sub-btn:hover{background:rgba(200,168,75,.06);color:rgba(245,239,224,.75);}
.sb-sub-btn.active{color:var(--gold);background:rgba(200,168,75,.1);}
.sb-dot-pyr{background:var(--pyr);}
.sb-dot-atl{background:var(--atl);}
.sb-dot-bou{background:var(--bou);}
.sb-arrow{margin-left:auto;font-size:9px;transition:transform .2s;color:rgba(255,255,255,.2);}

/* APP MAIN */
#app-main{margin-left:120px;width:calc(100vw - var(--sb));min-height:100vh;background:var(--creme);display:flex;flex-direction:column;overflow-x:hidden;}
#top-bar{background:rgba(22,20,16,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,168,75,.15);padding:0 28px;height:46px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.top-bar-title{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--gold);}
#sb-toggle{display:none;background:none;border:none;color:rgba(255,255,255,.85);font-size:20px;cursor:pointer;}
.top-voyage-btn{display:none;align-items:center;gap:6px;background:var(--dark);color:var(--gold);font-size:10.5px;font-weight:700;padding:6px 14px;border-radius:20px;border:none;cursor:pointer;transition:all .2s;}
.top-voyage-btn.visible{display:flex;}
.top-voyage-btn:hover{background:var(--gold);color:var(--dark);}

/* SECTIONS */
.section{display:none;flex:1;}
.section.active{display:block;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.inner{max-width:1600px;margin:0 auto;padding:24px 32px 80px;}

/* HERO */
.hero{width:100%;min-height:50vh;background:linear-gradient(155deg,#0a1a0c 0%,#1a3a10 30%,#2C5016 58%,#5a2808 82%,#C8A84B 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px 34px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 70%,rgba(200,168,75,.08),transparent 55%),radial-gradient(ellipse at 75% 30%,rgba(44,110,138,.06),transparent 55%);}

/* SECTION HEADER COMPACT */
.sh-compact{border-radius:10px;padding:16px 22px;color:white;margin:20px 28px 0;position:relative;overflow:hidden;}
.sh-compact::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.03) 1px,transparent 1px);background-size:22px 22px;}
.sh-pyr{background:linear-gradient(135deg,#0a1a0c,#2C5016);}
.sh-atl{background:linear-gradient(135deg,#041420,#1a5a7a);}
.sh-bou{background:linear-gradient(135deg,#160820,#6B3288);}
.sh-title{font-family:'Playfair Display',serif;font-size:20px;position:relative;margin-bottom:3px;}
.sh-meta{font-size:10.5px;opacity:.5;position:relative;}
.sh-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;position:relative;}
.sh-tag{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);padding:2px 9px;border-radius:20px;font-size:9px;font-weight:500;}

/* SECTION TITLE */
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:5px;margin-top:22px;}
.sec-head::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--beige),transparent);}
.sec-head-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);white-space:nowrap;}
.sec-sub{font-size:11.5px;color:var(--muted);margin-bottom:16px;}
.notice{background:rgba(200,168,75,.07);border:1px solid rgba(200,168,75,.18);border-radius:8px;padding:10px 14px;font-size:12px;color:#5a4a32;line-height:1.65;margin-bottom:18px;}
.notice strong{color:var(--text);}
.divl{clear:both;position:relative;z-index:1;margin-bottom:14px;margin-top:8px;}
.divl-t{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:10px;}
.divl-t::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--beige),transparent);}

/* GRIDS 4 colonnes */
.sites-grid,.camps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:16px;}

/* SITE CARD */
.site-card{background:white;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;}
.site-card:hover{transform:translateY(-3px);box-shadow:var(--shhov);}
.site-photo{height:200px;background:#d4cbb8;background-size:cover!important;background-position:center!important;position:relative;flex-shrink:0;}
.site-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6),transparent 50%);}
.site-overlay{position:absolute;bottom:7px;left:9px;right:9px;z-index:2;}
.type-badge{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.85);}
.site-emoji{display:none!important;}
.site-body{padding:16px;display:flex;flex-direction:column;flex:1;}
.site-name{font-family:'Playfair Display',serif;font-size:15.5px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.25;}
.site-desc{font-size:11.5px;color:var(--muted);line-height:1.55;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.dog-tag{display:inline-flex;align-items:center;gap:3px;background:#edf7ed;color:#2C5016;font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;margin-bottom:4px;border:1px solid rgba(44,80,22,.1);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dog-photo-badge{position:absolute;top:8px;right:9px;z-index:3;display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:700;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);white-space:nowrap;box-shadow:0 1px 6px rgba(0,0,0,.3);}
.dog-photo-badge.yes{background:rgba(44,80,22,.82);color:#b8f0b0;}
.dog-photo-badge.no{background:rgba(180,40,0,.82);color:#ffd0c0;}
.dog-photo-badge.na{background:rgba(60,50,20,.75);color:#f5d98a;}
.dog-info-box{font-size:10px;color:#2C5016;background:#f0faf0;border-left:2px solid #2C5016;padding:4px 8px;border-radius:0 5px 5px 0;margin-bottom:6px;line-height:1.45;font-style:italic;}
.dog-info-box.no{color:#cc4400;background:#fff3ee;border-left-color:#cc4400;}
.dog-info-box.na{color:#8B6914;background:#fffbe8;border-left-color:#C8A84B;}
.conseil-box{background:rgba(200,168,75,.06);border-left:2px solid rgba(200,168,75,.35);padding:5px 8px;font-size:10.5px;color:var(--muted);line-height:1.45;border-radius:0 4px 4px 0;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.site-actions-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto;padding-top:7px;}
.maps-btn{display:inline-flex;align-items:center;gap:3px;background:var(--text);color:var(--gold);font-size:9.5px;font-weight:700;padding:5px 10px;border-radius:5px;border:none;cursor:pointer;text-decoration:none;transition:all .15s;}
.maps-btn:hover{background:#333;}
.google-btn{display:inline-flex;align-items:center;gap:3px;background:#fff8e8;border:1px solid rgba(200,168,75,.28);color:#8B6914;font-size:9.5px;font-weight:600;padding:5px 9px;border-radius:5px;text-decoration:none;cursor:pointer;transition:all .15s;}
.google-btn:hover{background:#fef0c0;}
.voyage-add-btn{display:inline-flex;align-items:center;gap:3px;background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.2);color:#8B6914;font-size:9.5px;font-weight:700;padding:5px 9px;border-radius:5px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.voyage-add-btn:hover{background:rgba(200,168,75,.18);}
.voyage-add-btn.in-voyage{background:#2C5016!important;color:white!important;border-color:#2C5016!important;}

/* CAMP CARD */
.camp-card{background:white;border-radius:var(--r);padding:14px;box-shadow:var(--sh);border-top:3px solid var(--beige);transition:all .2s;display:flex;flex-direction:column;}
.camp-card:hover{transform:translateY(-2px);box-shadow:var(--shhov);}
.camp-card.coup-coeur{border-top-color:var(--gold);}
.camp-header{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:3px;}
.camp-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;flex:1;}
.camp-stars,.camp-note{background:#2C5016;color:white;font-size:8.5px;font-weight:800;padding:2px 7px;border-radius:4px;flex-shrink:0;}
.camp-lieu{font-size:9.5px;color:#999;margin-bottom:5px;}
.camp-desc{font-size:10.5px;color:var(--muted);line-height:1.45;margin-bottom:7px;}
.camp-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.camp-tag{background:#f5f0e8;color:#5a4a32;font-size:8px;font-weight:600;padding:2px 6px;border-radius:8px;}
.camp-footer{display:flex;align-items:center;flex-wrap:wrap;gap:5px;border-top:1px solid #f5f0e8;padding-top:8px;margin-top:auto;}
.tel-btn{font-size:10.5px;font-weight:600;color:var(--atl);text-decoration:none;}
.tel-btn:hover{color:#0d3d5a;}
.web-btn{display:inline-flex;align-items:center;gap:3px;background:#f0f4ff;border:1px solid #c0d0f0;color:#2a5aaa;font-size:8.5px;font-weight:700;padding:4px 8px;border-radius:5px;text-decoration:none;transition:all .15s;}
.web-btn:hover{background:#dce8ff;}
.camp-voyage-btn,.voyage-add-btn.camp-voyage{display:inline-flex;align-items:center;gap:3px;background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.2);color:#8B6914;font-size:8.5px;font-weight:700;padding:4px 8px;border-radius:5px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;margin-left:auto;}
.camp-voyage-btn:hover{background:rgba(200,168,75,.18);}
.camp-voyage-btn.in-voyage{background:#2C5016!important;color:white!important;border-color:#2C5016!important;}

/* CARD NUIT — Monde 2 : Où on dort */
.nuit-section-header{display:flex;align-items:center;gap:12px;margin:32px 0 6px;padding:14px 18px;
  background:linear-gradient(135deg,#1E1B14,#2a2318);border-radius:10px;border-left:3px solid var(--gold);}
.nuit-section-header .nuit-icon{font-size:22px;}
.nuit-section-header .nuit-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gold);}
.nuit-section-header .nuit-count{font-size:11px;color:rgba(200,168,75,.6);margin-left:auto;}
.nuit-divider{height:1px;background:linear-gradient(90deg,rgba(200,168,75,.3),transparent);margin:8px 0 16px;}

.nuit-card{background:#1E1B14;border-radius:var(--r);overflow:hidden;
  box-shadow:0 2px 14px rgba(0,0,0,.25);border:1px solid rgba(200,168,75,.18);
  transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;}
.nuit-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.35);border-color:rgba(200,168,75,.35);}
.nuit-photo{height:180px;background:#2a2318;background-size:cover!important;background-position:center!important;position:relative;flex-shrink:0;}
.nuit-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7),transparent 50%);}
.nuit-overlay{position:absolute;bottom:7px;left:9px;right:9px;z-index:2;}
.nuit-type-badge{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(200,168,75,.9);}
.nuit-body{padding:14px 16px;display:flex;flex-direction:column;flex:1;}
.nuit-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--creme);margin-bottom:4px;line-height:1.25;}
.nuit-sous-region{font-size:10px;color:rgba(200,168,75,.6);margin-bottom:6px;}
.nuit-desc{font-size:11px;color:rgba(245,239,224,.55);line-height:1.5;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.nuit-amenities{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.nuit-amenity{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:10px;
  background:rgba(200,168,75,.1);color:rgba(200,168,75,.85);border:1px solid rgba(200,168,75,.15);}
.nuit-dog{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:10px;}
.nuit-dog.yes{background:rgba(44,80,22,.4);color:#7dd87d;}
.nuit-dog.no{background:rgba(180,40,0,.4);color:#f08070;}
.nuit-dog.na{background:rgba(139,105,20,.3);color:#e5c96a;}
.nuit-notes{font-size:10px;color:rgba(200,168,75,.6);font-style:italic;border-left:2px solid rgba(200,168,75,.2);
  padding-left:6px;margin-bottom:8px;line-height:1.4;}
.nuit-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto;padding-top:8px;border-top:1px solid rgba(200,168,75,.08);}
.nuit-maps-btn{display:inline-flex;align-items:center;gap:3px;background:rgba(200,168,75,.15);
  color:var(--gold);font-size:9.5px;font-weight:700;padding:5px 10px;border-radius:5px;
  border:1px solid rgba(200,168,75,.25);text-decoration:none;transition:all .15s;}
.nuit-maps-btn:hover{background:rgba(200,168,75,.3);}
.nuit-voyage-btn{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-size:9.5px;font-weight:700;
  padding:5px 9px;border-radius:5px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.nuit-voyage-btn:hover{background:rgba(255,255,255,.12);color:white;}
.nuit-voyage-btn.in-voyage{background:#2C5016!important;color:white!important;border-color:#2C5016!important;}
/* MODALE ÉDITION INLINE */
#edit-overlay{position:fixed;inset:0;background:rgba(15,13,9,.88);z-index:3000;
  display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
#edit-overlay.open{display:flex;}
#edit-modal{background:white;border-radius:16px;width:100%;max-width:560px;max-height:90vh;
  overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.5);}
.em-header{padding:20px 24px 16px;border-bottom:1px solid #f0ece4;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1;}
.em-title{font-family:'Playfair Display',serif;font-size:18px;color:#1a1208;}
.em-close{background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;padding:4px;}
.em-close:hover{color:#333;}
.em-body{padding:20px 24px;}
.em-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.em-fg{display:flex;flex-direction:column;gap:5px;}
.em-fg.full{grid-column:1/-1;}
.em-label{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;}
.em-input,.em-select,.em-textarea{width:100%;padding:9px 11px;border:1.5px solid #e8dece;border-radius:8px;
  font-family:'Inter',sans-serif;font-size:13px;color:#1a1208;outline:none;transition:border-color .2s;}
.em-input:focus,.em-select:focus,.em-textarea:focus{border-color:var(--gold);}
.em-textarea{resize:vertical;min-height:70px;font-size:12px;}
.em-stars{display:flex;gap:4px;margin-top:2px;}
.em-star{font-size:20px;cursor:pointer;color:#ddd;transition:color .15s;}
.em-star.on{color:#C8A84B;}
.em-dog-row{display:flex;gap:6px;margin-top:2px;}
.em-dog-btn{flex:1;padding:7px;border-radius:7px;border:1.5px solid #e8dece;background:white;
  font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
.em-dog-btn.active-yes{background:#e8f4e8;border-color:#2C5016;color:#2C5016;}
.em-dog-btn.active-no{background:#ffe8e0;border-color:#cc4400;color:#cc4400;}
.em-dog-btn.active-na{background:#fffbe8;border-color:#C8A84B;color:#8B6914;}
.em-footer{padding:16px 24px;border-top:1px solid #f0ece4;display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:white;}
.em-btn-save{padding:10px 24px;background:#1a1208;color:#C8A84B;border:none;border-radius:8px;
  font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.em-btn-save:hover{background:var(--gold);color:#1a1208;}
.em-btn-save:disabled{opacity:.5;cursor:not-allowed;}
.em-btn-del{padding:10px 16px;background:rgba(200,50,0,.08);color:#cc4400;border:1px solid rgba(200,50,0,.2);
  border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.em-btn-del:hover{background:rgba(200,50,0,.15);}

/* LIGHTBOX PHOTOS */
#lightbox{position:fixed;inset:0;background:rgba(15,13,9,.82);z-index:4000;
  display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
#lightbox.open{display:flex;}
#lightbox-inner{background:#1a1710;border-radius:14px;overflow:hidden;
  max-width:720px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.6);position:relative;}
#lightbox-main{width:100%;height:420px;background-size:cover!important;background-position:center!important;position:relative;}
#lightbox-title{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;
  background:linear-gradient(transparent,rgba(0,0,0,.7));
  font-family:'Playfair Display',serif;font-size:16px;color:white;font-weight:700;}
#lightbox-counter{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.5);
  color:white;font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;}
#lightbox-thumbs{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;background:#141210;scrollbar-width:thin;scrollbar-color:rgba(200,168,75,.3) transparent;}
.lb-thumb{width:72px;height:52px;border-radius:6px;background-size:cover!important;background-position:center!important;
  cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:all .2s;opacity:.7;}
.lb-thumb:hover{opacity:1;}
.lb-thumb.active{border-color:var(--gold);opacity:1;}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);
  color:white;border:none;width:36px;height:36px;border-radius:50%;font-size:16px;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.lb-nav:hover{background:rgba(200,168,75,.7);}
#lb-prev{left:10px;}
#lb-next{right:10px;}
#lightbox-close{position:absolute;top:10px;left:12px;background:rgba(0,0,0,.5);color:white;
  border:none;width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:1;}
#lightbox-close:hover{background:rgba(200,50,0,.6);}

/* FILTRES VOTES RAPIDES */
.vote-filters{display:flex;gap:6px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.vote-filter-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;
  border:1.5px solid #e0d8cc;background:white;font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .2s;color:#888;}
.vote-filter-btn:hover{border-color:var(--gold);color:#7a5c10;}
.vote-filter-btn.active-love{background:rgba(220,60,100,.1);border-color:rgba(220,60,100,.4);color:#dc3c64;}
.vote-filter-btn.active-top{background:rgba(200,168,75,.15);border-color:var(--gold);color:#7a5c10;}
.vote-filter-btn.active-save{background:rgba(44,80,160,.1);border-color:rgba(44,80,160,.4);color:#2850a0;}
.vote-filter-btn.active-all{background:var(--dark);border-color:var(--dark);color:var(--gold);}
.vote-filter-count{font-size:9px;background:rgba(0,0,0,.08);padding:1px 5px;border-radius:8px;}

/* HORAIRES */
.card-horaires{font-size:10px;color:#888;margin-top:4px;line-height:1.5;}
.card-horaires .ouvert{color:#2C5016;font-weight:700;}
.card-horaires .ferme{color:#cc4400;font-weight:700;}

/* MULTI-PHOTOS */
.photo-gallery{display:flex;gap:3px;height:180px;overflow:hidden;border-radius:var(--r) var(--r) 0 0;position:relative;}
.photo-gallery .photo-main{flex:1;background-size:cover!important;background-position:center!important;min-width:0;}
.photo-gallery .photo-thumbs{display:flex;flex-direction:column;gap:3px;width:72px;flex-shrink:0;}
.photo-gallery .photo-thumb{flex:1;background-size:cover!important;background-position:center!important;cursor:pointer;transition:opacity .2s;}
.photo-gallery .photo-thumb:hover{opacity:.85;}
.photo-gallery .photo-more{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.6);color:white;font-size:9px;font-weight:700;padding:3px 7px;border-radius:10px;}

/* SYSTÈME DE VOTE FAMILIAL */
.vote-bar{display:flex;gap:4px;align-items:center;margin-top:6px;padding-top:6px;border-top:1px solid rgba(0,0,0,.06);}
.vote-btn{display:flex;align-items:center;gap:3px;padding:4px 9px;border-radius:20px;border:1.5px solid transparent;
  font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;background:none;}
.vote-btn:hover{transform:scale(1.08);}
.vote-btn.love{border-color:rgba(220,60,100,.2);color:#dc3c64;}
.vote-btn.love.active{background:rgba(220,60,100,.12);border-color:rgba(220,60,100,.4);}
.vote-btn.top{border-color:rgba(200,168,75,.2);color:#8B6914;}
.vote-btn.top.active{background:rgba(200,168,75,.15);border-color:rgba(200,168,75,.5);}
.vote-btn.save{border-color:rgba(44,80,160,.2);color:#2850a0;}
.vote-btn.save.active{background:rgba(44,80,160,.1);border-color:rgba(44,80,160,.4);}
.vote-count{font-size:9.5px;font-weight:600;}
/* nuit card vote — couleurs adaptées fond sombre */
.nuit-card .vote-bar{border-top-color:rgba(200,168,75,.1);}
.nuit-card .vote-btn.love{border-color:rgba(220,60,100,.25);color:#f07090;}
.nuit-card .vote-btn.love.active{background:rgba(220,60,100,.18);border-color:rgba(220,60,100,.5);}
.nuit-card .vote-btn.top{border-color:rgba(200,168,75,.25);color:#e0c060;}
.nuit-card .vote-btn.top.active{background:rgba(200,168,75,.2);border-color:rgba(200,168,75,.6);}
.nuit-card .vote-btn.save{border-color:rgba(100,150,255,.25);color:#80a8ff;}
.nuit-card .vote-btn.save.active{background:rgba(100,150,255,.15);border-color:rgba(100,150,255,.5);}

.nuit-edit-btn{background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.15);
  color:rgba(200,168,75,.7);font-size:10px;font-weight:700;padding:5px 8px;border-radius:5px;cursor:pointer;}

/* OVERVIEW */

.ov-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:22px 28px 28px;}
.ov-card{background:white;border-radius:var(--r);padding:20px;box-shadow:var(--sh);cursor:pointer;transition:all .2s;border-top:3px solid transparent;}
.ov-card:hover{transform:translateY(-3px);box-shadow:var(--shhov);}
.ov-card-pyr{border-top-color:var(--pyr);}
.ov-card-atl{border-top-color:var(--atl);}
.ov-card-bou{border-top-color:var(--bou);}
.ov-card-map{border-top-color:var(--gold);}
.ov-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;border-radius:7px;}
.ov-card-pyr .ov-icon{background:rgba(44,80,22,.1);}
.ov-card-atl .ov-icon{background:rgba(26,90,122,.1);}
.ov-card-bou .ov-icon{background:rgba(107,50,136,.1);}
.ov-card-map .ov-icon{background:rgba(200,168,75,.1);}
.ov-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;}
.ov-sub{font-size:10.5px;color:var(--muted);margin-bottom:12px;}
.ov-btn{font-size:10px;font-weight:700;padding:6px 13px;border-radius:6px;border:none;cursor:pointer;transition:all .15s;}
.ov-card-pyr .ov-btn{background:var(--pyr);color:white;}
