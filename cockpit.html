<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RockNRoad · Cockpit · La vie du groupe</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<script src="chrome.js"></script>
<style>
/* COCKPIT converti grammaire v2 (Charte Design v1, recette de la pilote horizon)
   — plus AUCUNE variable locale : tout vient de tokens.css.
   — la barre du haut est injectée par chrome.js (la couverture).   */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow-x:hidden;overflow-y:auto;}
body{font-family:var(--font-body);color:var(--ink);background:var(--bg);}

/* ── SCÈNE : tableau de bord en blocs — 3 colonnes, plein écran au départ
   mais la page peut grandir au scroll (Temps 2 : éviter la surcharge). ── */
.stage{
  min-height:calc(100vh - 56px);   /* plein écran au départ, mais peut grandir */
  padding:12px;display:grid;gap:11px;
  grid-template-columns:1.3fr 320px 320px;   /* action (large) · groupe+partage · coups de cœur */
  grid-template-rows:auto auto 1fr;
  grid-template-areas:
    "question  group   context"
    "question  share   context"
    "votes     votes   context";
}

/* ── BLOC générique ── */
.blk{background:var(--surface);border:1px solid var(--surface-line);border-radius:var(--r-lg);
  display:flex;flex-direction:column;min-height:0;overflow:hidden;
  box-shadow:var(--shadow);}
.bh{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--surface-line);}
.bh .ic{font-size:15px;}
.bh h3{font-family:var(--font-title);font-size:15px;font-weight:600;flex:1;color:var(--ink);}
.bh .pin{opacity:.5;font-size:12px;}
.bh .badge{font-size:11px;font-weight:700;color:#1a1208;background:var(--gold-light);
  border-radius:20px;padding:2px 9px;letter-spacing:.5px;}
.bb{padding:13px 14px;flex:1;min-height:0;display:flex;flex-direction:column;
  overflow:auto;scrollbar-width:thin;max-height:72vh;}
.bb::-webkit-scrollbar{width:6px;}
.bb::-webkit-scrollbar-thumb{background:var(--gold-a35);border-radius:3px;}

/* ── QUESTION À TRANCHER (mise en avant) ── */
.b-question{grid-area:question;}
.b-question .bb{justify-content:center;}
.q-big{font-family:var(--font-title);font-size:26px;font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:6px;}
.q-sub{font-size:14px;color:var(--ink-dim);font-style:italic;margin-bottom:16px;}
.q-opts{display:flex;gap:12px;flex-wrap:wrap;}
.q-opt{flex:1;min-width:150px;display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:12px;
  background:transparent;border:1.5px solid var(--gold-a35);cursor:pointer;transition:all .2s;}
.q-opt:hover{background:var(--gold-a20);border-color:var(--gold);transform:translateY(-2px);}
.q-opt .e{font-size:26px;}
.q-opt .t{font-family:var(--font-title);font-size:17px;font-weight:600;color:var(--ink);}
.q-opt .v{margin-left:auto;font-size:12px;color:var(--gold-text);font-weight:700;}

/* ── VOTES EN COURS ── */
.b-votes{grid-area:votes;}
.vote-row{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--surface-line);}
.vote-row:last-child{border-bottom:none;}
.vote-info{flex:1;min-width:0;}
.vote-q{font-size:14px;font-weight:600;color:var(--ink);}
.vote-meta{font-size:11.5px;color:var(--ink-dim);margin-top:2px;}
.vote-bar{height:6px;border-radius:3px;background:var(--surface-line);width:90px;overflow:hidden;flex-shrink:0;}
.vote-bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:3px;}
.vote-count{font-size:12px;font-weight:700;color:var(--gold-text);min-width:42px;text-align:right;flex-shrink:0;}
/* ── Votes branchés : états, création, options ── */
.q-empty,.vote-empty{font-size:12.5px;color:var(--ink-dim);font-style:italic;text-align:center;margin:auto 0;padding:14px 8px;line-height:1.6;}
.q-opt.q-chosen{background:var(--gold-a20);border-color:var(--gold);}
.q-opt .v{display:flex;align-items:center;gap:4px;}
.q-arg-wrap{margin-top:14px;display:flex;flex-direction:column;gap:7px;}
.q-arg-wrap textarea{width:100%;min-height:38px;max-height:80px;resize:vertical;padding:8px 11px;border:1.5px solid var(--surface-line);border-radius:9px;background:var(--paper);color:#1a1208;font-family:var(--font-body);font-size:12.5px;}
.q-arg-wrap textarea:focus{border-color:var(--gold);outline:none;}
.q-args{margin-top:12px;display:flex;flex-direction:column;gap:7px;}
.q-arg{font-size:12px;color:var(--ink-dim);line-height:1.4;}
.q-arg b{color:var(--gold-text);font-weight:600;}
.q-meta{font-size:11.5px;color:var(--ink-dim);margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.q-close-btn{background:none;border:1px solid var(--gold-a35);color:var(--gold-text);border-radius:7px;padding:3px 10px;font-size:11px;cursor:pointer;}
.q-close-btn:hover{background:var(--gold-a20);}
.vote-new-btn{display:inline-flex;align-items:center;gap:5px;background:var(--gold-a20);border:1.5px solid var(--gold-a35);color:var(--gold-text);cursor:pointer;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;line-height:1;transition:all .15s;}
.vote-new-btn:hover{background:var(--gold-a35);border-color:var(--gold);}
.vote-row{cursor:pointer;}
.vote-row.is-active .vote-q{color:var(--gold-text);}
/* Archive "Déjà tranché" */
.arch-titre{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold-text);font-weight:700;margin:14px 0 6px;padding-top:11px;border-top:1px dashed var(--surface-line);}
.arch-row{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;}
.arch-info{flex:1;min-width:0;}
.arch-q{font-size:13px;color:var(--ink-dim);}
.arch-res{font-size:12px;color:var(--ink);margin-top:2px;}
.arch-res b{color:var(--gold-text);}
.arch-detail{color:var(--ink-dim);font-weight:400;}
.arch-chev{color:var(--ink-dim);font-size:12px;flex-shrink:0;}
.arch-args{padding:4px 0 10px 4px;display:flex;flex-direction:column;gap:5px;border-bottom:1px solid var(--surface-line);}
/* Célébration */
.q-celebr{font-family:var(--font-title);font-size:24px;font-weight:700;color:var(--gold-text);text-align:center;line-height:1.3;margin:auto 0;padding:20px 10px;}
/* Étoiles note /5 */
.q-stars{display:flex;gap:6px;}
.q-star{font-size:30px;cursor:pointer;line-height:1;color:var(--surface-line);transition:color .15s,transform .15s;}
.q-star:hover,.q-star.on{color:var(--gold);transform:scale(1.12);}
/* Modale création */
.vmodal-bg{position:fixed;inset:0;background:rgba(10,7,3,.62);display:flex;align-items:center;justify-content:center;z-index:200;padding:18px;}
.vmodal{background:var(--surface);border:1px solid var(--surface-line);border-radius:var(--r-lg);box-shadow:var(--shadow);width:100%;max-width:440px;max-height:88vh;overflow:auto;padding:20px;}
.vmodal h3{font-family:var(--font-title);font-size:18px;color:var(--ink);margin-bottom:14px;}
.vmodal label{display:block;font-size:12px;color:var(--gold-text);font-weight:700;margin:11px 0 5px;text-transform:uppercase;letter-spacing:.5px;}
.vmodal input,.vmodal select,.vmodal textarea{width:100%;padding:9px 11px;border:1.5px solid var(--surface-line);border-radius:9px;background:var(--paper);color:#1a1208;font-family:var(--font-body);font-size:13px;}
.vmodal input:focus,.vmodal select:focus,.vmodal textarea:focus{border-color:var(--gold);outline:none;}
.vopt-row{display:flex;gap:6px;margin-bottom:6px;}
.vopt-row input{flex:1;}
.vopt-del{width:34px;border:1.5px solid var(--surface-line);background:none;border-radius:8px;cursor:pointer;color:var(--ink-dim);font-size:14px;}
.vmodal-foot{display:flex;gap:9px;margin-top:18px;}
.vbtn{flex:1;padding:11px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:13px;font-family:var(--font-body);}
.vbtn-go{background:linear-gradient(90deg,var(--gold),var(--gold-light));color:#1a1208;}
.vbtn-no{background:none;border:1.5px solid var(--surface-line);color:var(--ink-dim);}
.vhint{font-size:11px;color:var(--ink-dim);font-style:italic;margin-top:4px;}
.int-cards{display:flex;flex-direction:column;gap:9px;margin-top:6px;}
.int-card{padding:13px 15px;border:1.5px solid var(--surface-line);border-radius:11px;cursor:pointer;transition:all .15s;background:var(--paper);}
.int-card:hover{border-color:var(--gold);background:var(--gold-a10);transform:translateX(2px);}
.int-t{font-family:var(--font-title);font-size:15px;font-weight:600;color:var(--ink);}
.int-ex{font-size:12px;color:var(--ink-dim);font-style:italic;margin-top:3px;}
/* Sélecteur de fiche (5ᵉ intention) */
.nv-select{width:100%;padding:9px 11px;border:1.5px solid var(--surface-line);border-radius:9px;
  background:var(--paper);color:var(--ink);font-size:14px;}
/* Vignette de la fiche soumise au vote */
.q-fiche{display:flex;gap:11px;align-items:center;margin:10px 0 4px;padding:8px;
  border:1px solid var(--surface-line);border-radius:11px;background:var(--paper);}
.q-fiche-ph{width:48px;height:48px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;
  font-size:22px;background:var(--gold-a20);background-size:cover;background-position:center;}
.q-fiche-in{min-width:0;}
.q-fiche-nm{font-family:var(--font-title);font-size:14px;font-weight:600;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-fiche-mt{font-size:12px;color:var(--ink-dim);margin-top:2px;}
.q-fiche-off{opacity:.65;}

/* ── GROUPE ── */
.b-group{grid-area:group;}
.avts{display:flex;margin-bottom:14px;}
.av2{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;
  color:#fff;border:2px solid var(--surface);margin-right:-8px;}   /* initiales sur-couleur : invariant */
.waiting{font-size:13px;color:var(--ink-dim);line-height:1.7;}
.waiting .w{color:var(--gold-text);font-weight:600;}
.waiting-pill{display:inline-block;font-size:11px;font-weight:700;color:#1a1208;
  background:var(--gold-light);border-radius:20px;padding:2px 9px;margin-top:8px;}
/* pastille membre « en attente de vote » : éteinte, sobre (non-nominatif) */
.av2-off{background:var(--gold-a20)!important;color:var(--ink-dim)!important;}
/* ligne d'animation du moteur (D-ECH-3) : la voix qui réveille le groupe */
.grp-pulse-line{display:flex;gap:8px;align-items:flex-start;}
.grp-pulse-line .em{flex-shrink:0;font-size:15px;line-height:1.5;}

/* ── PARTAGER AU GROUPE (sans créer de fiche) ── */
.b-share{grid-area:share;}
.share-feed{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;gap:9px;margin-bottom:10px;scrollbar-width:thin;}
.share-item{display:flex;gap:9px;align-items:flex-start;}
.share-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--chrome-bg);} /* encre sur pastille avatar (dégradé donnée) : invariant */
.share-body{flex:1;background:var(--paper);border:1px solid var(--paper-line);border-radius:var(--r);padding:8px 11px;box-shadow:var(--shadow);}
.share-name{font-size:12px;font-weight:700;color:var(--gold-deep);}   /* sur papier : encres fixes */
.share-text{font-size:13px;color:#1a1208;line-height:1.5;margin-top:2px;}
.share-photo{margin-top:6px;height:70px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--gold-a20),var(--gold-a35));display:flex;align-items:center;justify-content:center;font-size:22px;}
.share-input{display:flex;gap:8px;flex-shrink:0;}
.share-input input{flex:1;}   /* le style des champs vient d'app.css */
.share-btn{background:linear-gradient(90deg,var(--gold),var(--gold-light));color:#1a1208;border:none;
  border-radius:10px;padding:0 13px;font-weight:700;cursor:pointer;font-size:15px;}
.share-hint{font-size:10.5px;color:var(--ink-dim);font-style:italic;margin-top:6px;}
.share-empty{font-size:12.5px;color:var(--ink-dim);font-style:italic;text-align:center;margin:auto 0;padding:14px 8px;line-height:1.6;}
.share-time{font-size:10px;color:var(--ink-dim);margin-left:6px;font-weight:400;}
.share-flag{background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:11px;opacity:.55;padding:0 2px;margin-left:6px;line-height:1;}
.share-flag:hover{opacity:1;color:var(--gold-text);}
.share-row{display:flex;align-items:baseline;gap:2px;}
.share-row .share-name{flex:0 0 auto;}

/* ── CONTEXTE : fiche en rappel + infos voyage ── */
.b-context{grid-area:context;}
.cc-list{display:flex;flex-direction:column;gap:8px;flex:1;min-height:0;}
.cc-empty{font-size:13px;color:var(--ink-dim);line-height:1.7;text-align:center;padding:14px 6px;}
.cc-item{display:flex;gap:11px;align-items:center;padding:8px;border:1px solid var(--surface-line);
  border-radius:11px;background:var(--paper);}
.cc-ph{width:46px;height:46px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;
  font-size:20px;background:var(--gold-a20);background-size:cover;background-position:center;}
.cc-in{flex:1;min-width:0;}
.cc-nm{font-family:var(--font-title);font-size:14px;font-weight:600;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-mt{font-size:12px;color:var(--ink-dim);margin-top:2px;}
.cc-tag{font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700;
  border-radius:var(--r-pill);padding:1px 7px;vertical-align:middle;}
.cc-tag-vote{color:#1a1208;background:var(--gold-light);}
.cc-tag-cand{color:var(--ink-dim);background:var(--gold-a20);}
.cc-act{flex-shrink:0;font-size:12px;font-weight:600;border-radius:var(--r-pill);
  padding:6px 12px;cursor:pointer;border:1px solid var(--gold-a35);}
.cc-act-go{background:var(--gold-light);color:#1a1208;border-color:transparent;}
.cc-act-vote{background:transparent;color:var(--gold-text);}

@media(max-width:820px){
  html,body{overflow:auto;}
  .stage{grid-template-columns:1fr;grid-template-areas:"question" "group" "votes" "share" "context";height:auto;}
}
</style>
</head>

  <!-- ── LA QUESTION À TRANCHER (mise en avant) ── -->
  <div class="blk b-question">

      <div class="q-empty">Chargement…</div>

  <div class="blk b-votes">

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const {createClient}=supabase;
const sb=createClient("https://cazqllstxhuecoqpktwm.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhenFsbHN0eGh1ZWNvcXBrdHdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTExNTQsImV4cCI6MjA5NDk2NzE1NH0.6YYAJXG4s-h78YUp2pd7fBvQJzDprSxtSkUZTv6ZtZs");
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href="index.html";return;}
})();
/* ════════════════════════════════════════════════════════════════
   COCKPIT — BLOC « PARTAGER AU GROUPE » branché au réel (table messages)
   Cap : RockNRoad_Echanges_Cockpit_v1 — étape 2 (le plus simple d'abord).
   Garde-fous : scope groupe (is_member_of via RLS), nom gelé (auteur_nom),
   modération a posteriori (statut actif/signale/masque, G2).
   ════════════════════════════════════════════════════════════════ */
let RNR_groupeId = null;
let RNR_userId   = null;
let RNR_userNom  = null;
let RNR_dernierMsg = null;   /* date ISO du dernier message — alimente le moteur d'animation (D-ECH-3) */

/* Initiale + couleur stable dérivée du nom (mêmes pastilles que la maquette) */
function initialeDe(nom){ return (nom||'?').trim().charAt(0).toUpperCase() || '?'; }
function couleurAvatar(nom){
  /* dégradé déterministe à partir du nom — palette maison sobre */
  const palettes = [
    ['#7a5a1f','var(--gold)'], ['#13384a','#3d8fb0'],
    ['#6B3288','#c89be0'], ['#2C5016','#7DBB4F'], ['#7a3320','#d08a5a']
  ];
  let h=0; for(let i=0;i<(nom||'').length;i++) h=(h*31+nom.charCodeAt(i))>>>0;
  const p = palettes[h % palettes.length];
  return 'linear-gradient(135deg,'+p[0]+','+p[1]+')';
}
function heureCourte(iso){
  try{ const d=new Date(iso); const now=new Date();
    const sameDay=d.toDateString()===now.toDateString();
    if(sameDay) return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  }catch(e){ return ''; }
}
function escapeHtml(t){ const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }

/* Prénom propre depuis l'email. On coupe au point/underscore/chiffre (séparateurs
   email : "bruno.brundaler" -> "Bruno") mais on PRÉSERVE le tiret des prénoms
   composés ("jean-pierre" -> "Jean-Pierre"). Majuscule sur chaque segment. */
function prenomDepuisEmail(email){
  let base = ((email||'').split('@')[0]||'');
  base = base.split(/[._0-9]/)[0] || base;        // coupe prénom.nom, garde le tiret
  if(!base) return 'Voyageur';
  return base.split('-')
    .map(seg => seg ? seg.charAt(0).toUpperCase()+seg.slice(1).toLowerCase() : '')
    .filter(Boolean)
    .join('-');
}

/* Charger le contexte (groupe + identité), réutilise le pattern éprouvé de home */
async function chargerContexte(){
  const {data:{session}} = await sb.auth.getSession();
  if(!session) return false;
  RNR_userId  = session.user.id;
  RNR_userNom = prenomDepuisEmail(session.user.email);
  const {data:mem,error} = await sb.from('membres')
    .select('groupe_id, is_superadmin, groupes(*)').eq('user_id',RNR_userId).limit(1).single();
  if(error||!mem){ console.warn('Cockpit: pas de groupe', error); return false; }
  RNR_groupeId = mem.groupe_id;
  if(window.rnrChrome){
    if(mem.groupes&&mem.groupes.nom) rnrChrome.setGroupe(mem.groupes.nom);
    if(mem.is_superadmin) rnrChrome.setSuperAdmin(true);
  }
  return true;
}

/* Charger et afficher le fil (statut actif uniquement — G2 modération a posteriori) */
async function chargerMessages(){
  const feed = document.getElementById('share-feed');
  if(!RNR_groupeId){ feed.innerHTML='<div class="share-empty">Groupe introuvable.</div>'; return; }
  const {data:msgs,error} = await sb.from('messages')

  if(error){ feed.innerHTML='<div class="share-empty">Impossible de charger les messages.</div>'; console.warn(error); return; }

    feed.innerHTML='<div class="share-empty">Rien de partagé pour l\'instant.<br>Lance la discussion : un mot, une idée, un coup de cœur 👇</div>';

  }

        '</div>'+
        '<div class="share-text">'+escapeHtml(m.texte)+'</div>'+photo+

/* Envoyer un message (auteur_id = lien RGPD, auteur_nom = étiquette gelée) */
async function envoyerMessage(){
  const input = document.getElementById('share-input');
  const btn   = document.getElementById('share-btn');
  const texte = (input.value||'').trim();
  if(!texte || !RNR_groupeId) return;
  btn.disabled = true; input.disabled = true;
  const {error} = await sb.from('messages').insert({
    groupe_id: RNR_groupeId, auteur_id: RNR_userId, auteur_nom: RNR_userNom,
    texte: texte, statut: 'actif'
  });
  btn.disabled = false; input.disabled = false;
  if(error){ console.warn('Envoi refusé', error); alert('Message non envoyé. Réessaie.'); return; }
  input.value=''; input.focus();
  await chargerMessages();
  rendreGroupe();   /* le silence est rompu → le moteur d'animation se met à jour */
}

/* Signaler (modération a posteriori — passe en statut signale, G2) */
async function signalerMessage(id){
  if(!confirm('Signaler ce message au groupe ?')) return;
  const {error} = await sb.from('messages').update({statut:'signale'}).eq('id',id);
  if(error){ console.warn('Signalement refusé', error); return; }
  await chargerMessages();
}

/* Entrée clavier */
document.addEventListener('DOMContentLoaded',()=>{
  const input=document.getElementById('share-input');
  if(input) input.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); envoyerMessage(); }});
});

/* Démarrage du bloc Partager */
(async()=>{
  const ok = await chargerContexte();
  if(ok){ await chargerMessages(); await chargerFiches(); await chargerVotes(); }
  else document.getElementById('share-feed').innerHTML='<div class="share-empty">Connecte-toi pour voir les messages du groupe.</div>';

/* ════════════════════════════════════════════════════════════════
   COCKPIT — MOTEUR DE VOTES (propositions + votes), 6 types.
   Cap : RockNRoad_Echanges_Cockpit_v1 — étape 3.
   1 seul code paramétrable par `proposition.type`. Réutilise RNR_groupeId/userId/userNom.
   Garde-fous : RLS scope groupe ; 1 voix/membre (UNIQUE en base, upsert) ; argument (D-ECH-4).
   ════════════════════════════════════════════════════════════════ */
const TYPES_VOTE = {
  pour_contre:{label:'Pour ou contre',  fixedOptions:['Pour','Contre']},
  choix:      {label:'Choix multiple',  fixedOptions:null},
  note:       {label:'Note sur 5',      fixedOptions:null},
  elimination:{label:'Garder / écarter',fixedOptions:['Garder','Écarter']},
  classement: {label:'Classement',      fixedOptions:null},
  question:   {label:'Question libre',  fixedOptions:null}
};
let RNR_props = [];
let RNR_clos = [];
let RNR_celebreEnCours = false;      // propositions ouvertes du groupe
let RNR_votes = {};      // { proposition_id: [ {votant_id, valeur, argument} ] }
let RNR_vedetteId = null;
let RNR_fiches = [];     // fiches du carnet du groupe (cache COMPLET) — résout les vignettes
let RNR_fichesAimees = []; // fiches ayant ≥1 ❤️ — alimente le sélecteur de vote (entonnoir)
let RNR_nbMembres = 1;

function escH(t){ const d=document.createElement('div'); d.textContent=(t==null?'':t); return d.innerHTML; }

/* ── Fiches du carnet (pour le vote « garder/écarter une fiche », 5ᵉ intention) ──
   Même accès que carnet.html (lieux scopés groupe via RLS). Chargé une fois en cache.
   Champs minimaux : id, nom, region, photo_url (titre = l.nom, confirmé sur le réel). */
async function chargerFiches(){
  if(!RNR_groupeId){ RNR_fiches=[]; RNR_fichesAimees=[]; return; }
  const {data,error}=await sb.from('lieux')
    .select('id,nom,region,photo_url')
    .eq('groupe_id',RNR_groupeId)
    .order('nom',{ascending:true});
  if(error){ console.warn('fiches',error); RNR_fiches=[]; RNR_fichesAimees=[]; return; }
  RNR_fiches = data||[];   /* cache COMPLET — sert à résoudre les vignettes des votes existants */
  /* Cache des fiches AIMÉES (≥ 1 ❤️) — sert au sélecteur de création (entonnoir, Master 1.7).
     Le ❤️ du carnet est la porte d'entrée dans la zone de vote. */
  const {data:reacs} = await sb.from('reactions')
    .select('cible_id,emoji').eq('cible_type','lieu').eq('emoji','❤️');
  const coeurParFiche = {};
  (reacs||[]).forEach(r=>{ coeurParFiche[r.cible_id]=(coeurParFiche[r.cible_id]||0)+1; });
  RNR_fichesAimees = RNR_fiches
    .filter(f=>coeurParFiche[f.id]>0)
    .map(f=>({...f, coeurs:coeurParFiche[f.id]}));
}
/* Retrouve une fiche par id ; null si elle n'existe plus (supprimée du carnet) →
   le vote survit à la disparition de sa cible (parallèle G4 anonymisation). */
function ficheParId(id){ return RNR_fiches.find(f=>f.id===id) || null; }

/* ── Chargement ── */
async function chargerVotes(){
  if(!RNR_groupeId) return;
  const {count} = await sb.from('membres').select('*',{count:'exact',head:true}).eq('groupe_id',RNR_groupeId);
  RNR_nbMembres = count||1;

  /* Tous les votes du groupe (ouverts ET clos), on trie ensuite */
  const {data:props,error:eP} = await sb.from('propositions')
    .select('*').eq('groupe_id',RNR_groupeId)
    .order('created_at',{ascending:false});
  if(eP){ console.warn('props',eP); return; }
  const tous = props||[];
  RNR_props = tous.filter(p=>p.statut==='ouvert');
  RNR_clos  = tous.filter(p=>p.statut==='clos');

  RNR_votes = {};
  if(tous.length){
    const ids = tous.map(p=>p.id);
    const {data:vts} = await sb.from('votes').select('*').in('proposition_id',ids);
    (vts||[]).forEach(v=>{ (RNR_votes[v.proposition_id]=RNR_votes[v.proposition_id]||[]).push(v); });
  }
  if(!RNR_vedetteId || !RNR_props.find(p=>p.id===RNR_vedetteId))
    RNR_vedetteId = RNR_props.length ? RNR_props[0].id : null;

  rendreListe();
  if(RNR_celebreEnCours){ RNR_celebreEnCours=false; }  /* on garde la célébration affichée, la liste/archive sont à jour */
  else { rendreVedette(); }
  rendreGroupe();   /* bloc « Le groupe » + moteur d'animation, sur l'état réel (D-ECH-3) */
  rendreCoeurs();   /* bloc « Les coups de cœur du groupe » (D-ECH-10) */
}

/* Calcul du résultat d'un vote selon son type */
function gagnantDe(p){
  const vts=votesDe(p.id);
  if(!vts.length) return {texte:'aucune voix', detail:''};
  if(p.type==='note'){
    let somme=0; vts.forEach(v=>somme+=parseInt(v.valeur,10)||0);
    const moy=somme/vts.length;
    return {texte:moy.toFixed(1)+'/5', detail:vts.length+' vote'+(vts.length>1?'s':'')};
  }
  if(p.type==='question'){
    return {texte:vts.length+' réponse'+(vts.length>1?'s':''), detail:''};
  }
  /* choix / pour_contre : option majoritaire */
  const c={}; vts.forEach(v=>{ c[v.valeur]=(c[v.valeur]||0)+1; });
  let best=null,bn=-1; Object.keys(c).forEach(k=>{ if(c[k]>bn){bn=c[k];best=k;} });
  return {texte:best, detail:bn+' voix sur '+vts.length};
}

/* ── Helpers d'agrégation ── */
function votesDe(pid){ return RNR_votes[pid]||[]; }
function monVote(pid){ return votesDe(pid).find(v=>v.votant_id===RNR_userId); }
function nbVotants(pid){ return new Set(votesDe(pid).map(v=>v.votant_id)).size; }
function compteParValeur(pid){
  const c={}; votesDe(pid).forEach(v=>{ c[v.valeur]=(c[v.valeur]||0)+1; }); return c;
}
function optionsDe(p){
  const t=TYPES_VOTE[p.type];
  if(t && t.fixedOptions) return t.fixedOptions;
  if(Array.isArray(p.options)) return p.options;
  return [];
}

/* ── Rendu : liste "Votes en cours" ── */
function rendreListe(){
  const box=document.getElementById('v-list');
  const badge=document.getElementById('v-badge');
  badge.textContent = RNR_props.length + ' ouvert' + (RNR_props.length>1?'s':'');

  let html='';
  if(!RNR_props.length){
    html+='<div class="vote-empty">Aucun vote en cours.<br>Clique « Lancer un vote » — une question, le groupe tranche.</div>';
  } else {
    html += RNR_props.map(p=>{
      const nv=nbVotants(p), pct=RNR_nbMembres?Math.round(nv/RNR_nbMembres*100):0;
      const meta = TYPES_VOTE[p.type].label + ' · ' + echeanceTexte(p);
      return '<div class="vote-row'+(p.id===RNR_vedetteId?' is-active':'')+'" onclick="mettreEnVedette(\''+p.id+'\')">'+
        '<div class="vote-info"><div class="vote-q">'+escH(p.titre)+'</div><div class="vote-meta">'+escH(meta)+'</div></div>'+
        '<div class="vote-bar"><span style="width:'+pct+'%"></span></div>'+
        '<div class="vote-count">'+nv+'/'+RNR_nbMembres+'</div></div>';
    }).join('');
  }

  /* Archive « Déjà tranché » */
  if(RNR_clos.length){
    html+='<div class="arch-titre">Déjà tranché ('+RNR_clos.length+')</div>';
    html+=RNR_clos.map(p=>{
      const g=gagnantDe(p);
      return '<div class="arch-row" onclick="basculerArch(\''+p.id+'\')">'+
        '<div class="arch-info"><div class="arch-q">'+escH(p.titre)+'</div>'+
          '<div class="arch-res">→ <b>'+escH(g.texte)+'</b>'+(g.detail?' <span class="arch-detail">('+escH(g.detail)+')</span>':'')+'</div></div>'+
        '<div class="arch-chev" id="chev-'+p.id+'">▾</div></div>'+
        '<div class="arch-args" id="args-'+p.id+'" style="display:none"></div>';
    }).join('');
  }
  box.innerHTML=html;
}

/* Déplier les arguments d'un vote clos */
function basculerArch(pid){
  const zone=document.getElementById('args-'+pid);
  const chev=document.getElementById('chev-'+pid);
  if(!zone) return;
  if(zone.style.display==='none'){
    const args=votesDe(pid).filter(v=>v.argument||v.valeur);
    const p=RNR_clos.find(x=>x.id===pid);
    zone.innerHTML = args.length
      ? args.map(v=>'<div class="q-arg"><b>'+escH(v.valeur)+'</b>'+(v.argument?' — '+escH(v.argument):'')+'</div>').join('')
      : '<div class="q-arg" style="font-style:italic">Pas de détail.</div>';
    zone.style.display='block'; if(chev) chev.textContent='▴';
  } else { zone.style.display='none'; if(chev) chev.textContent='▾'; }
}

function echeanceTexte(p){
  if(!p.ferme_le) return 'sans échéance';
  const d=new Date(p.ferme_le), now=new Date();
  const jours=Math.ceil((d-now)/86400000);
  if(jours<0) return 'échéance passée';
  if(jours===0) return 'ferme aujourd\'hui';
  if(jours===1) return 'ferme demain';
  return 'ferme dans '+jours+' jours';
}

function mettreEnVedette(pid){ RNR_vedetteId=pid; rendreListe(); rendreVedette(); rendreGroupe(); rendreCoeurs(); }

/* ════════════════════════════════════════════════════════════════
   BLOC « LE GROUPE » — version honnête NON-NOMINATIVE (v13+).
   On n'invente aucun prénom (les vrais noms attendent la brique
   « identité du membre », cf. cap §6). On affiche du RÉEL :
   - une pastille par membre (RNR_nbMembres, count exact) ;
   - allumée si ce membre a voté sur la question vedette, éteinte sinon ;
   - le moteur d'animation (D-ECH-3) en dessous : la voix qui réveille.
   ════════════════════════════════════════════════════════════════ */
function rendreGroupe(){
  const avts  = document.getElementById('grp-avts');
  const pulse = document.getElementById('grp-pulse');
  if(!avts||!pulse) return;

  /* Pastilles : autant que de membres. Sur la vedette, on sait combien ont voté. */
  const vedette = RNR_props.find(x=>x.id===RNR_vedetteId) || null;
  const nbVote  = vedette ? nbVotants(vedette.id) : 0;
  const total   = RNR_nbMembres || 1;
  const MAX_PAST = 8;                       /* au-delà, on résume par +N */
  const aMontrer = Math.min(total, MAX_PAST);
  let av='';
  for(let i=0;i<aMontrer;i++){
    const aVote = i < nbVote;               /* allumées d'abord (non-nominatif : pas de qui-est-qui) */
    av += '<div class="av2'+(aVote?'':' av2-off')+'" title="'+(aVote?'a voté':'pas encore voté')+'">'
        + (aVote?'✓':'·')+'</div>';
  }
  if(total>MAX_PAST) av += '<div class="av2 av2-off">+'+(total-MAX_PAST)+'</div>';
  avts.innerHTML = av;

  pulse.innerHTML = moteurAnimation(vedette, nbVote, total);
}

/* ── Moteur d'animation (D-ECH-3) ────────────────────────────────
   Pure logique d'affichage sur l'état réel — zéro table, zéro push.
   Ton (validé) : chaleureux complice de base, pointe joueuse quand
   ça dort vraiment ; jamais administratif (D-ECH-6). Une seule voix
   cohérente qui hausse le ton selon l'endormissement du groupe.
   Variation douce (pas d'aléatoire qui part dans tous les sens) :
   on alterne sur le jour de l'année → stable dans une session.       */
/* ════════════════════════════════════════════════════════════════
   BLOC « LES COUPS DE CŒUR DU GROUPE » (D-ECH-10).
   Montre TOUTES les fiches aimées (≥1 ❤️), en distinguant :
   - « EN VOTE »   : une proposition elimination ouverte porte cette fiche → on rejoint le vote ;
   - « CANDIDATE » : aimée mais pas encore mise au vote → bouton « lancer le vote ».
   Le pont visible carnet → cockpit → vote, pour embarquer les suiveurs (loi d'équilibre).
   Compteurs ANONYMES (combien de ❤️, jamais qui — la brique identité n'existe pas).
   Classement par nombre de cœurs décroissant. Pas un mini-carnet : tourné vers l'action.
   ════════════════════════════════════════════════════════════════ */
function rendreCoeurs(){
  const box=document.getElementById('cc-list');
  const badge=document.getElementById('cc-badge');
  if(!box) return;

  const aimees=[...RNR_fichesAimees].sort((a,b)=>(b.coeurs||0)-(a.coeurs||0));
  if(badge) badge.textContent=aimees.length;

  if(!aimees.length){
    box.innerHTML='<div class="cc-empty">Aucun coup de cœur pour l\'instant.<br>'+
      'Dans le <b>carnet</b>, mettez un ❤️ sur les lieux qui vous font envie : ils apparaîtront ici, '+
      'prêts à être soumis au groupe.</div>';
    return;
  }

  /* lieu_id → proposition ouverte qui le porte (pour le statut « en vote ») */
  const voteDe={};
  RNR_props.forEach(p=>{ if(p.lieu_id) voteDe[p.lieu_id]=p.id; });

  box.innerHTML = aimees.map(f=>{
    const enVote = voteDe[f.id];
    const ph = f.photo_url
      ? '<div class="cc-ph" style="background-image:url(\''+escH(f.photo_url)+'\')"></div>'
      : '<div class="cc-ph">🗺️</div>';
    const meta = (f.region?escH(f.region)+' · ':'')+'❤️ '+(f.coeurs||0);
    const action = enVote
      ? '<button class="cc-act cc-act-vote" onclick="mettreEnVedette(\''+enVote+'\')">Au vote →</button>'
      : '<button class="cc-act cc-act-go" onclick="lancerVoteSurFiche(\''+f.id+'\')">Lancer le vote</button>';
    const tag = enVote
      ? '<span class="cc-tag cc-tag-vote">en vote</span>'
      : '<span class="cc-tag cc-tag-cand">candidate</span>';
    return '<div class="cc-item">'+ph+
      '<div class="cc-in"><div class="cc-nm">'+escH(f.nom)+' '+tag+'</div>'+
      '<div class="cc-mt">'+meta+'</div></div>'+action+'</div>';
  }).join('');
}

/* Raccourci : lancer un vote « garder/écarter » pré-rempli sur une fiche candidate. */
function lancerVoteSurFiche(lieuId){
  const f=ficheParId(lieuId); if(!f) return;
  ouvrirCreationVote();
  // index de l'intention « besoinFiche » (garder/écarter)
  const idx=INTENTIONS.findIndex(x=>x.besoinFiche);
  if(idx<0) return;
  choisirIntention(idx);
  // pré-sélectionner la fiche + pré-remplir la question
  const sel=document.getElementById('nv-fiche');
  if(sel){ sel.value=lieuId; }
  const t=document.getElementById('nv-titre');
  if(t){ t.value='On garde « '+f.nom+' » ?'; t.dataset.auto='1'; }
}

function moteurAnimation(vedette, nbVote, total){
  const ligne = (em,txt)=>'<div class="grp-pulse-line"><span class="em">'+em+'</span><span>'+txt+'</span></div>';
  const variante = arr => arr[ new Date().getDate() % arr.length ];

  const nbOuverts = RNR_props.length;
  const silenceJours = RNR_dernierMsg
    ? Math.floor((Date.now()-new Date(RNR_dernierMsg).getTime())/86400000)
    : 999;
  const aActivite = nbOuverts>0 || silenceJours < 7;

  /* État 1 — TOUT DORT : aucun vote ouvert ET silence ≥ 7 jours. Ton joueur. */
  if(nbOuverts===0 && silenceJours>=7){
    return variante([
      ligne('🌙','C\'est calme par ici… Personne n\'a lancé d\'idée cette semaine. Et si tu ouvrais le bal ?'),
      ligne('🌙','Le groupe fait la sieste. Un mot, une envie, une région — il suffit d\'une étincelle.')
    ]);
  }

  /* État 2 — DES VOTES OUVERTS EN ATTENTE de voix. Ton chaleureux complice. */
  if(nbOuverts>0){
    const manque = vedette ? Math.max(0, total - nbVote) : 0;
    if(manque>0){
      const pillTxt = nbOuverts>1 ? nbOuverts+' votes attendent leur tour'
                                  : 'La question est posée';
      return ligne('🗳️', pillTxt+' — il manque encore quelques voix pour trancher.')
           + '<span class="waiting-pill">'+nbVote+' / '+total+' ont voté</span>';
    }
    /* tout le monde a voté mais pas encore clos → on invite à conclure */
    return ligne('✅','Tout le monde s\'est exprimé. Il ne reste qu\'à trancher !');
  }

  /* État 3 — ÇA VIT : pas de vote ouvert mais activité récente (< 7 j). Ton chaleureux. */
  if(aActivite){
    return variante([
      ligne('✨','Ça bouge ! Le groupe est en pleine réflexion.'),
      ligne('✨','Belle énergie en ce moment — lancez un vote pour avancer.')
    ]);
  }
  /* filet (ne devrait pas tomber ici) */
  return ligne('🧭','Prêts pour la prochaine aventure ? Lancez une idée.');
}

/* Vignette de la fiche soumise au vote (photo + nom + région).
   Dégrade proprement si la fiche a été retirée du carnet (G4 : le vote survit). */
function vignetteFiche(lieuId){
  const f=ficheParId(lieuId);
  if(!f){
    return '<div class="q-fiche q-fiche-off"><div class="q-fiche-ph">🗺️</div>'+
      '<div class="q-fiche-in"><div class="q-fiche-nm">Fiche retirée du carnet</div>'+
      '<div class="q-fiche-mt">le vote reste valable</div></div></div>';
  }
  const ph = f.photo_url
    ? '<div class="q-fiche-ph" style="background-image:url(\''+escH(f.photo_url)+'\')"></div>'
    : '<div class="q-fiche-ph">🗺️</div>';
  return '<div class="q-fiche">'+ph+
    '<div class="q-fiche-in"><div class="q-fiche-nm">'+escH(f.nom)+'</div>'+
    '<div class="q-fiche-mt">'+escH(f.region||'')+'</div></div></div>';
}

/* ── Rendu : vedette "Question à trancher" (selon type) ── */
function rendreVedette(){
  const body=document.getElementById('q-body');
  const badge=document.getElementById('q-badge');
  const p=RNR_props.find(x=>x.id===RNR_vedetteId);
  if(!p){ badge.textContent='—'; body.innerHTML='<div class="q-empty">Aucun vote en cours.<br>Lance une question avec ➕ dans « Votes en cours ».</div>'; return; }
  badge.textContent = nbVotants(p)+'/'+RNR_nbMembres+' ont voté';

  let html='<div class="q-big">'+escH(p.titre)+'</div>';
  const sub = TYPES_VOTE[p.type].label;
  html+='<div class="q-sub">'+escH(sub)+'</div>';
  if(p.lieu_id) html+=vignetteFiche(p.lieu_id);
  const mien=monVote(p.id);

  if(p.type==='note'){
    const maVal = mien?parseInt(mien.valeur,10):0;
    html+='<div class="q-stars">';
    for(let i=1;i<=5;i++) html+='<span class="q-star'+(i<=maVal?' on':'')+'" onclick="voter(\''+p.id+'\',\''+i+'\')">★</span>';
    html+='</div>';
    const c=compteParValeur(p.id), tot=votesDe(p.id).length;
    let somme=0; Object.keys(c).forEach(k=>somme+=parseInt(k,10)*c[k]);
    if(tot) html+='<div class="q-meta"><span>Moyenne : <b>'+(somme/tot).toFixed(1)+'</b>/5 sur '+tot+' vote'+(tot>1?'s':'')+'</span></div>';
  } else if(p.type==='question'){
    html+='<div class="q-arg-wrap"><textarea id="q-libre" placeholder="Ta réponse…">'+(mien?escH(mien.valeur):'')+'</textarea>'+
          '<button class="q-close-btn" onclick="voterLibre(\''+p.id+'\')">Répondre</button></div>';
    const rep=votesDe(p.id).filter(v=>v.valeur);
    if(rep.length){ html+='<div class="q-args">'+rep.map(v=>'<div class="q-arg">'+escH(v.valeur)+'</div>').join('')+'</div>'; }
  } else {
    const opts=optionsDe(p), c=compteParValeur(p.id);
    html+='<div class="q-opts">'+opts.map(o=>{
      const n=c[o]||0, chosen=(mien&&mien.valeur===o)?' q-chosen':'';
      return '<div class="q-opt'+chosen+'" onclick="voter(\''+p.id+'\',\''+escH(o).replace(/'/g,"\\'")+'\')">'+
        '<span class="t">'+escH(o)+'</span><span class="v">'+n+' voix'+(chosen?' ✓':'')+'</span></div>';
    }).join('')+'</div>';
  }

  /* Argument optionnel (super vote argumenté D-ECH-4) sauf pour question */
  if(p.type!=='question'){
    html+='<div class="q-arg-wrap"><textarea id="q-arg" placeholder="Pourquoi ce choix ? (optionnel — ça aide le groupe)">'+(mien&&mien.argument?escH(mien.argument):'')+'</textarea></div>';
    const args=votesDe(p.id).filter(v=>v.argument);
    if(args.length) html+='<div class="q-args">'+args.map(v=>'<div class="q-arg"><b>'+escH(v.valeur)+'</b> — '+escH(v.argument)+'</div>').join('')+'</div>';
  }

  /* Échéance + clôture (tout membre peut clore — D-ECH-1) */
  html+='<div class="q-meta"><span>'+escH(echeanceTexte(p))+'</span>'+
        '<button class="q-close-btn" onclick="cloreVote(\''+p.id+'\')">Clôturer ce vote</button></div>';
  body.innerHTML=html;
}

/* ── Actions ── */
async function voter(pid, valeur){
  if(!RNR_groupeId) return;
  const argEl=document.getElementById('q-arg');
  const argument=argEl?(argEl.value||'').trim():null;
  const {error}=await sb.from('votes')
    .upsert({proposition_id:pid, votant_id:RNR_userId, valeur:valeur, argument:argument||null},
            {onConflict:'proposition_id,votant_id'});
  if(error){ console.warn('vote',error); alert('Vote non enregistré.'); return; }
  await chargerVotes();
}
async function voterLibre(pid){
  const el=document.getElementById('q-libre'); if(!el) return;
  const v=(el.value||'').trim(); if(!v) return;
  await voter(pid, v);
}
async function cloreVote(pid){
  if(!confirm('Clôturer ce vote ? Il n\'acceptera plus de voix. C\'est définitif.')) return;
  const p=RNR_props.find(x=>x.id===pid);
  const {error}=await sb.from('propositions').update({statut:'clos'}).eq('id',pid);
  if(error){ console.warn('clore',error); return; }
  /* Célébration immédiate (D-ECH-3) */
  if(p){
    const g=gagnantDe(p);
    let mot;
    if(p.type==='question') mot='Discussion close — '+g.texte+' recueillies.';
    else if(p.type==='note') mot='Verdict du groupe : '+g.texte+'.';
    else mot='C\'est décidé : '+g.texte+' ! 🎉';
    RNR_celebreEnCours=true;
    celebrer(mot);
  }
  RNR_vedetteId=null;
  await chargerVotes();
}

/* Petit moment de célébration dans le bloc vedette */
function celebrer(mot){
  const body=document.getElementById('q-body');
  const badge=document.getElementById('q-badge');
  if(badge) badge.textContent='tranché';
  if(body) body.innerHTML='<div class="q-celebr">'+escH(mot)+'</div>';
}

/* ── Création d'un vote — par INTENTION (langage humain, pas de jargon) ──
   4 intentions qui marchent à 100%. "Garder/écarter une fiche" viendra avec
   le lien au carnet. Le type technique est déduit, jamais montré.
   Étape 1 : choisir l'intention (cartes). Étape 2 : formulaire adapté → impossible de se contredire. */
const INTENTIONS = [
  { type:'choix',       titre:'Trancher entre des options', ex:'« Mer ou Montagne ? », « Quel camping ? »', besoinOptions:true },
  { type:'pour_contre', titre:'Demander un oui ou un non',   ex:'« On part en août ? », « On garde 3 nuits ? »', besoinOptions:false },
  { type:'note',        titre:'Faire noter une idée',        ex:'« Cette rando, vous la sentez comment ? » (note /5)', besoinOptions:false },
  { type:'question',    titre:'Poser une question ouverte',  ex:'« Des idées pour les soirées ? »', besoinOptions:false },
  { type:'elimination', titre:'Garder ou écarter une fiche', ex:'On tranche le sort d\'un lieu du carnet', besoinOptions:false, besoinFiche:true }
];
let NV_intention = null;

function ouvrirCreationVote(){
  NV_intention = null;
  const bg=document.createElement('div');
  bg.className='vmodal-bg'; bg.id='vmodal-bg';
  bg.onclick=e=>{ if(e.target===bg) fermerCreationVote(); };
  bg.innerHTML='<div class="vmodal" id="vmodal-inner"></div>';
  document.body.appendChild(bg);
  etapeIntention();
}
function fermerCreationVote(){ const b=document.getElementById('vmodal-bg'); if(b) b.remove(); }

/* Étape 1 : choisir l'intention via des cartes sobres */
function etapeIntention(){
  const box=document.getElementById('vmodal-inner');
  box.innerHTML='<h3>Que veux-tu demander au groupe ?</h3>'+
    '<div class="int-cards">'+
    INTENTIONS.map((it,i)=>
      '<div class="int-card" onclick="choisirIntention('+i+')">'+
        '<div class="int-t">'+escH(it.titre)+'</div>'+
        '<div class="int-ex">'+escH(it.ex)+'</div>'+
      '</div>').join('')+
    '</div>'+
    '<div class="vmodal-foot"><button class="vbtn vbtn-no" onclick="fermerCreationVote()">Annuler</button></div>';
}

/* Étape 2 : formulaire adapté à l'intention choisie */
function choisirIntention(i){
  NV_intention = INTENTIONS[i];
  const box=document.getElementById('vmodal-inner');

  /* Cas spécial : vote sur une fiche du carnet (5ᵉ intention) */
  if(NV_intention.besoinFiche){
    if(!RNR_fichesAimees.length){
      box.innerHTML='<h3>'+escH(NV_intention.titre)+'</h3>'+
        '<div class="vhint" style="margin-top:8px">Aucune fiche n\'a encore reçu de <b>❤️</b> dans le groupe. '+
        'Passe d\'abord par le <b>carnet</b> : mets un cœur sur les lieux qui te font envie. '+
        'Ce sont eux qu\'on pourra ensuite départager ici.</div>'+
        '<div class="vmodal-foot"><button class="vbtn vbtn-no" onclick="etapeIntention()">← Retour</button></div>';
      return;
    }
    let opts='<option value="">— Choisis une fiche —</option>';
    RNR_fichesAimees.forEach(f=>{
      const coeur = f.coeurs ? '  ❤️ '+f.coeurs : '';
      const lbl = f.nom + (f.region ? ' · '+f.region : '') + coeur;
      opts+='<option value="'+escH(f.id)+'">'+escH(lbl)+'</option>';
    });
    box.innerHTML='<h3>'+escH(NV_intention.titre)+'</h3>'+
      '<label>Quelle fiche soumettre au groupe ?</label>'+
      '<select id="nv-fiche" class="nv-select" onchange="majTitreFiche()">'+opts+'</select>'+
      '<label>La question</label>'+
      '<input type="text" id="nv-titre" maxlength="120" placeholder="On garde cette fiche ?">'+
      '<div class="vhint" style="margin-top:8px">Le groupe répondra <b>Garder</b> ou <b>Écarter</b>.</div>'+
      '<label>Échéance (optionnel)</label><input type="date" id="nv-date">'+
      '<div class="vhint">Tout le monde peut voter. Tu pourras clôturer quand tu veux.</div>'+
      '<div class="vmodal-foot">'+
        '<button class="vbtn vbtn-no" onclick="etapeIntention()">← Retour</button>'+
        '<button class="vbtn vbtn-go" onclick="creerVote()">Lancer</button>'+
      '</div>';
    return;
  }

  let champs='<label>Ta question</label><input type="text" id="nv-titre" maxlength="120" placeholder="'+escH(exemplePlaceholder())+'">';
  if(NV_intention.besoinOptions){
    champs+='<label>Les réponses possibles</label><div id="nv-opts">'+voptRow('','Ex. : La mer')+voptRow('','Ex. : La montagne')+'</div>'+
            '<button class="q-close-btn" onclick="ajouterOpt()" style="margin-top:4px">+ ajouter une option</button>';
  } else {
    champs+='<div class="vhint" style="margin-top:8px">'+escH(aideIntention())+'</div>';
  }
  champs+='<label>Échéance (optionnel)</label><input type="date" id="nv-date">'+
          '<div class="vhint">Tout le monde peut voter. Tu pourras clôturer quand tu veux.</div>';
  box.innerHTML='<h3>'+escH(NV_intention.titre)+'</h3>'+champs+
    '<div class="vmodal-foot">'+
      '<button class="vbtn vbtn-no" onclick="etapeIntention()">← Retour</button>'+
      '<button class="vbtn vbtn-go" onclick="creerVote()">Lancer</button>'+
    '</div>';
  const t=document.getElementById('nv-titre'); if(t) t.focus();
}
/* Pré-remplit la question quand on choisit une fiche (si l'utilisateur n'a rien tapé) */
function majTitreFiche(){
  const sel=document.getElementById('nv-fiche'), t=document.getElementById('nv-titre');
  if(!sel||!t) return;
  const f=ficheParId(sel.value);
  if(f && (!t.value || t.dataset.auto==='1')){ t.value='On garde « '+f.nom+' » ?'; t.dataset.auto='1'; }
}
function exemplePlaceholder(){
  switch(NV_intention.type){
    case 'choix': return 'Mer ou Montagne ?';
    case 'pour_contre': return 'On part en août ?';
    case 'note': return 'Cette idée de rando, vous en pensez quoi ?';
    case 'question': return 'Des idées pour les soirées ?';
    default: return 'Ta question…';
  }
}
function aideIntention(){
  switch(NV_intention.type){
    case 'pour_contre': return 'Le groupe répondra simplement Pour ou Contre.';
    case 'note': return 'Chacun donnera une note de 1 à 5. On affichera la moyenne.';
    case 'question': return 'Chacun répondra librement, en texte.';
    default: return '';
  }
}
function voptRow(val, ph){ return '<div class="vopt-row"><input type="text" maxlength="60" placeholder="'+(ph||'Ex. : une réponse possible')+'" value="'+(val||'')+'"><button class="vopt-del" onclick="this.parentNode.remove()">✕</button></div>'; }
function ajouterOpt(){ const c=document.getElementById('nv-opts'); if(c) c.insertAdjacentHTML('beforeend',voptRow('')); }

async function creerVote(){
  if(!NV_intention) return;
  const titre=(document.getElementById('nv-titre').value||'').trim();
  if(!titre){ alert('Donne une question au vote.'); return; }
  const dateStr=document.getElementById('nv-date').value;
  let options=[], lieuId=null;
  if(NV_intention.besoinFiche){
    const sel=document.getElementById('nv-fiche');
    lieuId = sel ? sel.value : '';
    if(!lieuId){ alert('Choisis une fiche à départager.'); return; }
    options=['Garder','Écarter'];        // figées (D-ECH-8 : intention, pas plomberie)
  } else if(NV_intention.besoinOptions){
    options=[...document.querySelectorAll('#nv-opts input')].map(i=>i.value.trim()).filter(Boolean);
    if(options.length<2){ alert('Mets au moins 2 options à départager.'); return; }
  }
  const row={ groupe_id:RNR_groupeId, auteur_id:RNR_userId, type:NV_intention.type, titre:titre, options:options };
  if(lieuId) row.lieu_id=lieuId;
  if(dateStr) row.ferme_le=new Date(dateStr+'T20:00:00').toISOString();
  const {data,error}=await sb.from('propositions').insert(row).select().single();
  if(error){ console.warn('creer',error); alert('Vote non créé.'); return; }
  fermerCreationVote();
  RNR_vedetteId = data ? data.id : null;
  await chargerVotes();
}

async function logout(){await sb.auth.signOut();window.location.href="index.html";}
sb.auth.onAuthStateChange(ev=>{if(ev==="SIGNED_OUT")window.location.href="index.html";});
/* le bouton Quitter du chrome (chrome.js) appelle window.logout() ci-dessus */
