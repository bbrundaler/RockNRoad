<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RockNRoad · Mon Voyage</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<script src="chrome.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
/* VOYAGE converti grammaire v2 (Charte Design v1) — chrome.js injecte la barre */
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* (270 lignes de CSS mort du prototype héros/markers/itin supprimées — prouvé zéro usage, 11/06) */

/* MAIN */
#app-main{flex:1;min-height:0;width:100%;margin-left:0;display:flex;flex-direction:column;}  /* margin-left:0 OBLIGATOIRE : neutralise le margin-left:var(--sb) legacy d'app.css */
/* Actions du voyage, logées dans l'en-tête du panneau Itinéraire */
.panel-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.tb-btn{padding:6px 13px;border-radius:var(--r-pill);font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;border:1px solid transparent;}
.tb-btn-clear{background:transparent;color:#cc4400;border-color:rgba(200,50,0,.3);}
.tb-btn-clear:hover{background:rgba(200,50,0,.1);}
.tb-btn-add{background:var(--gold);color:#1a1208;}
.tb-btn-add:hover{background:var(--gold-light);}
.tb-btn-print{background:transparent;color:var(--ink);border-color:var(--gold-a35);}
.tb-btn-print:hover{background:var(--gold-a10);}

/* CONTENU */
#voyage-content{display:flex;flex:1;overflow:hidden;}
#voyage-panel{width:320px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--surface-line);display:flex;flex-direction:column;overflow:hidden;}
#panel-header{padding:16px 16px 12px;border-bottom:1px solid var(--surface-line);flex-shrink:0;}
#panel-header h2{font-family:var(--font-title);font-size:19px;color:var(--ink);margin-bottom:2px;}
#panel-header p{font-size:12px;color:var(--ink-dim);}
#stops-list{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:var(--gold-a35) transparent;}
#panel-footer{padding:12px 16px;border-top:1px solid var(--surface-line);flex-shrink:0;background:var(--surface);}
.pf-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.pf-label{font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-dim);}
.pf-val{font-family:var(--font-title);font-size:21px;font-weight:800;color:var(--gold-text);}
.pf-val.sm{font-size:13px;}

/* STOP ITEMS */
/* étapes = mini-cartes PAPIER (encres fixes sur papier) */
.stop-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:var(--r);background:var(--paper);border:1px solid var(--paper-line);box-shadow:var(--shadow);margin-bottom:6px;cursor:grab;transition:box-shadow .15s;}
.stop-item:hover{box-shadow:var(--shadow-hover);}
.drag-handle{color:#c4b89e;font-size:14px;cursor:grab;flex-shrink:0;user-select:none;}
.stop-num{width:22px;height:22px;border-radius:50%;background:var(--gold);color:#1a1208;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;flex-shrink:0;}
.stop-info{flex:1;min-width:0;}
.stop-name{font-size:13px;font-weight:600;color:#1a1208;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stop-meta{font-size:11px;color:#6B5F4A;margin-top:1px;}
.stop-dist{font-size:10px;color:var(--gold-deep);margin-top:2px;}
.stop-remove{background:none;border:none;color:#b3a88e;font-size:16px;cursor:pointer;padding:2px 6px;border-radius:4px;flex-shrink:0;line-height:1;transition:all .15s;}
.stop-remove:hover{background:rgba(200,50,0,.12);color:#cc4400;}

/* VIDE */
.empty-voyage{display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;height:100%;}
.empty-voyage .icon{font-size:44px;margin-bottom:12px;opacity:.4;}
.empty-voyage h3{font-family:var(--font-title);font-size:18px;color:var(--ink);margin-bottom:6px;}
.empty-voyage p{font-size:13px;color:var(--ink-dim);line-height:1.6;max-width:220px;}

#map{flex:1;height:100%;}

@media print{.rnrc-nav,.rnrc-tabbar,.bsl-btn,#voyage-panel{display:none!important;}#app-main{width:100%!important;}#map{height:100vh!important;width:100vw!important;}}
</style>
</head>
<body>

<div id="auth-check">
  <div style="font-size:44px;">🐾</div>
  <h2>RockNRoad</h2>
  <p style="font-size:11px;opacity:.5;letter-spacing:2px;">Chargement...</p>
  <div class="spinner"></div>
</div>

<div id="app-main">
  <div id="voyage-content">
    <div id="voyage-panel">
      <div id="panel-header">
        <h2>Itinéraire</h2>
        <p>Glissez pour réordonner · × pour retirer</p>
        <div class="panel-actions">
          <button class="tb-btn tb-btn-add" onclick="window.location.href='carnet.html'">+ Ajouter des lieux</button>
          <button class="tb-btn tb-btn-print" onclick="window.print()">🖨️ Imprimer</button>
          <button class="tb-btn tb-btn-clear" onclick="clearAll()">🗑 Tout effacer</button>
        </div>
      </div>
      <div id="stops-list">
        <div class="empty-voyage" id="emptyVoyage" style="display:flex;">
          <div class="icon">🗺️</div>
          <h3>Voyage vide</h3>
          <p>Ajoutez des lieux depuis le Carnet en cliquant sur "🧭 Mon Voyage"</p>
        </div>
      </div>
      <div id="panel-footer">
        <div class="pf-row">
          <span class="pf-label">Distance totale</span>
          <span class="pf-val" id="totalDist">— km</span>
        </div>
        <div class="pf-row">
          <span class="pf-label">Étapes</span>
          <span class="pf-val sm" id="totalStops">0</span>
        </div>
      </div>
    </div>
    <div id="map"></div>
  </div>
</div>

<script>
const SURL='https://cazqllstxhuecoqpktwm.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhenFsbHN0eGh1ZWNvcXBrdHdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTExNTQsImV4cCI6MjA5NDk2NzE1NH0.6YYAJXG4s-h78YUp2pd7fBvQJzDprSxtSkUZTv6ZtZs';
const sb=supabase.createClient(SURL,SKEY);

let map, routeLayer;
// Source unique de vérité — tableau d'objets {uid, nom, lat, lng, region, type}
// uid = identifiant UNIQUE généré à l'ajout (pas l'id Supabase, pas l'index)
let voyage = [];

// ── Auth ──────────────────────────────────────────────────────────────────────
(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  document.getElementById('auth-check').style.display='none';
  initMap();
  initListEvents();
  loadVoyage();
})();
async function logout(){await sb.auth.signOut();window.location.href='index.html';}

// ── Carte ─────────────────────────────────────────────────────────────────────
function initMap(){
  map=L.map('map').setView([46.5,2.5],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);
  routeLayer=L.layerGroup().addTo(map);
  setTimeout(()=>map.invalidateSize(),200);
}

// ── Persistance ───────────────────────────────────────────────────────────────
function saveVoyage(){
  localStorage.setItem('rr_voyage_full', JSON.stringify(voyage));
  localStorage.setItem('rr_voyage', JSON.stringify(voyage.map(v=>v.id)));
}

function loadVoyage(){
  const raw = JSON.parse(localStorage.getItem('rr_voyage_full')||'[]');
  // Migrer les anciens formats : garantir que chaque item a un uid
  voyage = raw
    .filter(v=>v&&v.lat&&v.lng)
    .map(v=>{
      // Générer un uid unique pour chaque item sans uid
      const uid = v.uid && typeof v.uid==='string' && v.uid.length>4
        ? v.uid
        : Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2);
      return {...v, uid};
    });
  render();
}

// ── Render central (UN seul endroit qui dessine tout) ─────────────────────────
function render(){
  // Toujours vider la carte en premier — synchrone, garanti
  if(routeLayer) routeLayer.clearLayers();
  renderList();
  // Redessiner la carte seulement s'il reste des lieux
  if(voyage.length) renderMap();
}

// ── Délégation d'événements — UN seul listener permanent sur le container ─────
function initListEvents(){
  const list = document.getElementById('stops-list');

  // Bouton ✕ — délégation
  list.addEventListener('click', function(e){
    const btn = e.target.closest('.stop-remove');
    if(!btn) return;
    e.stopPropagation();
    e.preventDefault();
    const uid = btn.closest('.stop-item')?.dataset.uid;
    if(uid) removeByUid(uid);
  });

  // Drag & drop — délégation
  list.addEventListener('dragstart', e=>{
    const item = e.target.closest('.stop-item');
    if(!item) return;
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain', item.dataset.uid||'');
    item.style.opacity='0.4';
  });
  list.addEventListener('dragend', e=>{
    const item = e.target.closest('.stop-item');
    if(item) item.style.opacity='';
  });
  list.addEventListener('dragover', e=>{ e.preventDefault(); });
  list.addEventListener('drop', e=>{
    e.preventDefault();
    const target = e.target.closest('.stop-item');
    if(!target) return;
    const fromUid = e.dataTransfer.getData('text/plain');
    const toUid = target.dataset.uid;
    if(!fromUid||!toUid||fromUid===toUid) return;
    const fi = voyage.findIndex(v=>v.uid===fromUid);
    const ti = voyage.findIndex(v=>v.uid===toUid);
    if(fi<0||ti<0) return;
    const moved = voyage.splice(fi,1)[0];
    voyage.splice(ti,0,moved);
    saveVoyage();
    render();
  });
}

function renderList(){
  const list = document.getElementById('stops-list');
  const empty = document.getElementById('emptyVoyage');

  if(!voyage.length){
    // Vider uniquement les stop-items, pas l'empty
    list.querySelectorAll('.stop-item').forEach(el=>el.remove());
    list.appendChild(empty);
    empty.style.display='flex';
    document.getElementById('totalDist').textContent='— km';
    document.getElementById('totalStops').textContent='0';
    return;
  }

  // Vider uniquement les stop-items
  list.querySelectorAll('.stop-item').forEach(el=>el.remove());
  empty.style.display='none';

  voyage.forEach((item, i)=>{
    const dist = i>0 && voyage[i-1].lat && item.lat
      ? calcDist(voyage[i-1].lat, voyage[i-1].lng, item.lat, item.lng)
      : null;
    const distHtml = dist ? `<div class="stop-dist">↑ ${dist} km</div>` : '';

    const row = document.createElement('div');
    row.className='stop-item';
    row.draggable=true;
    row.dataset.uid = item.uid; // ← uid dans le DOM, pas dans un listener

    row.innerHTML=`
      <span class="drag-handle">⠿</span>
      <div class="stop-num">${i+1}</div>
      <div class="stop-info">
        <div class="stop-name">${item.nom||'—'}</div>
        <div class="stop-meta">${item.region||''} ${item.type?'· '+item.type:''}</div>
        ${distHtml}
      </div>
      <button class="stop-remove" title="Retirer">✕</button>
    `;
    list.appendChild(row);
  });

  // Totaux
  let total=0;
  for(let i=1;i<voyage.length;i++){
    const a=voyage[i-1], b=voyage[i];
    if(a.lat&&b.lat) total+=calcDist(a.lat,a.lng,b.lat,b.lng);
  }
  document.getElementById('totalDist').textContent=total>0?Math.round(total)+' km':'— km';
  document.getElementById('totalStops').textContent=voyage.length;
}

function renderMap(){
  if(!map||!routeLayer) return;
  // clearLayers déjà appelé dans render() avant renderMap()
  const pts = voyage.filter(v=>v.lat&&v.lng);
  if(!pts.length) return;

  pts.forEach((v,i)=>{
    const icon=L.divIcon({
      // pastilles SUR-CARTE (fond OSM) : couleurs invariantes par nature
      html:`<div style="background:#1A1208;color:#C8A84B;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;border:2.5px solid #C8A84B;box-shadow:0 2px 8px rgba(0,0,0,.4);">${i+1}</div>`,
      className:'',iconSize:[30,30],iconAnchor:[15,15]
    });
    L.marker([v.lat,v.lng],{icon}).addTo(routeLayer).bindPopup(`
      <div style="font-family:Inter,sans-serif;min-width:160px;">
        <div style="font-weight:700;font-size:14px;margin-bottom:4px;">${i+1}. ${v.nom||'—'}</div>
        <div style="font-size:11px;color:#888;">${v.region||''} ${v.type?'· '+v.type:''}</div>
      </div>
    `);
  });

  if(pts.length>1){
    const coords=pts.map(v=>[v.lat,v.lng]);
    L.polyline(coords,{color:'rgba(200,168,75,.2)',weight:10}).addTo(routeLayer);
    L.polyline(coords,{color:'#C8A84B',weight:3,dashArray:'10,6'}).addTo(routeLayer);
  }

  if(pts.length===1) map.setView([pts[0].lat,pts[0].lng],12);
  else map.fitBounds(pts.map(v=>[v.lat,v.lng]),{padding:[40,40]});
}

// ── Actions ───────────────────────────────────────────────────────────────────
function removeByUid(uid){
  if(!uid || typeof uid !== 'string' || uid.length < 4){
    console.warn('removeByUid: uid invalide', uid);
    return;
  }
  const before = voyage.length;
  voyage = voyage.filter(v=>v.uid!==uid);
  const after = voyage.length;
  if(before===after){
    console.warn('removeByUid: aucun item supprimé pour uid', uid);
    return;
  }
  saveVoyage();
  render();
}

function clearAll(){
  if(!confirm('Effacer tout le voyage ?')) return;
  voyage=[];
  saveVoyage();
  render();
}

// ── Haversine ─────────────────────────────────────────────────────────────────
function calcDist(lat1,lng1,lat2,lng2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

window.addEventListener('resize',()=>{if(map)map.invalidateSize();});
</script>
<script src="boussole.js" defer></script>
</body>
</html>
