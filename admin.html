<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RockNRoad · Nouvelle fiche</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--sb:215px;--gold:#C8A84B;--dark:#0f0d09;--dark2:#161410;--creme:#F7F3EC;--beige:#EDE6D8;--text:#1a1208;--muted:#6B5F4A;--pyr:#2C5016;--atl:#1a5a7a;--bou:#6B3288;--r:10px;}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);display:flex;min-height:100vh;overflow-x:hidden;}
/* body défini dans :root block */
#auth-check{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#0a1a0c,#2C5016 50%,#C8A84B);
  display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;}
#auth-check h2{font-family:'Playfair Display',serif;font-size:26px;margin:16px 0 6px;}
.spinner{width:36px;height:36px;border:3px solid rgba(200,168,75,.3);border-top-color:#C8A84B;
  border-radius:50%;animation:spin 1s linear infinite;margin:18px auto 0;}
@keyframes spin{to{transform:rotate(360deg)}}
#main{display:none;}
header{background:#0d0d0d;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(200,168,75,.15);}
.hlogo{font-family:'Playfair Display',serif;font-size:20px;color:white;text-decoration:none;display:flex;align-items:center;gap:10px;}
.hlogo span{font-size:10px;color:rgba(200,168,75,.5);letter-spacing:4px;text-transform:uppercase;font-family:Inter,sans-serif;}
nav{display:flex;gap:8px;flex-wrap:wrap;}
.hn{display:inline-flex;align-items:center;gap:6px;color:rgba(245,239,224,.5);font-size:11px;letter-spacing:1px;text-transform:uppercase;text-decoration:none;padding:8px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.08);transition:all .2s;font-family:Inter,sans-serif;}
.hn:hover,.hn.active{color:var(--gold);border-color:rgba(200,168,75,.4);}
.hbtn{background:none;border:1px solid rgba(200,168,75,.3);color:rgba(200,168,75,.7);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:7px 14px;border-radius:6px;cursor:pointer;font-family:Inter,sans-serif;}
.layout{display:grid;grid-template-columns:1fr 380px;gap:0;min-height:calc(100vh - 46px);}
.col-left{padding:28px 28px 80px;border-right:1px solid rgba(0,0,0,.08);background:var(--creme);}
.col-right{background:#f5f1ea;padding:20px 18px;position:sticky;top:46px;height:calc(100vh - 46px);overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
.page-title{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:4px;}
.page-title em{color:var(--gold);font-style:italic;}
.page-sub{color:#888;font-size:12px;margin-bottom:24px;}
.import-card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);border:2px solid transparent;transition:border-color .2s;margin-bottom:20px;}
.import-card.active{border-color:var(--gold);}
.import-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.import-label span{background:var(--gold);color:var(--dark);border-radius:50%;width:17px;height:17px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;}
.import-input-row{display:flex;gap:8px;}
.import-input{flex:1;padding:11px 14px;border:2px solid #E8DECE;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;color:var(--dark);outline:none;transition:border-color .2s;}
.import-input:focus{border-color:var(--gold);}
.import-btn{padding:11px 16px;background:var(--dark);color:var(--gold);border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.import-btn:hover{background:#333;}
.import-btn:disabled{opacity:.5;cursor:not-allowed;}
.import-hint{font-size:10px;color:#aaa;margin-top:7px;line-height:1.6;}
.import-result{display:none;background:linear-gradient(135deg,rgba(44,80,22,.05),rgba(200,168,75,.05));border:1px solid rgba(200,168,75,.2);border-radius:9px;padding:14px;margin-top:12px;}
.import-result.show{display:block;}
.ir-header{display:flex;align-items:flex-start;gap:11px;}
.ir-photo{width:56px;height:56px;border-radius:7px;object-fit:cover;flex-shrink:0;background:#ddd;}
.ir-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:2px;}
.ir-meta{font-size:11px;color:#888;}
.ir-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.ir-badge{background:rgba(44,80,22,.1);color:var(--green);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.ir-badge.gold{background:rgba(200,168,75,.15);color:#8B6914;}
/* Photos galerie import */
.ir-photos{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.ir-photos img{width:60px;height:45px;object-fit:cover;border-radius:5px;cursor:pointer;transition:transform .2s;border:2px solid transparent;}
.ir-photos img:hover{transform:scale(1.05);}
.ir-photos img.selected{border-color:var(--gold);}
/* Horaires */
.ir-horaires{margin-top:8px;font-size:10px;color:#888;line-height:1.6;}
.sep-ou{display:flex;align-items:center;gap:12px;margin:16px 0;color:#ccc;font-size:10px;font-weight:600;}
.sep-ou::before,.sep-ou::after{content:'';flex:1;height:1px;background:#e8e0d0;}
.form-card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:16px;}
.fc-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#aaa;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #f0ece4;display:flex;align-items:center;gap:8px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{margin-bottom:0;}
.fg.full{grid-column:1/-1;}
label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#666;margin-bottom:5px;}
input,select,textarea{width:100%;padding:10px 12px;border:2px solid #E8DECE;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;color:var(--dark);background:white;transition:border-color .2s;outline:none;resize:vertical;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,168,75,.08);}
textarea{min-height:80px;}
input.auto-filled{background:#fffbe8;border-color:rgba(200,168,75,.4);}
/* TAGS */
.tags-grid{display:flex;flex-wrap:wrap;gap:7px;}
.tag-opt{padding:6px 12px;border:2px solid #E8DECE;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;color:#888;user-select:none;}
.tag-opt:hover{border-color:var(--gold);color:#8B6914;}
.tag-opt.on{border-color:var(--gold);background:rgba(200,168,75,.12);color:#6B4F10;}
/* NOTES */
.notes-row{display:flex;gap:12px;}
.note-block{flex:1;}
.note-block label{margin-bottom:6px;}
.star-row{display:flex;gap:3px;}
.star{font-size:20px;cursor:pointer;color:#ddd;transition:color .15s;user-select:none;}
.star.on{color:#C8A84B;}
/* MONDE NUIT TOGGLE */
.monde-toggle{display:flex;gap:0;border-radius:10px;overflow:hidden;border:2px solid #E8DECE;margin-bottom:4px;}
.monde-btn{flex:1;padding:11px 8px;border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .25s;text-align:center;background:#faf7f0;color:#888;}
.monde-btn.activite.on{background:var(--creme);color:#1a1208;box-shadow:inset 0 0 0 2px var(--gold);}
.monde-btn.nuit.on{background:#1E1B14;color:var(--gold);box-shadow:inset 0 0 0 2px var(--gold);}
.nuit-fields{display:none;background:#faf7f0;border-radius:10px;padding:16px;margin-top:12px;border:1px solid #e8e0d0;}
.nuit-fields.show{display:block;}
.nuit-fields .fc-title-small{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;margin-bottom:12px;}
/* DOG */
.toggle-group{display:flex;gap:7px;}
.tog{flex:1;padding:9px;border:2px solid #E8DECE;border-radius:7px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;transition:all .2s;color:#aaa;}
.tog.active.yes{border-color:var(--green);background:#e8f4e8;color:var(--green);}
.tog.active.no{border-color:#cc4400;background:#ffe8e0;color:#cc4400;}
.tog.active.na{border-color:var(--gold);background:rgba(200,168,75,.1);color:#8B6914;}
/* GPS */
.gps-row{display:flex;gap:8px;align-items:flex-end;}
.gps-row .fg{flex:1;margin-bottom:0;}
.gps-btn{padding:10px 12px;background:var(--dark);color:var(--gold);border:none;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.map-mini{border-radius:7px;overflow:hidden;margin-top:10px;display:none;border:2px solid rgba(200,168,75,.2);}
.map-mini iframe{width:100%;height:140px;border:none;display:block;}
/* PHOTO */
.photo-zone{border:2px dashed #E8DECE;border-radius:9px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:#fdfaf5;position:relative;}
.photo-zone:hover{border-color:var(--gold);}
.photo-zone.has-photo{border-style:solid;border-color:var(--gold);}
.photo-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.photo-preview{width:100%;max-height:160px;object-fit:cover;border-radius:6px;display:none;}
.photo-ph{color:#ccc;font-size:11px;}
/* COLONNE DROITE */
.preview-header{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#aaa;padding-bottom:8px;border-bottom:1px solid #eee;}
.preview-card{background:white;border-radius:11px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.1);}
.pc-photo{height:140px;background:linear-gradient(135deg,#2C5016,#C8A84B);position:relative;}
.pc-photo img{width:100%;height:100%;object-fit:cover;display:none;}
.pc-photo-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;opacity:.25;}
.pc-badge{position:absolute;bottom:7px;left:9px;background:rgba(0,0,0,.55);color:white;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;}
.pc-body{padding:12px;}
.pc-name{font-family:'Playfair Display',serif;font-size:14px;margin-bottom:2px;}
.pc-meta{font-size:10px;color:#aaa;margin-bottom:6px;}
.pc-notes{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
.pc-note-g{font-size:10px;color:#888;}
.pc-note-g span{color:#C8A84B;font-weight:700;}
.pc-note-f{font-size:10px;color:#888;}
.pc-note-f span{color:#2C5016;font-weight:700;}
.pc-dog{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px;}
.pc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.pc-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:rgba(200,168,75,.1);color:#8B6914;}
.pc-comment{font-size:10px;color:#888;font-style:italic;border-left:2px solid rgba(200,168,75,.3);padding-left:8px;margin-bottom:8px;line-height:1.5;}
.pc-btns{display:flex;gap:5px;}
.pc-btn{flex:1;padding:6px;background:var(--dark);color:var(--gold);font-size:9px;font-weight:700;border:none;border-radius:5px;text-align:center;}
/* API KEY BOX */
.api-box{background:white;border-radius:10px;padding:14px 16px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.api-box-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.api-box-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;}
.api-edit-btn{font-size:10px;font-weight:700;color:var(--gold);background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.3);padding:3px 10px;border-radius:6px;cursor:pointer;text-decoration:none;transition:all .2s;}
.api-edit-btn:hover{background:rgba(200,168,75,.2);}
.api-key-display{font-family:monospace;font-size:11px;color:#888;display:flex;align-items:center;gap:8px;}
.api-key-status{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.api-key-status.ok{background:#2C5016;}
.api-key-status.empty{background:#cc4400;}
/* TIP BOX */
.tip-box{background:rgba(200,168,75,.07);border:1px solid rgba(200,168,75,.2);border-radius:8px;padding:12px 14px;}
.tip-title{font-size:10px;font-weight:700;color:#8B6914;margin-bottom:7px;}
.tip-list{list-style:none;display:flex;flex-direction:column;gap:4px;}
.tip-list li{font-size:10px;color:#5a4a32;line-height:1.5;}
/* SUBMIT */
.submit-zone{background:white;border-radius:12px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.submit-btn{width:100%;padding:14px;background:var(--dark);color:var(--gold);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:8px;cursor:pointer;transition:all .3s;}
.submit-btn:hover{background:var(--gold);color:var(--dark);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}
.toast{position:fixed;bottom:22px;right:22px;padding:12px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:1000;transform:translateY(80px);transition:transform .3s;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.toast.show{transform:translateY(0);}
.toast.success{background:#2C5016;color:white;}
.toast.error{background:#cc4400;color:white;}
.toast.info{background:var(--dark);color:var(--gold);}
@media(max-width:900px){.layout{grid-template-columns:1fr;}.col-right{display:none;}nav{display:none;}}

/* ── SIDEBAR ── */
#sidebar{
  grid-row:1/4;grid-column:1;
  background:rgba(15,13,9,.95);
  border-right:1px solid rgba(200,168,75,.1);
  display:flex;flex-direction:column;
  padding:0;
  position:relative;z-index:10;
}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(200,168,75,.08);cursor:pointer;}
.sb-logo-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:white;line-height:1;}
.sb-logo-title span{color:var(--gold);}
.sb-logo-sub{font-size:7px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:rgba(200,168,75,.4);margin-top:3px;}
.sb-nav{flex:1;padding:12px 0;display:flex;flex-direction:column;gap:2px;overflow-y:auto;scrollbar-width:none;}
.sb-nav::-webkit-scrollbar{display:none;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 8px;cursor:pointer;transition:all .2s;border-radius:8px;margin:0 8px;text-decoration:none;}
.sb-item:hover{background:rgba(200,168,75,.07);}
.sb-item.active{background:rgba(200,168,75,.1);}
.sb-icon{width:22px;height:22px;color:rgba(255,255,255,.4);transition:color .2s;flex-shrink:0;}
.sb-item:hover .sb-icon,.sb-item.active .sb-icon{color:var(--gold);}
.sb-item-label{font-size:8.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.35);transition:color .2s;text-align:center;}
.sb-item:hover .sb-item-label,.sb-item.active .sb-item-label{color:var(--gold);}
.sb-sep-icon{height:1px;background:rgba(200,168,75,.07);margin:6px 16px;}
.sb-footer{padding:14px 16px 16px;border-top:1px solid rgba(200,168,75,.07);}
.sb-quote{font-family:'Playfair Display',serif;font-size:9.5px;font-style:italic;color:rgba(200,168,75,.45);text-align:center;line-height:1.6;margin-bottom:12px;}
.sb-compass{width:60px;height:60px;margin:0 auto;display:block;opacity:.4;}

/* ── HERO MAP ── */
#hero{
  grid-row:1;grid-column:2;
  position:relative;overflow:hidden;
}
#hero-bg{
  position:absolute;inset:0;
  background:
    url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=80') center/cover no-repeat;
  transform:scale(1.05);
  animation:slowzoom 30s ease-in-out infinite alternate;
}
@keyframes slowzoom{from{transform:scale(1.05);}to{transform:scale(1.12);}}
#hero-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(to right, rgba(15,13,9,.5) 0%, rgba(15,13,9,.1) 50%, rgba(15,13,9,.6) 100%),
    linear-gradient(to bottom, rgba(15,13,9,.3) 0%, transparent 40%, rgba(15,13,9,.4) 100%);
}

/* Header */
#hero-header{
  position:absolute;top:0;left:0;right:0;
  padding:24px 28px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:3;
}
.hero-greeting h1{
  font-family:'Playfair Display',serif;
  font-size:32px;font-weight:700;color:white;line-height:1.1;
}
.hero-greeting p{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-style:italic;color:var(--cream-dim);margin-top:4px;
}
.hero-actions{display:flex;align-items:center;gap:12px;}
.avatars{display:flex;}
.avatar{width:34px;height:34px;border-radius:50%;border:2px solid rgba(200,168,75,.6);overflow:hidden;margin-left:-8px;background:var(--dark-3);}
.avatar:first-child{margin-left:0;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.btn-share{
  padding:9px 18px;background:var(--gold);color:var(--dark);
  border:none;border-radius:20px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.5px;
  display:flex;align-items:center;gap:7px;transition:all .2s;
  white-space:nowrap;
}
.btn-share:hover{background:var(--gold-light);transform:translateY(-1px);}

/* SVG Route */
#route-svg{position:absolute;inset:0;z-index:2;pointer-events:none;}

/* Markers */
.marker{
  position:absolute;z-index:3;
  display:flex;align-items:center;gap:8px;
  transform:translate(-50%,-50%);
  cursor:pointer;
}
.marker-circle{
  width:32px;height:32px;border-radius:50%;
  background:var(--dark-2);border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:13px;font-weight:700;
  color:var(--gold);flex-shrink:0;
  box-shadow:0 0 20px rgba(200,168,75,.3);
  transition:all .25s;
}
.marker:hover .marker-circle{background:var(--gold);color:var(--dark);transform:scale(1.15);}
.marker.active .marker-circle{background:var(--gold);color:var(--dark);box-shadow:0 0 30px rgba(200,168,75,.5);}
.marker-label{
  font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;
  color:white;text-shadow:0 1px 8px rgba(0,0,0,.8);white-space:nowrap;
}
.marker-sub{font-size:10px;color:var(--cream-dim);font-style:normal;display:block;}

/* Citation sur la carte */
#map-citation{
  position:absolute;left:28px;bottom:28px;z-index:3;
  max-width:220px;
}
#map-citation p{
  font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;
  color:rgba(245,239,224,.7);line-height:1.6;text-shadow:0 1px 8px rgba(0,0,0,.6);
}

/* ── RIGHT PANEL ── */
#panel{
  grid-row:1;grid-column:3;
  background:rgba(20,17,12,.88);
  border-left:1px solid rgba(200,168,75,.12);
  backdrop-filter:blur(24px);
  display:flex;flex-direction:column;
  overflow-y:auto;scrollbar-width:none;
}
#panel::-webkit-scrollbar{display:none;}

.panel-etape-header{
  padding:16px 20px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.panel-etape-label{
  font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);
  display:flex;align-items:center;gap:5px;
}
.panel-etape-label::before{content:'📍';font-size:10px;}
.panel-etape-dots{display:flex;gap:4px;}
.panel-dot{width:5px;height:5px;border-radius:50%;background:rgba(200,168,75,.2);}
.panel-dot.active{background:var(--gold);width:14px;border-radius:3px;}

.panel-photo{
  margin:14px 20px 0;border-radius:10px;overflow:hidden;
  height:170px;position:relative;flex-shrink:0;
}
.panel-photo-img{
  width:100%;height:100%;
  background:url('https://images.unsplash.com/photo-1510672981848-a1c4f1cb5ccf?w=700&q=80') center/cover;
}
.panel-photo-badge{
  position:absolute;top:10px;left:10px;
  background:rgba(15,13,9,.75);backdrop-filter:blur(8px);
  border:1px solid rgba(200,168,75,.25);
  padding:4px 10px;border-radius:20px;
  font-size:9px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--gold);
}

.panel-body{padding:14px 20px;flex:1;}
.panel-etape-num{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--gold);margin-bottom:3px;}
.panel-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:white;line-height:1.2;margin-bottom:8px;}
.panel-desc{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--cream-dim);line-height:1.6;margin-bottom:14px;}

.panel-meta{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.panel-meta-row{display:flex;align-items:center;gap:10px;}
.panel-meta-icon{width:20px;height:20px;opacity:.6;flex-shrink:0;}
.panel-meta-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(200,168,75,.6);min-width:70px;}
.panel-meta-val{font-size:12px;color:var(--cream-dim);}

.panel-weather{
  display:flex;gap:10px;margin-bottom:14px;
  padding:10px 14px;background:rgba(200,168,75,.05);
  border-radius:8px;border:1px solid rgba(200,168,75,.1);
}
.panel-weather-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--cream-dim);}
.panel-weather-item span{font-size:15px;}

.panel-journal{
  padding:12px 14px;background:rgba(200,168,75,.04);
  border-radius:8px;border:1px solid rgba(200,168,75,.08);
  margin-bottom:12px;
}
.panel-journal-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.panel-journal-text{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--cream-dim);line-height:1.6;}

.panel-photos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.panel-photo-thumb{border-radius:6px;overflow:hidden;aspect-ratio:4/3;}
.panel-photo-thumb div{width:100%;height:100%;background-size:cover!important;background-position:center!important;transition:transform .3s;}
.panel-photo-thumb:hover div{transform:scale(1.08);}

/* ── STATS BAR ── */
#stats-bar{
  grid-row:2;grid-column:2/4;
  background:rgba(10,8,5,.95);
  border-top:1px solid rgba(200,168,75,.1);
  display:flex;align-items:center;
  padding:0 28px;
  gap:0;
  position:relative;z-index:5;
}
.stats-quote{
  flex:1;
  font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;
  color:rgba(200,168,75,.5);line-height:1.4;padding-right:28px;
  border-right:1px solid rgba(200,168,75,.1);
}
.stats-items{display:flex;gap:0;flex:2;}
.stat-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 20px;border-right:1px solid rgba(200,168,75,.08);gap:3px;
}
.stat-item:last-child{border-right:none;}
.stat-icon{font-size:18px;opacity:.7;margin-bottom:2px;}
.stat-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);line-height:1;}
.stat-label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(200,168,75,.4);}
.stats-badge{
  width:58px;height:58px;border-radius:50%;
  border:1.5px solid rgba(200,168,75,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin-left:20px;flex-shrink:0;
}
.stats-badge-rnr{font-family:'Playfair Display',serif;font-size:13px;font-weight:900;color:var(--gold);letter-spacing:1px;}
.stats-badge-sub{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(200,168,75,.4);}

/* ── CARDS ITINÉRAIRE ── */
#itineraire{
  grid-row:3;grid-column:2/4;
  background:rgba(15,13,9,.97);
  border-top:1px solid rgba(200,168,75,.08);
  padding:14px 0;
  position:relative;z-index:5;
}
.itin-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;margin-bottom:12px;
}
.itin-title{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.itin-link{font-size:11px;color:rgba(200,168,75,.5);cursor:pointer;transition:color .2s;display:flex;align-items:center;gap:4px;}
.itin-link:hover{color:var(--gold);}

.itin-track{
  display:flex;gap:10px;padding:0 28px;
  overflow-x:auto;scrollbar-width:none;
  padding-bottom:4px;
}
.itin-track::-webkit-scrollbar{display:none;}

/* Timeline line */
.itin-timeline{
  position:absolute;bottom:24px;left:28px;right:28px;
  height:2px;background:rgba(200,168,75,.1);
}
.itin-progress{
  height:100%;background:linear-gradient(to right, var(--gold), rgba(200,168,75,.3));
  width:37%;border-radius:1px;
}
.itin-timeline-dots{
  position:absolute;top:50%;transform:translateY(-50%);
  width:100%;display:flex;justify-content:space-between;padding:0 0;
}
.itin-tdot{width:7px;height:7px;border-radius:50%;background:rgba(200,168,75,.2);border:1.5px solid rgba(200,168,75,.3);flex-shrink:0;}
.itin-tdot.done{background:var(--gold);border-color:var(--gold);}
.itin-tdot.active{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(200,168,75,.5);width:10px;height:10px;}

.card-stop{
  flex-shrink:0;width:140px;border-radius:10px;overflow:hidden;
  position:relative;cursor:pointer;transition:all .25s;
  border:2px solid transparent;height:100px;
}
.card-stop:hover{transform:translateY(-3px);border-color:rgba(200,168,75,.3);}
.card-stop.active{border-color:var(--gold);box-shadow:0 0 20px rgba(200,168,75,.25);}
.card-stop-bg{width:100%;height:100%;background-size:cover!important;background-position:center!important;position:relative;}
.card-stop-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(0,0,0,.65) 100%);}
.card-stop-jour{position:absolute;top:8px;left:9px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(200,168,75,.9);}
.card-stop-info{position:absolute;bottom:8px;left:9px;right:9px;}
.card-stop-city{font-size:13px;font-weight:700;color:white;line-height:1.1;}
.card-stop-region{font-size:9px;color:rgba(245,239,224,.6);margin-top:1px;}

/* Nav arrows */
.itin-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.2);
  color:var(--gold);width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;transition:all .2s;z-index:2;
}
.itin-nav:hover{background:rgba(200,168,75,.2);}
#itin-prev{left:4px;top:60px;}
#itin-next{right:368px;top:60px;}

/* ── ANIMATIONS ── */
@keyframes fadeup{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fadeup{animation:fadeup .6s ease forwards;}
.fadeup-2{animation:fadeup .6s .15s ease forwards;opacity:0;}
.fadeup-3{animation:fadeup .6s .3s ease forwards;opacity:0;}
.fadeup-4{animation:fadeup .6s .45s ease forwards;opacity:0;}

/* Route SVG animation */
.sb-user{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;background:rgba(255,255,255,.03);margin-bottom:6px;}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:#C8A84B;color:#0f0d09;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.sb-user-name{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.sb-user-role{font-size:9.5px;color:rgba(255,255,255,.4);margin-top:1px;}
.sb-logout{width:100%;padding:6px;background:rgba(200,168,75,.06);border:1px solid rgba(200,168,75,.2);color:rgba(200,168,75,.75);font-size:10px;font-weight:600;letter-spacing:1px;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.sb-logout:hover{background:rgba(200,168,75,.14);color:#C8A84B;}
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:190;}
.app-main{margin-left:var(--sb);width:calc(100vw - var(--sb));min-height:100vh;background:var(--creme);display:flex;flex-direction:column;}
.page-topbar{background:rgba(247,243,236,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--beige);padding:0 24px;height:46px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.page-topbar-title{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--gold);}
@media(max-width:768px){#sidebar{transform:translateX(-100%);transition:transform .25s;}#sidebar.open{transform:translateX(0);}#sb-overlay.open{display:block;}#sb-toggle{display:block!important;}.app-main{margin-left:0;width:100%;}.layout{grid-template-columns:1fr!important;}.col-right{display:none!important;}}
</style>
</head>
