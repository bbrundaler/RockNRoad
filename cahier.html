<html lang="fr">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=Caveat:wght@600;700&family=Permanent+Marker&family=Cinzel:wght@600;700&family=Special+Elite&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

/* ── THÈMES DU CAHIER (B69, 17/07) ──────────────────────────────────────
   Un seul moteur de rendu (render()/pageFicheComplete() inchangés) reskiné
   par variables CSS selon data-theme sur <body>. Trois thèmes possibles :
   'edition' (défaut, dans la charte RockNRoad — quasi identique à avant),
   'kraft' (Carnet bricolé, rupture totale de palette/typo),
   'atlas' (Atlas d'expédition, rupture totale de palette/typo).
   Le choix est un attribut du VOYAGE (voyages.cahier_theme), pas un
   réglage personnel : tout le groupe voit et imprime le même Cahier. ── */
body{ --cah-paper:#FAF8F3; --cah-paper-line:#D8CFC0; --cah-paper-soft:rgba(255,255,255,.5);
  --cah-ink:#1A1712; --cah-ink-dim:#6b6257;
  --cah-accent:#8B6914; --cah-accent-soft:rgba(139,105,20,.10); --cah-accent-line:rgba(139,105,20,.25);
  --cah-font-title:'Playfair Display',serif; --cah-font-hand:'Playfair Display',serif; --cah-font-body:'Inter',sans-serif;
  --cah-spirale:#8a8272;
}
body[data-theme="kraft"]{ --cah-paper:#FFFFFF; --cah-paper-line:#E5DCC8; --cah-paper-soft:rgba(255,255,255,.7);
  --cah-ink:#2B1D0F; --cah-ink-dim:#6b5a3f;
  --cah-accent:#E8623D; --cah-accent-soft:rgba(232,98,61,.09); --cah-accent-line:rgba(124,139,93,.4);
  --cah-font-title:'Permanent Marker',cursive; --cah-font-hand:'Caveat',cursive; --cah-font-body:'Inter',sans-serif;
  --cah-spirale:#7C8B5D;
}
body[data-theme="atlas"]{ --cah-paper:#EDE4D0; --cah-paper-line:rgba(32,36,42,.16); --cah-paper-soft:rgba(255,255,255,.35);
  --cah-ink:#20242A; --cah-ink-dim:#6E8F84;
  --cah-accent:#B87333; --cah-accent-soft:rgba(184,115,51,.09); --cah-accent-line:rgba(184,115,51,.3);
  --cah-font-title:'Cinzel',serif; --cah-font-hand:'Special Elite',monospace; --cah-font-body:'Inter',sans-serif;
  --cah-spirale:#6E8F84;
}

body{margin:0;font-family:var(--font-body);color:var(--ink);background:#7d746a;}

#auth-check{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:9999;color:var(--ink);}
.auth-spinner{width:28px;height:28px;border:3px solid var(--gold-a20);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.toolbar{position:sticky;top:56px;z-index:50;background:var(--chrome-bg);color:var(--chrome-ink);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.toolbar h1{font-family:var(--font-title);font-size:16px;margin:0;font-weight:600;}
.toolbar p{margin:0;font-size:11px;color:var(--chrome-ink-dim);}
.btn-print{background:var(--gold);color:var(--chrome-bg);border:none;padding:10px 20px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--font-body);}
.btn-print:hover{background:var(--gold-light);}
.theme-pick{display:flex;align-items:center;gap:8px;}
.theme-pick label{font-size:11px;color:var(--chrome-ink-dim);white-space:nowrap;}
.theme-pick select{font-family:var(--font-body);font-size:12.5px;font-weight:600;padding:7px 10px;border-radius:7px;
  border:1px solid var(--gold-a35,rgba(200,168,75,.35));background:var(--chrome-bg);color:var(--gold-light);cursor:pointer;}
@media print{ .theme-pick{display:none;} }

#pages{padding:20px 0 60px;}
.page{width:210mm;min-height:297mm;margin:16px auto;background:var(--cah-paper);position:relative;overflow:hidden;box-shadow:0 10px 34px rgba(0,0,0,.4);page-break-after:always;
  background-image:radial-gradient(ellipse at top left, var(--cah-accent-soft), transparent 60%), repeating-linear-gradient(rgba(26,18,8,.015) 0 1px, transparent 1px 3px);
  color:var(--cah-ink);}
/* Le Carnet bricolé est sur papier blanc franc (retour Bruno 17/07) : pas de
   texture de lignes ni de halo doré, contrairement aux deux autres thèmes. */
body[data-theme="kraft"] .page{background-image:none;}
@media print{ #auth-check,.toolbar{display:none !important;} body{background:none;} .page{margin:0;box-shadow:none;} }

/* ── MOBILE (10/07, retour Bruno) : la page A4 (210mm) n'avait AUCUNE règle
   mobile — elle s'affichait à sa largeur réelle quel que soit l'écran. Deux
   symptômes d'un coup : il fallait zoomer pour tout voir (texte écrasé), et
   le débordement horizontal faisait glisser la barre de menu (position:sticky
   = fixée verticalement, PAS horizontalement — elle suit le défilement latéral
   du contenu qui déborde). On met la page à l'échelle de l'écran plutôt que de
   redéfinir chaque taille de police une par une : proportions A4 gardées,
   plus aucun débordement possible.
   (10/07, 2e retour) : centrage par margin:auto échoue sur une boîte PLUS
   LARGE que son conteneur (les navigateurs ramènent les marges auto à 0 →
   la page collait à un bord). left:50% + translateX(-50%) centre sur la
   position réelle, quelle que soit la largeur de la boîte avant mise à l'échelle. ── */
@media (max-width:850px){
  body{overflow-x:hidden;}
  #pages{overflow-x:hidden;}
  .page{
    --pg-echelle: calc((100vw - 20px) / 210mm);
    position:relative;
    left:50%;
    margin-left:0;
    transform:translateX(-50%) scale(var(--pg-echelle));
    transform-origin:top center;
    margin-bottom:calc(-297mm * (1 - var(--pg-echelle)) + 14px);
  }
}

.spirale{position:absolute;left:10px;top:30px;bottom:30px;width:14px;display:flex;flex-direction:column;justify-content:space-between;z-index:5;}
.spirale .ring{width:14px;height:14px;border-radius:50%;border:2.5px solid var(--cah-spirale);background:transparent;box-shadow:inset 0 0 0 3px var(--cah-paper);}
body[data-theme="atlas"] .spirale{display:none;} /* un carnet d'expédition relié, pas à spirale */

.cover-edition{display:flex;flex-direction:column;color:var(--cah-ink);}
.cover-edition .e-mast{padding:44px 50px 0;text-align:center;}
.cover-edition .e-rule{width:38px;height:1px;background:var(--cah-accent);margin:0 auto 14px;}
.cover-edition .e-eyebrow{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--cah-accent);font-weight:600;}
.cover-edition .e-title{font-family:var(--cah-font-title);font-weight:700;font-size:42px;line-height:1.1;margin:20px 0 10px;color:var(--cah-ink);}
.cover-edition .e-sub{font-family:var(--cah-font-title);font-style:italic;font-size:14px;color:var(--cah-ink-dim);margin:0 0 28px;}
.cover-edition .e-photo-band{flex:1;background:linear-gradient(160deg,#D8CBA8,#8b7245 65%,#5c4a30);background-size:cover;background-position:center;margin:0 50px;border-radius:3px;min-height:220px;}
.cover-edition .e-stats{display:flex;padding:24px 50px 40px;}
.cover-edition .e-stat{flex:1;text-align:center;border-left:1px solid var(--cah-paper-line);padding:0 8px;}
.cover-edition .e-stat:first-child{border-left:none;}
.cover-edition .e-stat b{display:block;font-family:var(--cah-font-title);font-size:19px;color:var(--cah-ink);}
.cover-edition .e-stat span{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--cah-ink-dim);}

/* ── Couverture — thème Carnet bricolé (B69) : rupture totale de palette,
   plus aucun or/noir de la charte. Papier blanc, bande kraft, marqueur. ── */
/* (17/07, 4e retour Bruno : « ça reste fade », centrer une petite pile ne
   suffisait toujours pas) — changement de logique : la grande photo REMPLIT
   tout l'espace restant (flex:1, comme la bande photo de l'Édition), les
   photos secondaires et les badges se posent DESSUS comme des stickers.
   Il ne peut plus y avoir de vide : la photo prend toute la place dispo,
   qu'elle qu'en soit la hauteur réelle de la page. */
.cover-kraft{padding:0;color:#2B1D0F;display:flex;flex-direction:column;min-height:297mm;
  background-image:radial-gradient(rgba(43,29,15,.09) 1px, transparent 1.4px);background-size:16px 16px;background-position:6px 6px;}
.cover-kraft .k-band{height:66px;flex-shrink:0;background:repeating-linear-gradient(45deg,#E8623D,#E8623D 14px,#D9542F 14px,#D9542F 28px);}
.cover-kraft .k-body{padding:32px 40px 40px;flex:1;display:flex;flex-direction:column;position:relative;}
.cover-kraft .k-eyebrow{font-family:'Special Elite',monospace;font-size:11.5px;letter-spacing:.1em;color:#7C8B5D;text-transform:uppercase;}
.cover-kraft .k-title{font-family:'Permanent Marker',cursive;font-size:38px;line-height:1.18;color:#2B1D0F;margin:14px 0 0;transform:rotate(-1deg);}
.cover-kraft .k-tagline{font-family:'Caveat',cursive;font-size:19px;color:#7C8B5D;margin:6px 0 0;transform:rotate(-.6deg);}
.cover-kraft .k-stamp{position:absolute;top:34px;right:44px;width:88px;height:88px;border-radius:50%;border:2.5px dashed #8B3A2E;
  color:#8B3A2E;display:flex;align-items:center;justify-content:center;text-align:center;font-family:'Special Elite',monospace;
  font-size:9.5px;letter-spacing:.05em;line-height:1.5;transform:rotate(9deg);opacity:.8;z-index:3;}
.cover-kraft .k-doodle{position:absolute;opacity:.55;z-index:1;}
.cover-kraft .k-photo-zone{flex:1;position:relative;margin:26px 6px 46px;}
.cover-kraft .k-hero{position:absolute;inset:0;background-size:cover;background-position:center;border:10px solid #fff;box-shadow:0 18px 36px rgba(0,0,0,.3);}
.cover-kraft .k-hero-empty{position:absolute;inset:0;border:10px solid #fff;box-shadow:0 18px 36px rgba(0,0,0,.22);
  background:repeating-linear-gradient(135deg,#F6EFDC,#F6EFDC 20px,#EFE1BE 20px,#EFE1BE 40px);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;color:#B99A5E;font-family:'Caveat',cursive;font-size:22px;text-align:center;}
.cover-kraft .k-hero-cap{position:absolute;left:24px;bottom:0;transform:translateY(50%) rotate(-2deg);background:#fff;padding:7px 16px;
  box-shadow:0 5px 12px rgba(0,0,0,.2);font-family:'Caveat',cursive;font-size:17px;color:#2B1D0F;z-index:3;max-width:70%;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cover-kraft .k-accent{position:absolute;top:-26px;left:-20px;width:150px;height:130px;background:#fff;padding:8px 8px 8px;
  box-shadow:0 12px 24px rgba(0,0,0,.3);transform:rotate(-8deg);z-index:2;}
.cover-kraft .k-accent .k-poly-photo{width:100%;height:100%;background-size:cover;background-position:center;}
.cover-kraft .k-poly-tape{position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-4deg);width:54px;height:18px;box-shadow:0 2px 4px rgba(0,0,0,.18);}
.cover-kraft .k-poly-tape.mint{background:repeating-linear-gradient(90deg,#8FB39A,#8FB39A 6px,#7CA087 6px,#7CA087 12px);}
.cover-kraft .k-poly-tape.mustard{background:repeating-linear-gradient(90deg,#E8A93B,#E8A93B 6px,#D89A2C 6px,#D89A2C 12px);}
.cover-kraft .k-sticker-row{position:absolute;bottom:-24px;right:18px;display:flex;gap:16px;z-index:3;}
.cover-kraft .k-badge{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;
  font-family:'Permanent Marker',cursive;color:#fff;box-shadow:0 6px 14px rgba(0,0,0,.3);line-height:1.15;font-size:11px;border:3px solid #fff;}

/* ── Couverture — thème Atlas d'expédition (B69) : bleu nuit / laiton / vert-de-gris. ── */
/* (17/07, 4e retour) : la carte et la planche photo grandissent elles-mêmes
   (flex, comme la photo Kraft) plutôt que de garder une hauteur fixe au
   milieu d'une page qui, elle, ne l'est pas — fini le vide résiduel. */
.cover-atlas{background:#141C26;color:#D9C9A0;position:relative;padding:44px 40px;display:flex;flex-direction:column;min-height:297mm;
  background-image:repeating-linear-gradient(rgba(217,201,160,.05) 0 1px, transparent 1px 34px),
                    repeating-linear-gradient(90deg, rgba(217,201,160,.05) 0 1px, transparent 1px 34px);}
.cover-atlas .a-corner{position:absolute;width:20px;height:20px;border-color:rgba(217,201,160,.5);pointer-events:none;}
.cover-atlas .a-corner.tl{top:16px;left:16px;border-top:1.5px solid;border-left:1.5px solid;}
.cover-atlas .a-corner.tr{top:16px;right:16px;border-top:1.5px solid;border-right:1.5px solid;}
.cover-atlas .a-corner.bl{bottom:16px;left:16px;border-bottom:1.5px solid;border-left:1.5px solid;}
.cover-atlas .a-corner.br{bottom:16px;right:16px;border-bottom:1.5px solid;border-right:1.5px solid;}
.cover-atlas .a-watermark{position:absolute;top:50%;left:50%;width:460px;height:460px;transform:translate(-50%,-50%);opacity:.045;pointer-events:none;}
.cover-atlas .a-corps{flex:1;display:flex;flex-direction:column;position:relative;}
.cover-atlas .a-eyebrow{font-family:'Special Elite',monospace;font-size:10.5px;letter-spacing:.16em;color:#6E8F84;text-transform:uppercase;}
.cover-atlas .a-title{font-family:'Cinzel',serif;font-weight:700;font-size:34px;letter-spacing:.02em;line-height:1.3;color:#D9C9A0;margin:18px 0 6px;text-transform:uppercase;}
.cover-atlas .a-title-rule{width:100%;height:1px;background:linear-gradient(90deg,#B87333,transparent);margin-bottom:10px;}
.cover-atlas .a-coords{font-family:'Special Elite',monospace;font-size:10.5px;color:#B87333;letter-spacing:.05em;margin-bottom:22px;}
.cover-atlas .a-route-strip{position:relative;flex:1;min-height:90px;margin-bottom:22px;}
.cover-atlas .a-route-strip svg{width:100%;height:100%;}
.cover-atlas .a-route-lbl{position:absolute;top:100%;transform:translateX(-50%);font-family:'Special Elite',monospace;font-size:8px;
  color:#8a97a3;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap;margin-top:4px;text-align:center;}
.cover-atlas .a-photo-plate{flex:2;width:100%;margin:0 0 22px;border:1.5px solid rgba(217,201,160,.35);padding:9px;
  background:rgba(217,201,160,.03);display:flex;flex-direction:column;min-height:180px;}
.cover-atlas .a-photo-plate .ph{flex:1;background-size:cover;background-position:center;filter:sepia(.5) contrast(1.05) brightness(.95);}
.cover-atlas .a-photo-plate-empty{flex:1;background:repeating-linear-gradient(135deg,rgba(217,201,160,.05),rgba(217,201,160,.05) 20px,transparent 20px,transparent 40px);
  display:flex;align-items:center;justify-content:center;font-family:'Special Elite',monospace;font-size:10px;color:#5a6570;letter-spacing:.06em;text-transform:uppercase;}
.cover-atlas .a-photo-cap{font-family:'Special Elite',monospace;font-size:8.5px;letter-spacing:.04em;color:#8a97a3;text-align:center;margin-top:7px;text-transform:uppercase;flex-shrink:0;}
.cover-atlas .a-plate{border-top:1px solid rgba(217,201,160,.25);border-bottom:1px solid rgba(217,201,160,.25);padding:16px 0;display:flex;justify-content:space-around;
  font-family:'Special Elite',monospace;font-size:10px;color:#8a97a3;letter-spacing:.04em;margin-bottom:20px;flex-shrink:0;}
.cover-atlas .a-plate b{color:#D9C9A0;font-family:'Cinzel',serif;font-size:16px;display:block;margin-bottom:2px;}
.cover-atlas .a-footnote{text-align:center;font-family:'Special Elite',monospace;font-size:9px;letter-spacing:.08em;color:#5a6570;text-transform:uppercase;}
.cover-atlas .a-compass{position:absolute;top:44px;right:40px;width:64px;height:64px;opacity:.7;}

.day-page{padding:36px 40px 36px 54px;display:flex;flex-direction:column;}
.day-head{display:flex;align-items:baseline;gap:14px;margin-bottom:4px;}
.day-num-label{font-family:var(--cah-font-hand);font-size:28px;color:var(--cah-accent);transform:rotate(-3deg);display:inline-block;}
.day-title{font-family:var(--cah-font-title);font-size:26px;font-weight:700;color:var(--cah-ink);}
.day-sub{font-size:11.5px;color:var(--cah-ink-dim);margin:0 0 16px;padding-left:2px;}
body[data-theme="atlas"] .day-num-label,body[data-theme="atlas"] .day-title{text-transform:uppercase;letter-spacing:.02em;}

/* ── Flourish masthead — thème Édition uniquement (17/07, retour Bruno : la
   page réelle ne ressemblait pas à la maquette éditoriale approuvée). Un
   grand chiffre en contour + une ligne de séparation sous l'entête, comme
   sur la maquette ; les autres thèmes gardent leur propre signature. ── */
.day-num-ghost{display:none;}
body[data-theme="edition"] .day-num-ghost{display:inline-block;font-family:var(--cah-font-title);font-size:52px;font-weight:700;
  line-height:.8;color:transparent;-webkit-text-stroke:1.2px var(--cah-accent);order:-1;}
body[data-theme="edition"] .day-num-label{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  transform:none;color:var(--cah-accent);}
body[data-theme="edition"] .day-head{align-items:center;gap:16px;border-bottom:1px solid var(--cah-paper-line);padding-bottom:16px;margin-bottom:14px;}
body[data-theme="edition"] .gf-desc::first-letter{font-family:var(--cah-font-title);font-size:2.7em;float:left;line-height:.72;
  padding:4px 6px 0 0;color:var(--cah-accent);}
.day-grid{display:grid;grid-template-columns:1fr 1.15fr;gap:24px;flex:1;min-height:0;}

.visuel-block{position:relative;}
.visuel-frame{border:1.5px solid rgba(26,18,8,.09);border-radius:4px;padding:14px;background:rgba(255,255,255,.4);min-height:200px;display:flex;align-items:center;justify-content:center;}
.visuel-photo{width:100%;height:180px;border-radius:4px;background-size:cover;background-position:center;}
.visuel-caption{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-dim);margin-top:6px;padding:0 4px;}

.narrative-label{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cah-accent);margin:0 0 4px;}
.editable-text{width:100%;border:none;background:transparent;font-family:var(--cah-font-body);font-size:13px;line-height:1.6;color:var(--cah-ink);resize:vertical;min-height:80px;padding:0;border-bottom:1px dashed rgba(26,18,8,.15);}
.editable-text:focus{outline:none;border-bottom-color:var(--cah-accent);}
.editable-text::placeholder{color:var(--cah-ink-dim);font-style:italic;}
@media print{ .editable-text{border-bottom:none;} }

.box{border:1.5px solid var(--cah-paper-line);border-radius:8px;padding:11px 13px;margin:14px 0;background:var(--cah-paper-soft);}
.box-t{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cah-accent);margin:0 0 7px;}
.infos-row{display:flex;justify-content:space-between;font-size:12px;padding:2.5px 0;}
.infos-row span:first-child{color:var(--cah-ink-dim);}

.day-footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--cah-paper-line);display:flex;justify-content:space-between;font-size:10.5px;color:var(--cah-ink-dim);}

/* La page de clôture reste volontairement identique dans les 3 thèmes — un
   « signature moment » sombre + or partagé, comme le chrome du site. */
.closing{background:linear-gradient(160deg,#161410,#0f0d09);color:#F5EFE0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px;}
.closing h2{font-family:'Playfair Display',serif;font-size:38px;margin:0 0 10px;}
.closing p{color:rgba(245,239,224,.7);max-width:420px;margin:0 0 36px;font-size:13px;}
.closing-stats{display:flex;gap:44px;}
.closing-stats .stat b{display:block;font-family:'Playfair Display',serif;font-size:30px;color:#E8C86B;}
.closing-stats .stat span{font-size:11px;color:rgba(245,239,224,.6);text-transform:uppercase;letter-spacing:.08em;}

.empty-state{padding:60px;text-align:center;color:var(--cah-ink-dim);font-size:13px;}

/* Page Équipe (08/07, refonte 17/07 — retour Bruno : « tout aussi triste »).
   En-tête avec ligne de séparation + accroche, avatars agrandis et cadrés
   selon le thème (médaillon or/édition, polaroid léger/kraft, médaille
   laiton/atlas), cartes avec un peu de vie plutôt que des rectangles sages. */
.team-page{padding:54px 46px;display:flex;flex-direction:column;min-height:297mm;}
body[data-theme="kraft"] .team-page{background-image:radial-gradient(rgba(43,29,15,.09) 1px, transparent 1.4px);background-size:16px 16px;background-position:6px 6px;}

<script>
// Chargement résilient de Supabase (07/07, retour Bruno) : le CDN jsdelivr a
// échoué deux fois de suite chez lui, même après rechargement forcé — plutôt
// que de dépendre d'une seule source, on tente une seconde adresse (unpkg)
// avant d'afficher un vrai message d'échec. Déclenché en JS pur (jamais via
// des attributs onload/onerror en HTML) pour garantir que demarrerCahier()
// existe déjà quand on l'appelle.
function rnrChargerScript(src, onOk, onKo){
  const s=document.createElement('script');
  s.src=src; s.onload=onOk; s.onerror=onKo;
  document.head.appendChild(s);
}
function rnrEchecFinalSupabase(){
  document.getElementById('auth-check').style.display='none';
  document.getElementById('pages').innerHTML='<div class="empty-state">⚠️ Impossible de charger la bibliothèque nécessaire au Cahier, même en essayant deux sources différentes.<br><br>Ça pointe vers un blocage réseau chez toi (bloqueur de pub/traqueurs, VPN, ou pare-feu) plutôt qu\'un souci du site — les autres pages utilisent la même bibliothèque avec succès. Essaie de désactiver un éventuel bloqueur pour ce site, ou un autre réseau.</div>';
}
function rnrChargerSupabaseSecours(){
  rnrChargerScript('https://unpkg.com/@supabase/supabase-js@2', demarrerCahier, rnrEchecFinalSupabase);
}

let sb=null;
function demarrerCahier(){
if(typeof window.supabase==='undefined'||typeof window.supabase.createClient!=='function'){ rnrEchecFinalSupabase(); return; }
const {createClient}=window.supabase;
sb=createClient("https://cazqllstxhuecoqpktwm.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhenFsbHN0eGh1ZWNvcXBrdHdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTExNTQsImV4cCI6MjA5NDk2NzE1NH0.6YYAJXG4s-h78YUp2pd7fBvQJzDprSxtSkUZTv6ZtZs");

let VOYAGE_ID=null, GROUPE_ID=null, DOMICILE=null;
let voyage=[];
let RB_INFO={nom:'',date_debut:null,date_fin_envisagee:null,nb_participants:null,nb_animaux:null,destination_libre:'',but_voyage:'',notes_groupe:'',memo_blocs:[],budget_estime:null,cahier_theme:'edition'};
let RB_DECOUPAGE=null;

function esc(t){ const d=document.createElement('div'); d.textContent=(t==null?'':t); return d.innerHTML; }

async function resoutVoyageId(userId){
  let sess=null;
  try{ sess=sessionStorage.getItem('rnr_voyage_id'); }catch(e){}
  const {data:mem}=await sb.from('membres').select('groupe_id').eq('user_id',userId).limit(1).single();
  if(mem){
    GROUPE_ID=mem.groupe_id;
    const {data:g}=await sb.from('groupes').select('lat_depart,lng_depart,ville,adresse_depart').eq('id',mem.groupe_id).single();
    if(g && g.lat_depart!=null && g.lng_depart!=null) DOMICILE={lat:Number(g.lat_depart), lng:Number(g.lng_depart), nom:(g.ville||g.adresse_depart||'la maison')};
  }
  if(sess){ VOYAGE_ID=sess; return; }
  if(!mem) return;
  const {data:vs}=await sb.from('voyages').select('id,est_principal,created_at').eq('groupe_id',mem.groupe_id).order('created_at',{ascending:true});
  const liste=vs||[]; const actif=liste.find(v=>v.est_principal)||liste[0];
  VOYAGE_ID=actif?actif.id:null;
}

// (10/07, retour Bruno) : le sélecteur de voyage de la barre restait invisible
// ici — cette page ne l'alimentait jamais. Même patron que Roadbook, pas une
// 2e logique : seule la fiche « nom » diffère (pas besoin de plus pour l'affichage).
async function cahierChargeSelecteurChrome(){
  if(!GROUPE_ID) return;
  try{
    const {data:vs}=await sb.from('voyages')
      .select('id,nom,est_principal,created_at').eq('groupe_id',GROUPE_ID)
      .order('created_at',{ascending:true});
    const liste=vs||[];
    if(!liste.length) return;
    const actif=liste.find(v=>v.id===VOYAGE_ID)||liste.find(v=>v.est_principal)||liste[0];
    if(window.rnrChrome && rnrChrome.setVoyage){
      rnrChrome.setVoyage(actif.nom, liste, function(id){
        if(id==='__new__'){ window.location.href='home.html?nouveau=1'; return; }
        try{ sessionStorage.setItem('rnr_voyage_id',id); const v=liste.find(x=>x.id===id); if(v) sessionStorage.setItem('rnr_voyage_nom',v.nom); }catch(e){}
        window.location.reload();
      });
    }
  }catch(e){ console.warn('Cahier: sélecteur de voyage', e); }
}

async function chargerRegions(){
  try{
    const rep=await fetch('decoupage-france-regions.json?v=22r',{cache:'no-cache'});
    const geo=await rep.json();
    if(window.RNR_CARTO_MOTEUR) RB_DECOUPAGE=RNR_CARTO_MOTEUR.creerDecoupage(geo);
  }catch(e){ console.warn('Cahier: découpage régions indisponible', e); }
}
function regionDe(lat,lng){
  if(!RB_DECOUPAGE||lat==null||lng==null) return '';
  const z=RB_DECOUPAGE.zoneDe(+lat,+lng);
  return z?z.nom:'';
}
function regionAuto(){
  if(!RB_DECOUPAGE||!voyage.length) return '';
  const compte={};
  voyage.forEach(p=>{
    if(p.lat==null||p.lng==null) return;
    const z=RB_DECOUPAGE.zoneDe(+p.lat,+p.lng); if(!z) return;
    if(!compte[z.code]) compte[z.code]={n:0,nom:z.nom};
    compte[z.code].n++;
  });
  let meilleur=null;
  Object.values(compte).forEach(c=>{ if(!meilleur||c.n>meilleur.n) meilleur=c; });
  return meilleur?meilleur.nom:'';
}

async function chargerInfosVoyage(){
  if(!VOYAGE_ID) return;
  try{
    const {data}=await sb.from('voyages')
      .select('nom,date_debut,date_fin_envisagee,nb_participants,nb_animaux,destination_libre,but_voyage,notes_groupe,memo_blocs,budget_estime,cahier_theme')
      .eq('id',VOYAGE_ID).single();
    if(data){
      RB_INFO=data;
      appliquerTheme(data.cahier_theme||'edition', {silencieux:true});
    }
  }catch(e){ console.warn('Cahier: infos voyage', e); }
}

// (17/07, B69) Le thème est un attribut du VOYAGE, pas un réglage personnel :
// tout le groupe imprime le même Cahier. appliquerTheme() pose l'attribut
// data-theme (le CSS fait tout le travail de reskin) et synchronise le
// sélecteur ; silencieux=true au chargement initial (rien à sauvegarder,
// on affiche juste ce qui est déjà en base).
function appliquerTheme(theme, opts){
  opts=opts||{};
  const valide = ['edition','kraft','atlas'].includes(theme) ? theme : 'edition';
  document.body.dataset.theme = valide;
  const sel=document.getElementById('theme-select'); if(sel) sel.value=valide;
  if(!opts.silencieux) render();
}
async function rnrChangerTheme(theme){
  appliquerTheme(theme);
  RB_INFO.cahier_theme=theme;
  if(!VOYAGE_ID) return;
  try{ await sb.from('voyages').update({cahier_theme:theme}).eq('id',VOYAGE_ID); }
  catch(e){ console.warn('Cahier: sauvegarde du thème', e); }
}
window.rnrChangerTheme = rnrChangerTheme;
let MEMBRES=[];
async function chargerMembres(){
  if(!GROUPE_ID) return;
  try{
    const {data}=await sb.from('membres').select('id,pseudo,prenom,avatar,photo_url,voyageur_depuis,passions,presentation').eq('groupe_id',GROUPE_ID);
    MEMBRES=data||[];
  }catch(e){ console.warn('Cahier: membres', e); }
}
async function chargerItineraire(){
  if(!VOYAGE_ID){ voyage=[]; return; }
  try{
    const {data:rows}=await sb.from('voyage_itineraire')
      .select('uid,lieu_id,ordre,note,nb_nuits,rattache_a_nuit_uid,jour_offset')
      .eq('voyage_id',VOYAGE_ID).order('ordre',{ascending:true});
    const ids=[...new Set((rows||[]).map(r=>r.lieu_id))];
    let infos={};
    if(ids.length){
      // (10/07) La fiche COMPLÈTE, pas un sous-ensemble : le Cahier affiche
      // maintenant chaque étape en grande fiche (RNR_FICHE_COMPLETE), il lui
      // faut description/conseil/pratique/tags, pas juste photo+nom.
      const {data:fs}=await sb.from('lieux').select('*').in('id',ids);
      (fs||[]).forEach(f=>{ infos[f.id]=f; });
    }
    voyage=(rows||[]).map(r=>{
      const f=infos[r.lieu_id]; if(!f||f.lat==null||f.lng==null) return null;
      // On garde TOUS les champs de la fiche (spread f) — uid/note/nb_nuits/
      // rattache/jour viennent de l'itinéraire et priment sur d'éventuels
      // homonymes. lat/lng recasts en Number (Postgres les renvoie en texte).
      return Object.assign({}, f, {
        uid:r.uid, id:f.id, lat:Number(f.lat), lng:Number(f.lng),
        note:r.note||'', nb_nuits:r.nb_nuits||null,
        rattache:r.rattache_a_nuit_uid||null, jour:r.jour_offset||null
      });
    }).filter(Boolean);
  }catch(e){ console.warn('Cahier: itinéraire', e); voyage=[]; }
}

function calcDist(lat1,lng1,lat2,lng2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
const VITESSE_MOY_KMH=65;
function dureeEstimee(km){ const h=km/VITESSE_MOY_KMH; const H=Math.floor(h), M=Math.round((h-H)*60); return H>0?(H+'h'+(M>0?String(M).padStart(2,'0'):'')):(M+' min'); }

function chaineDe(v){ return (v||voyage).filter(item=>!item.rattache); }
function datesCumulees(){
  const chaine=chaineDe();
  if(!RB_INFO.date_debut) return chaine.map(()=>null);
  const debut=new Date(RB_INFO.date_debut+'T00:00:00');
  if(isNaN(debut)) return chaine.map(()=>null);
  let cumul=0;
  return chaine.map(item=>{
    const d=new Date(debut); d.setDate(d.getDate()+cumul);
    const nuit=(window.RNR_MARQUEURS)?RNR_MARQUEURS.estNuit(item):false;
    if(nuit) cumul += (item.nb_nuits&&item.nb_nuits>0)?item.nb_nuits:1;
    return d;
  });
}
function nuitsTotal(){
  return chaineDe().reduce((s,item)=>{
    const nuit=(window.RNR_MARQUEURS)?RNR_MARQUEURS.estNuit(item):false;
    return s+(nuit?((item.nb_nuits&&item.nb_nuits>0)?item.nb_nuits:1):0);
  },0);
}
function formatDateCourt(d){ if(!d) return ''; return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}); }

// Même attribution de couleur que Voyage/Hub/Horizon (RNR_MARQUEURS.couleurExcursion,
// index = position dans la chaîne principale) — un séjour a la même couleur partout.
function calculeIndexSejours(){
  const idx=new Map(); let n=0;
  chaineDe().forEach(item=>{
    const nuit=(window.RNR_MARQUEURS)?RNR_MARQUEURS.estNuit(item):false;
    const nb=(item.nb_nuits&&item.nb_nuits>0)?item.nb_nuits:1;
    if(!nuit||nb<2) return;
    if(!voyage.some(v=>v.rattache===item.uid)) return;
    idx.set(item.uid, n++);
  });
  return idx;
}

// ── Contenu réutilisable "Bon à savoir" (08/07) — générique, valable sur tous
// les cahiers, pas propre à ce voyage. Statique pour l'instant (v1) ; une
// vraie banque partagée/enrichissable viendra avec la structure v2 (B40).
const BON_A_SAVOIR=[
  { icone:'🔌', titre:'Électricité', items:[
    { t:'Rallonge', d:'20 à 30 m avec prise européenne (CEE bleue) — la longueur standard des bornes de camping, souvent indiquée sur leur site.' },
    { t:'Adaptateur', d:'Prévoir l\'adaptateur du pays visité si vous sortez de la zone prise européenne classique.' },
  ]},
  { icone:'💧', titre:'Eau', items:[
    { t:'Tuyau', d:'Un tuyau alimentaire dédié au remplissage — ne pas réutiliser un tuyau de jardin classique.' },
    { t:'Réserve', d:'Un jerrican de secours pour les nuits hors camping (aire, nature).' },

const METEO_ICONES={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌦️',56:'🌧️',57:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',66:'🌧️',67:'🌧️',71:'🌨️',73:'🌨️',75:'🌨️',77:'🌨️',80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'🌨️',95:'⛈️',96:'⛈️',99:'⛈️'};
async function fetchMeteo(lat,lng,dateISO){
  try{
    const url='https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lng+'&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&start_date='+dateISO+'&end_date='+dateISO;
    const r=await fetch(url); const d=await r.json();
    if(d&&d.daily&&d.daily.time&&d.daily.time.length){
      return {icone:METEO_ICONES[d.daily.weather_code[0]]||'🌡️', tmax:Math.round(d.daily.temperature_2m_max[0]), tmin:Math.round(d.daily.temperature_2m_min[0])};
    }
  }catch(e){}
  return null;
}

let _saveTimer=null, _saveEnCours=false, _saveRedemande=false;
function planifierSauvegarde(){
  clearTimeout(_saveTimer);
  const el=document.getElementById('save-state'); if(el) el.textContent="en cours d'enregistrement…";
  _saveTimer=setTimeout(sauvegarderItineraire, 700);
}
async function sauvegarderItineraire(){
  if(!VOYAGE_ID) return;
  if(_saveEnCours){ _saveRedemande=true; return; }
  _saveEnCours=true;
  try{
    const snapshot=voyage.map((v,i)=>({voyage_id:VOYAGE_ID, uid:v.uid, lieu_id:v.id, ordre:i, note:(v.note||null), nb_nuits:(v.nb_nuits||null), rattache_a_nuit_uid:(v.rattache||null), jour_offset:(v.jour||null)}));
    await sb.from('voyage_itineraire').delete().eq('voyage_id',VOYAGE_ID);
    if(snapshot.length) await sb.from('voyage_itineraire').insert(snapshot);
    const el=document.getElementById('save-state'); if(el) el.textContent='à jour ✓';
  }catch(e){ console.warn('Cahier: sauvegarde', e); const el=document.getElementById('save-state'); if(el) el.textContent="erreur d'enregistrement"; }
  _saveEnCours=false;
  if(_saveRedemande){ _saveRedemande=false; sauvegarderItineraire(); }
}
function onNoteChange(uid, val){
  const item=voyage.find(v=>v.uid===uid); if(!item) return;
  item.note=val;
  planifierSauvegarde();
}

// (10/07) « Le chemin complet » — vue d'ensemble juste après Couverture +
// Équipe : toute la chaîne principale d'un coup d'œil, avec les excursions de
// chaque séjour nichées dessous, colorées comme sur la carte (même palette,
// RNR_MARQUEURS.couleurExcursion — un séjour a la même couleur ici et sur
// Voyage/Hub/Horizon).
function pageCheminComplet(chaine, dates, sejourIdx){
  let rows='';
  chaine.forEach((item,i)=>{
    const nuit=(window.RNR_MARQUEURS)?RNR_MARQUEURS.estNuit(item):false;
    const nbNuits=(item.nb_nuits&&item.nb_nuits>0)?item.nb_nuits:1;
    const dEtape=dates[i];
    const excs=voyage.filter(v=>v.rattache===item.uid).sort((a,b)=>(a.jour||1)-(b.jour||1));
    const excsHtml = excs.length ? ('<div class="chemin-excursions">'+excs.map(e=>{
      const couleur=RNR_MARQUEURS.couleurExcursion(sejourIdx.has(item.uid)?sejourIdx.get(item.uid):0);
      return '<div class="chemin-exc" style="border-left-color:'+couleur+';"><b style="color:'+couleur+';">Jour '+(e.jour||1)+'</b> · '+esc(e.nom)+'</div>';
    }).join('')+'</div>') : '';
    rows += '<div class="chemin-etape">'
      +'<div class="chemin-num">'+(i+1)+'</div>'
      +'<div class="chemin-corps">'
        +'<div class="chemin-nom">'+esc(item.nom)+(nuit?' 🌙':'')+'</div>'
        +'<div class="chemin-meta">'+(dEtape?esc(formatDateCourt(dEtape))+' · ':'')+esc(regionDe(item.lat,item.lng))+(nuit?' · '+nbNuits+' nuit'+(nbNuits>1?'s':''):'')+'</div>'
        +excsHtml
      +'</div>'
    +'</div>';
  });
  return '<div class="page day-page" style="padding:54px 46px;">'
    +'<p class="day-sub" style="margin-bottom:4px;">🗺️ Vue d\'ensemble</p>'
    +'<span class="day-title" style="display:block;margin-bottom:22px;">Le chemin complet</span>'
    +'<div class="chemin-liste">'+rows+'</div>'
    +'</div>';
}

function render(){
  const host=document.getElementById('pages');
  const dest=RB_INFO.destination_libre||regionAuto()||'Votre voyage';
  const chaine=chaineDe();
  const dates=datesCumulees();
  const sejourIdx=calculeIndexSejours();
  let totalKm=0;
  if(DOMICILE&&chaine[0]) totalKm+=calcDist(DOMICILE.lat,DOMICILE.lng,chaine[0].lat,chaine[0].lng);
  for(let i=1;i<chaine.length;i++) totalKm+=calcDist(chaine[i-1].lat,chaine[i-1].lng,chaine[i].lat,chaine[i].lng);

  // (17/07) Jusqu'à 3 vraies photos de l'itinéraire pour habiller la
  // couverture (polaroids du Carnet bricolé, planche de l'Atlas, bande de
  // l'Édition) — même logique que photosDe() dans fiche-complete.js.
  const photosCouverture=[];
  for(const it of chaine){
    const p=it.photo_url||(it.photos_urls&&it.photos_urls[0]);
    if(p){ photosCouverture.push({url:p, nom:it.nom}); }
    if(photosCouverture.length>=3) break;
  }
  const photoCouverture = photosCouverture[0] ? photosCouverture[0].url : null;

  // (17/07) Trois étiquettes réelles pour la bande de tracé Atlas — départ,
  // une étape médiane, arrivée — repli générique si l'itinéraire est trop
  // court ou vide.
  const routeLabels = chaine.length
    ? [chaine[0].nom, chaine[Math.floor((chaine.length-1)/2)].nom, chaine[chaine.length-1].nom]
    : ['Départ','En route','Arrivée'];

  let html=pageCouverture(temaActif(), dest, totalKm, RB_INFO.nb_participants, RB_INFO.nb_animaux, photoCouverture, photosCouverture, routeLabels);

  // Page Équipe (08/07) — les profils sont désormais alimentés par la barre
  // d'avatars (chrome.js). Cadre rond partout : un mauvais cadrage de photo
  // n'y casse rien. Toujours affichée dès qu'il y a au moins un membre.
  if(MEMBRES.length){
    const choixPassions=(window.RNR_PROFIL_CHOIX&&window.RNR_PROFIL_CHOIX.passions)||[];
    const choixDepuis=(window.RNR_PROFIL_CHOIX&&window.RNR_PROFIL_CHOIX.voyageurDepuis)||[];
    const tagline = MEMBRES.length>1 ? (MEMBRES.length+' voyageurs, une seule route') : 'Un voyageur, une route rien qu\'à lui';
    const rotsCartes=[-.8,.9,-.6,1,.7,-1];
    html+='<div class="page team-page">'
      +'<div class="team-header"><p class="day-sub" style="margin-bottom:4px;">👥 Qui embarque</p>'
      +'<span class="day-title" style="display:block;">L\'équipe</span></div>'
      +'<p class="team-tagline">'+esc(tagline)+'</p>'
      +'<div class="team-grid-wrap"><div class="team-grid">'
      +MEMBRES.map((m,i)=>{
        const nom=m.pseudo||m.prenom||'Voyageur';
        const av=window.rnrAvatarMembre?window.rnrAvatarMembre(m,''):null;
        let avStyle='background:'+ (function(){ let h=0; for(let i=0;i<nom.length;i++) h=(h*31+nom.charCodeAt(i))>>>0; return ['#D85A30','#2159A8','#2C5016','#8b6914','#6B3288','#1B2A6B'][h%6]; })()+';';
        let avTxt=(nom.charAt(0)||'?').toUpperCase();
        if(av && av.photo){ avStyle="background-image:url('"+av.photo.replace(/'/g,'')+"');"; avTxt=''; }
        else if(av && av.emoji){ avStyle='background:var(--gold-a20);'; avTxt=av.emoji; }
        else if(av && av.initiale){ avTxt=av.initiale; }
        const depuisLabel=(choixDepuis.find(o=>o.v===m.voyageur_depuis)||{}).label;
        const passionsLabels=(m.passions||[]).map(v=>{ const f=choixPassions.find(p=>p.v===v); return f?f.label:v; });
        return '<div class="team-card" style="--rot:'+rotsCartes[i%rotsCartes.length]+'deg;">'
          +'<div class="team-av" style="'+avStyle+'">'+esc(avTxt)+'</div>'
          +'<div style="flex:1;">'
          +'<p class="team-nom">'+esc(nom)+'</p>'
          +(depuisLabel&&depuisLabel!=='—'?'<div class="team-depuis">Voyageur '+esc(depuisLabel)+'</div>':'')
          +(passionsLabels.length?'<div class="team-passions">'+passionsLabels.map(p=>'<span class="team-chip">'+esc(p)+'</span>').join('')+'</div>':'')
          +(m.presentation?'<p class="team-presentation">« '+esc(m.presentation)+' »</p>':'')
          +'</div></div>';
      }).join('')
      +'</div></div></div>';
  }

  // (10/07) « Le chemin complet » — juste après Couverture + Équipe, avant le
  // détail page à page (retour Bruno : on veut voir le trajet entier d'abord).
  if(chaine.length){
    html += pageCheminComplet(chaine, dates, sejourIdx);
  }

  if(!voyage.length){
    html+='<div class="page day-page" style="align-items:center;justify-content:center;text-align:center;display:flex;flex-direction:column;">'
      +'<p style="font-size:40px;margin-bottom:12px;">🗺️</p>'
      +'<p class="day-title" style="margin-bottom:8px;">Les étapes arrivent bientôt</p>'
      +'<p style="color:var(--cah-ink-dim);font-size:13px;max-width:320px;">Ajoutez des lieux depuis Horizon pour que le voyage prenne forme ici, page après page.</p>'
      +'</div>';
  }
  // (10/07, retour Bruno) : on ne fait plus feuille par feuille (une page par
  // fiche dans l'ordre plat) — on marche la CHAÎNE PRINCIPALE, et chaque
  // séjour à excursions déroule son pétale juste après lui (base, puis une
  // page par excursion, dans l'ordre du jour). Chaque page est la vraie
  // fiche complète, jamais un résumé.
  const meteoPoints=[]; // {uid,lat,lng,dEtape} — programmés une fois le DOM en place
  chaine.forEach((item,i)=>{
    const nuit=(window.RNR_MARQUEURS)?RNR_MARQUEURS.estNuit(item):false;
    const nbNuits=(item.nb_nuits&&item.nb_nuits>0)?item.nb_nuits:1;
    const dEtape=dates[i];
    let distTxt='', dureeTxt='';
    if(i===0 && DOMICILE){ const d=calcDist(DOMICILE.lat,DOMICILE.lng,item.lat,item.lng); distTxt=d+' km depuis la maison'; dureeTxt=dureeEstimee(d); }
    else if(i>0){ const d=calcDist(chaine[i-1].lat,chaine[i-1].lng,item.lat,item.lng); distTxt=d+" km depuis l'étape précédente"; dureeTxt=dureeEstimee(d); }
    const region=regionDe(item.lat,item.lng);
    const excs=voyage.filter(v=>v.rattache===item.uid).sort((a,b)=>(a.jour||1)-(b.jour||1));
    const estSejour = nuit && nbNuits>1 && excs.length>0;
    const couleur = estSejour ? RNR_MARQUEURS.couleurExcursion(sejourIdx.has(item.uid)?sejourIdx.get(item.uid):0) : null;

    const infosBox='<div class="box"><p class="box-t">📋 Infos clés</p>'
      +(dureeTxt?('<div class="infos-row"><span>🚗 Route</span><span>'+dureeTxt+'</span></div>'):'')
      +(nuit?('<div class="infos-row"><span>🌙 Nuits</span><span>'+nbNuits+'</span></div>'):'')
      +'<div class="infos-row"><span>☀️ Météo</span><span id="meteo-'+item.uid+'">'+(nuit?'…':'—')+'</span></div>'
      +'</div>';

    html += pageFicheComplete(item, {
      label:'étape '+(i+1), numero:(i+1),
      sousLabel:(dEtape?esc(formatDateCourt(dEtape))+' · ':'')+esc(region)+(nuit?' · 🌙 '+nbNuits+' nuit'+(nbNuits>1?'s':''):'')+(estSejour?' · base d\'excursions':''),
      nuit, accent:couleur, infosBox,
      footerRight:'Étape '+(i+1)+' / '+chaine.length
    });
    if(nuit) meteoPoints.push({uid:item.uid, lat:item.lat, lng:item.lng, dEtape});

    // Le pétale : une page par excursion, juste après sa base, dans l'ordre
    // du jour — teintée dans LA couleur du séjour, jamais noyée plus loin
    // dans la pile plate des étapes.
    excs.forEach(e=>{
      const jourExc=e.jour||1;
      const dExc = dEtape ? (()=>{ const d=new Date(dEtape); d.setDate(d.getDate()+(jourExc-1)); return d; })() : null;
      const dJour = (item.lat!=null&&e.lat!=null) ? calcDist(item.lat,item.lng,e.lat,e.lng) : null;
      const infosBoxExc='<div class="box"><p class="box-t">📋 Infos clés</p>'
        +(dJour!=null?('<div class="infos-row"><span>🥾 Aller-retour</span><span>'+dJour+' km depuis '+esc(item.nom)+'</span></div>'):'')
        +'<div class="infos-row"><span>☀️ Météo</span><span id="meteo-'+e.uid+'">…</span></div>'
        +'</div>';
      html += pageFicheComplete(e, {
        label:'jour '+jourExc, numero:jourExc,
        sousLabel:(dExc?esc(formatDateCourt(dExc))+' · ':'')+esc(regionDe(e.lat,e.lng))+' · excursion depuis '+esc(item.nom),
        nuit:false, accent:couleur, infosBox:infosBoxExc,
        footerRight:'Séjour à '+esc(item.nom)+' · jour '+jourExc,
        notePlaceholder:"Ce qu'on a vu, ce qu'on en a pensé…"
      });
      meteoPoints.push({uid:e.uid, lat:e.lat, lng:e.lng, dEtape:dExc});
    });
  });

  // Retour Bruno (08/07) : c'est le texte des blocs du Mémo de voyage (rail
  // « 🧳 Mémo de voyage », rail-groupe.js) qui doit alimenter cette page — pas
  // seulement la liste générique statique. On utilise memo_blocs s'il existe
  // (il existe presque toujours : le rail le pré-remplit dès la 1ère ouverture),
  // et on ne retombe sur BON_A_SAVOIR que si le voyage n'a vraiment jamais eu
  // de mémo (personne n'a encore ouvert le rail pour ce voyage).
  const memoAAfficher = (RB_INFO.memo_blocs && RB_INFO.memo_blocs.length) ? RB_INFO.memo_blocs : BON_A_SAVOIR;
  html+='<div class="page day-page" style="padding:54px 46px;">'
    +'<p class="day-sub" style="margin-bottom:4px;">🧭 Le mémo de ce voyage</p>'
    +'<span class="day-title" style="display:block;margin-bottom:20px;">Bon à savoir</span>'
    +memoAAfficher.map(cat=>
      '<div class="box"><p class="box-t">'+esc(cat.icone||'📌')+' '+esc(cat.titre||'')+'</p>'
      +( cat.items
          ? cat.items.map(it=>'<div class="infos-row" style="align-items:flex-start;"><span style="min-width:110px;flex-shrink:0;">'+esc(it.t)+'</span><span style="text-align:left;color:var(--cah-ink);">'+esc(it.d)+'</span></div>').join('')
          : '<div style="font-size:12.5px;line-height:1.6;white-space:pre-wrap;color:var(--cah-ink);">'+esc(cat.texte||'')+'</div>'
        )
      +'</div>'
    ).join('')
    +'</div>';

  if(RB_INFO.notes_groupe && RB_INFO.notes_groupe.trim()){
    html+='<div class="page day-page" style="padding:54px 46px;">'
      +'<p class="day-sub" style="margin-bottom:4px;">📝 Avant de prendre la route</p>'
      +'<span class="day-title" style="display:block;margin-bottom:18px;">Notes du groupe</span>'
      +'<div class="box" style="font-size:13.5px;line-height:1.7;white-space:pre-wrap;">'+esc(RB_INFO.notes_groupe)+'</div>'
      +'</div>';
  }

  html+='<div class="page closing"><h2>Bonne route.</h2>'
    +"<p>Ce carnet vit avec vous — complétez-le au fil des étapes, il s'imprime tel quel dès que vous êtes prêts.</p>"
    +'<div class="closing-stats">'
    +'<div class="stat"><b>'+(totalKm>0?('≈'+totalKm):'—')+'</b><span>km</span></div>'
    +'<div class="stat"><b>'+(nuitsTotal()||'—')+'</b><span>nuits</span></div>'
    +'<div class="stat"><b>'+voyage.length+'</b><span>étapes</span></div>'
    +'</div></div>';

  host.innerHTML=html;
  host.querySelectorAll('.editable-text').forEach(ta=>{
    ta.addEventListener('input', ()=>onNoteChange(ta.dataset.uid, ta.value));
  });

  // Météo hors fenêtre (~15j) : message une fois le DOM en place. Une seule
  // passe pour les étapes ET les excursions (meteoPoints les couvre toutes les deux).
  meteoPoints.forEach(pt=>{
    if(!pt.dEtape || pt.lat==null) return;
    const auj=new Date(); auj.setHours(0,0,0,0);
    const limite=new Date(auj); limite.setDate(limite.getDate()+15);
    const el=document.getElementById('meteo-'+pt.uid);
    if(pt.dEtape>=auj && pt.dEtape<=limite){
      const iso=pt.dEtape.toISOString().slice(0,10);
      fetchMeteo(pt.lat,pt.lng,iso).then(m=>{
        if(el) el.textContent = m ? (m.icone+' '+m.tmax+'°/'+m.tmin+'°') : 'indisponible';
      });
    } else if(el){
      el.textContent='hors fenêtre (~15 j)';
    }
  });
}

(async()=>{
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ window.location.href='index.html'; return; }
    document.getElementById('auth-check').style.display='none';
    await resoutVoyageId(session.user.id);
    if(!VOYAGE_ID){ document.getElementById('pages').innerHTML="<div class=\"empty-state\">Aucun voyage actif — retournez à l'Accueil pour en choisir un.</div>"; return; }
    cahierChargeSelecteurChrome();   // nom du voyage + liste, visible dans la barre (chrome.js)
    await Promise.all([chargerInfosVoyage(), chargerItineraire(), chargerRegions(), chargerMembres()]);
    render();
  }catch(e){
    console.error('Cahier: erreur au chargement', e);
    document.getElementById('auth-check').style.display='none';
    document.getElementById('pages').innerHTML='<div class="empty-state">⚠️ Une erreur a empêché le Cahier de se charger.<br><br>Détail technique : '+esc(String(e&&e.message||e))+'</div>';
  }
})();
}
rnrChargerScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2', demarrerCahier, rnrChargerSupabaseSecours);
