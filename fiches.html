<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RockNRoad · Mes Fiches</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C8A84B;--dark:#1A1208;--creme:#F5EFE0;}
body{font-family:'Inter',sans-serif;background:var(--creme);color:var(--dark);}
#auth-check{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#0a1a0c,#2C5016 50%,#C8A84B);
  display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;}
#auth-check h2{font-family:'Playfair Display',serif;font-size:26px;margin:16px 0 6px;}
.spinner{width:36px;height:36px;border:3px solid rgba(200,168,75,.3);border-top-color:#C8A84B;
  border-radius:50%;animation:spin 1s linear infinite;margin-top:18px;}
@keyframes spin{to{transform:rotate(360deg)}}
#main{display:none;}

.header{background:var(--dark);padding:16px 24px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:2px solid var(--gold);}
.header-logo{font-family:'Playfair Display',serif;color:var(--gold);font-size:18px;text-decoration:none;}
.header-nav{display:flex;gap:8px;}
.nav-link{color:rgba(245,239,224,.6);font-size:11px;letter-spacing:1px;text-transform:uppercase;
  text-decoration:none;padding:7px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.1);transition:all .2s;}
.nav-link:hover,.nav-link.active{color:var(--gold);border-color:var(--gold);}
.logout-btn{background:none;border:1px solid rgba(200,168,75,.3);color:var(--gold);
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:7px 12px;
  border-radius:6px;cursor:pointer;}

.container{max-width:1100px;margin:0 auto;padding:40px 20px 80px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;
  flex-wrap:wrap;gap:16px;margin-bottom:36px;}
.page-title{font-family:'Playfair Display',serif;font-size:32px;}
.page-title em{color:var(--gold);font-style:italic;}
.page-sub{color:#888;font-size:14px;margin-top:4px;}
.add-btn{background:var(--gold);color:var(--dark);font-weight:700;font-size:13px;
  padding:12px 24px;border-radius:8px;border:none;cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;gap:8px;transition:all .2s;}
.add-btn:hover{background:#dbb948;transform:translateY(-1px);}

/* FILTRES */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;align-items:center;}
.filter-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;}
.filter-select{padding:9px 14px;border:2px solid #E8DECE;border-radius:8px;
  font-family:'Inter',sans-serif;font-size:13px;background:white;color:var(--dark);
  cursor:pointer;outline:none;transition:border-color .2s;}
.filter-select:focus{border-color:var(--gold);}
.filter-btn{padding:9px 16px;border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;border:2px solid #E8DECE;background:white;color:#888;transition:all .2s;}
.filter-btn.active{border-color:var(--gold);background:rgba(200,168,75,.1);color:#8B6914;}
.search-input{padding:9px 14px;border:2px solid #E8DECE;border-radius:8px;
  font-family:'Inter',sans-serif;font-size:13px;width:220px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--gold);}

/* VOYAGE COUNTER */
.voyage-bar{background:var(--dark);border-radius:10px;padding:14px 20px;margin-bottom:24px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.voyage-count{color:rgba(245,239,224,.8);font-size:13px;}
.voyage-count strong{color:var(--gold);}
.voyage-go-btn{background:var(--gold);color:var(--dark);font-weight:700;font-size:12px;
  padding:9px 20px;border-radius:7px;border:none;cursor:pointer;text-decoration:none;
  transition:all .2s;}
.voyage-go-btn:hover{background:#dbb948;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px;}
.card{background:white;border-radius:12px;overflow:hidden;
  box-shadow:0 3px 16px rgba(0,0,0,.08);transition:transform .25s,box-shadow .25s;
  position:relative;}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(0,0,0,.12);}
.card-photo{height:200px;background:#d4cbb8;background-size:cover;background-position:center;
  position:relative;}
.card-photo::after{content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.5),transparent 50%);}
.card-type{position:absolute;top:10px;left:10px;z-index:2;
  background:rgba(0,0,0,.55);color:white;font-size:9px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;}
.card-dog{position:absolute;top:10px;right:10px;z-index:2;font-size:18px;}
.card-region{position:absolute;bottom:10px;left:10px;z-index:2;
  background:rgba(200,168,75,.9);color:white;font-size:9px;font-weight:700;
  padding:2px 9px;border-radius:10px;letter-spacing:1px;}
.card-body{padding:16px;}
.card-name{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:5px;}
.card-sub{font-size:11px;color:#888;margin-bottom:8px;}
.card-desc{font-size:12.5px;color:#5a4a32;line-height:1.6;margin-bottom:12px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-note{display:inline-flex;align-items:center;gap:4px;background:#2C5016;
  color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-bottom:10px;}
.card-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn-voyage{flex:1;padding:9px;background:var(--dark);color:var(--gold);
  font-size:11px;font-weight:700;border:none;border-radius:7px;cursor:pointer;
  transition:all .2s;letter-spacing:.5px;}
.btn-voyage:hover{background:#C8A84B;color:var(--dark);}
.btn-voyage.added{background:#2C5016;color:white;}
.btn-google{padding:9px 12px;background:#fff8e8;border:1px solid rgba(200,168,75,.4);
  color:#8B6914;font-size:11px;font-weight:700;border-radius:7px;cursor:pointer;
  text-decoration:none;transition:all .2s;}
.btn-google:hover{background:#fef0c0;}
.btn-maps{padding:9px 12px;background:#f0f4ff;border:1px solid #c0d0f0;
  color:#2a5aaa;font-size:11px;font-weight:700;border-radius:7px;
  text-decoration:none;transition:all .2s;}
.btn-maps:hover{background:#dce8ff;}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:#888;}
.empty-icon{font-size:48px;margin-bottom:14px;}
.empty h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--dark);margin-bottom:8px;}

/* LOADING */
.loading-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px;}
.skeleton{background:white;border-radius:12px;overflow:hidden;box-shadow:0 3px 16px rgba(0,0,0,.06);}
.skel-photo{height:200px;background:linear-gradient(90deg,#f0ece4 25%,#e8e0d8 50%,#f0ece4 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;}
.skel-body{padding:16px;}
.skel-line{height:14px;background:linear-gradient(90deg,#f0ece4 25%,#e8e0d8 50%,#f0ece4 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;margin-bottom:10px;}
.skel-line.short{width:60%;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:9px;
  font-size:13px;font-weight:600;z-index:1000;transform:translateY(80px);
  transition:transform .3s;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.toast.show{transform:translateY(0);}
.toast.success{background:#2C5016;color:white;}

@media(max-width:600px){.header-nav{display:none;}.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="auth-check">
  <div style="font-size:48px;">🐾</div>
  <h2>RockNRoad</h2>
  <p style="font-size:12px;opacity:.6;letter-spacing:2px;">Chargement des fiches...</p>
  <div class="spinner"></div>
</div>

<div id="main">
  <header class="header">
    <a href="carnet.html" class="header-logo">🐾 RockNRoad</a>
    <nav class="header-nav">
      <a href="carnet.html" class="nav-link">🗺 Carnet</a>
      <a href="fiches.html" class="nav-link active">📍 Mes Fiches</a>
      <a href="voyage.html" class="nav-link">🧭 Mon Voyage</a>
      <a href="admin.html" class="nav-link">➕ Créer</a>
    </nav>
    <button class="logout-btn" onclick="logout()">⏏ Déco</button>
  </header>

  <div class="container">
    <div class="page-header">
      <div>
        <h1 class="page-title">Mes <em>Fiches Lieux</em></h1>
        <p class="page-sub">Tous vos lieux · Filtrez par région · Ajoutez à Mon Voyage 🧭</p>
      </div>
      <a href="admin.html" class="add-btn">➕ Ajouter un lieu</a>
    </div>

    <!-- Filtres -->
    <div class="filters">
      <span class="filter-label">Filtrer :</span>
      <select class="filter-select" id="filterRegion" onchange="applyFilters()">
        <option value="">🌍 Toutes les régions</option>
        <option value="Pyrenees">🏔️ Pyrénées</option>
        <option value="Atlantique">🌊 Atlantique / Landes</option>
        <option value="Bourgogne">🍷 Bourgogne</option>
        <option value="Bretagne">🦞 Bretagne</option>
        <option value="Normandie">🏰 Normandie</option>
        <option value="Provence">☀️ Provence / Côte d'Azur</option>
        <option value="Alsace">🥨 Alsace</option>
        <option value="Alpes">⛷️ Alpes</option>
        <option value="Loire">🏰 Vallée de la Loire</option>
        <option value="Ardenne">🌲 Ardenne / Champagne</option>
      </select>
      <select class="filter-select" id="filterType" onchange="applyFilters()">
        <option value="">🗂 Tous les types</option>
        <option value="Site">🏛️ Sites</option>
        <option value="Camping">⛺ Campings</option>
        <option value="Plage">🏖️ Plages / Lacs</option>
        <option value="Randonnee">🥾 Randonnées / Vélo</option>
        <option value="Restaurant">🍽️ Restaurants</option>
        <option value="Halte">🚗 Haltes</option>
      </select>
      <button class="filter-btn" id="filterDog" onclick="toggleDogFilter()">🐕 Dog-Friendly</button>
      <button class="filter-btn" id="filterCoeur" onclick="toggleCoeurFilter()">❤️ Coups de cœur</button>
      <input class="search-input" type="text" placeholder="🔍 Rechercher..." id="searchInput" oninput="applyFilters()"/>
    </div>

    <!-- Barre Mon Voyage -->
    <div class="voyage-bar" id="voyageBar" style="display:none;">
      <div class="voyage-count">
        🧭 <strong id="voyageCount">0</strong> lieu(x) sélectionné(s) pour Mon Voyage
      </div>
      <a href="voyage.html" class="voyage-go-btn">Voir l'itinéraire →</a>
    </div>

    <!-- Grille des fiches -->
    <div id="grid" class="grid">
      <!-- Skeletons de chargement -->
      <div class="loading-grid" id="loadingGrid">
        ${Array(6).fill('<div class="skeleton"><div class="skel-photo"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line short"></div></div></div>').join('')}
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SURL = 'https://cazqllstxhuecoqpktwm.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhenFsbHN0eGh1ZWNvcXBrdHdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTExNTQsImV4cCI6MjA5NDk2NzE1NH0.6YYAJXG4s-h78YUp2pd7fBvQJzDprSxtSkUZTv6ZtZs';
const { createClient } = supabase;
const sb = createClient(SURL, SKEY);

let allLieux = [];
let voyage = JSON.parse(localStorage.getItem('rr_voyage') || '[]');
let dogFilter = false;
let coeurFilter = false;

const REGION_COLORS = {
  'Pyrenees':'#2C5016','Atlantique':'#1a5a7a','Bourgogne':'#6B3288',
  'Bretagne':'#1a6a5a','Normandie':'#3a5a8a','Provence':'#8B4513',
  'Alsace':'#8B2020','Alpes':'#4a4a8a','Loire':'#6B6B14',
  'Ardenne':'#3a6a3a','Jura':'#5a6a3a',
};

const TYPE_ICONS = {
  'Site':'🏛️','Camping':'⛺','Plage':'🏖️',
  'Randonnee':'🥾','Restaurant':'🍽️','Halte':'🚗'
};

async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  document.getElementById('auth-check').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  loadLieux();
}
async function logout() { await sb.auth.signOut(); window.location.href = 'index.html'; }

async function loadLieux() {
  const { data, error } = await sb.from('lieux').select('*').order('created_at', { ascending: false });
  document.getElementById('loadingGrid').style.display = 'none';
  if (error || !data?.length) {
    document.getElementById('grid').innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">🗺️</div>
        <h3>Aucune fiche pour l'instant</h3>
        <p>Commencez par <a href="admin.html" style="color:var(--gold)">créer votre première fiche</a> !</p>
      </div>`;
    return;
  }
  allLieux = data;
  renderCards(data);
}

function renderCards(lieux) {
  const grid = document.getElementById('grid');
  if (!lieux.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><h3>Aucun lieu trouvé</h3><p>Essayez d\'autres filtres</p></div>';
    return;
  }
  grid.innerHTML = lieux.map(l => {
    const inVoyage = voyage.includes(l.id);
    const col = REGION_COLORS[l.region] || '#888';
    const icon = TYPE_ICONS[l.type] || '📍';
    const photoStyle = l.photo_url
      ? `background-image:url('${l.photo_url}')`
      : `background:linear-gradient(135deg,${col}44,${col}22)`;
    const googleUrl = `https://www.google.com/search?q=${encodeURIComponent(l.nom+' '+l.region+' photos')}`;
    const mapsUrl   = l.lat && l.lng
      ? `https://www.google.com/maps?q=${l.lat},${l.lng}`
      : `https://maps.google.com/?q=${encodeURIComponent(l.nom)}`;

    return `<div class="card" id="card-${l.id}">
      <div class="card-photo" style="${photoStyle}">
        <div class="card-type">${icon} ${l.type}</div>
        <div class="card-dog">${l.dog_friendly ? '🐕' : '🚫'}</div>
        <div class="card-region" style="background:${col}dd">${l.region}</div>
      </div>
      <div class="card-body">
        ${l.note ? `<div class="card-note">★ ${l.note}</div>` : ''}
        <div class="card-name">${l.nom}</div>
        <div class="card-sub">${l.sous_region || l.region}${l.annee ? ' · '+l.annee : ''}</div>
        ${l.description ? `<div class="card-desc">${l.description}</div>` : ''}
        <div class="card-actions">
          <button class="btn-voyage ${inVoyage ? 'added' : ''}" onclick="toggleVoyage('${l.id}','${l.nom.replace(/'/g,"\\'")}',${l.lat||0},${l.lng||0})" id="vbtn-${l.id}">
            ${inVoyage ? '✅ Dans Mon Voyage' : '🧭 Ajouter au Voyage'}
          </button>
          <a href="${googleUrl}" target="_blank" class="btn-google">🔍</a>
          <a href="${mapsUrl}" target="_blank" class="btn-maps">📍</a>
        </div>
      </div>
    </div>`;
  }).join('');
  updateVoyageBar();
}

function toggleVoyage(id, nom, lat, lng) {
  if (voyage.includes(id)) {
    voyage = voyage.filter(v => v !== id);
    showToast(`"${nom}" retiré du voyage`, 'success');
  } else {
    voyage.push(id);
    showToast(`"${nom}" ajouté au voyage ! 🧭`, 'success');
  }
  localStorage.setItem('rr_voyage', JSON.stringify(voyage));
  // Mettre à jour le bouton
  const btn = document.getElementById('vbtn-'+id);
  if (btn) {
    btn.className = 'btn-voyage ' + (voyage.includes(id) ? 'added' : '');
    btn.textContent = voyage.includes(id) ? '✅ Dans Mon Voyage' : '🧭 Ajouter au Voyage';
  }
  updateVoyageBar();
}

function updateVoyageBar() {
  const bar = document.getElementById('voyageBar');
  const count = document.getElementById('voyageCount');
  if (voyage.length > 0) {
    bar.style.display = 'flex';
    count.textContent = voyage.length;
  } else {
    bar.style.display = 'none';
  }
}

function applyFilters() {
  const region = document.getElementById('filterRegion').value;
  const type   = document.getElementById('filterType').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allLieux.filter(l => {
    if (region && l.region !== region) return false;
    if (type   && l.type   !== type)   return false;
    if (dogFilter  && !l.dog_friendly) return false;
    if (coeurFilter && !l.coeur)       return false;
    if (search && !l.nom.toLowerCase().includes(search) &&
        !(l.description||'').toLowerCase().includes(search)) return false;
    return true;
  });
  renderCards(filtered);
}

function toggleDogFilter() {
  dogFilter = !dogFilter;
  document.getElementById('filterDog').classList.toggle('active', dogFilter);
  applyFilters();
}
function toggleCoeurFilter() {
  coeurFilter = !coeurFilter;
  document.getElementById('filterCoeur').classList.toggle('active', coeurFilter);
  applyFilters();
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 2500);
}

checkAuth();
</script>
</body>
</html>
