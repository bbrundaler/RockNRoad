<style>
*{margin:0;padding:0;box-sizing:border-box;}

}

/* ── HERO MAP ── */
#hero{
  grid-row:1;grid-column:2;
  position:relative;overflow:hidden;
}
#hero-bg{
  position:absolute;inset:0;
  background:
    url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=80') center/cover no-repeat;
  transform:scale(1.05);
  animation:slowzoom 30s ease-in-out infinite alternate;
}
@keyframes slowzoom{from{transform:scale(1.05);}to{transform:scale(1.12);}}
#hero-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(to right, rgba(15,13,9,.5) 0%, rgba(15,13,9,.1) 50%, rgba(15,13,9,.6) 100%),
    linear-gradient(to bottom, rgba(15,13,9,.3) 0%, transparent 40%, rgba(15,13,9,.4) 100%);
}

/* Header */
#hero-header{
  position:absolute;top:0;left:0;right:0;
  padding:24px 28px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:3;
}
.hero-greeting h1{
  font-family:'Playfair Display',serif;
  font-size:32px;font-weight:700;color:white;line-height:1.1;
}
.hero-greeting p{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-style:italic;color:var(--cream-dim);margin-top:4px;
}
.hero-actions{display:flex;align-items:center;gap:12px;}
.avatars{display:flex;}
.avatar{width:34px;height:34px;border-radius:50%;border:2px solid rgba(200,168,75,.6);overflow:hidden;margin-left:-8px;background:var(--dark-3);}
.avatar:first-child{margin-left:0;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.btn-share{
  padding:9px 18px;background:var(--gold);color:var(--dark);
  border:none;border-radius:20px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.5px;
  display:flex;align-items:center;gap:7px;transition:all .2s;
  white-space:nowrap;
}
.btn-share:hover{background:var(--gold-light);transform:translateY(-1px);}

/* SVG Route */
#route-svg{position:absolute;inset:0;z-index:2;pointer-events:none;}

/* Markers */
.marker{
  position:absolute;z-index:3;
  display:flex;align-items:center;gap:8px;
  transform:translate(-50%,-50%);
  cursor:pointer;
}
.marker-circle{
  width:32px;height:32px;border-radius:50%;
  background:var(--dark-2);border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:13px;font-weight:700;
  color:var(--gold);flex-shrink:0;
  box-shadow:0 0 20px rgba(200,168,75,.3);
  transition:all .25s;
}
.marker:hover .marker-circle{background:var(--gold);color:var(--dark);transform:scale(1.15);}
.marker.active .marker-circle{background:var(--gold);color:var(--dark);box-shadow:0 0 30px rgba(200,168,75,.5);}
.marker-label{
  font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;
  color:white;text-shadow:0 1px 8px rgba(0,0,0,.8);white-space:nowrap;
}
.marker-sub{font-size:10px;color:var(--cream-dim);font-style:normal;display:block;}

/* Citation sur la carte */
#map-citation{
  position:absolute;left:28px;bottom:28px;z-index:3;
  max-width:220px;
}
#map-citation p{
  font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;
  color:rgba(245,239,224,.7);line-height:1.6;text-shadow:0 1px 8px rgba(0,0,0,.6);
}

/* ── RIGHT PANEL ── */
#panel{
  grid-row:1;grid-column:3;
  background:rgba(20,17,12,.88);
  border-left:1px solid rgba(200,168,75,.12);
  backdrop-filter:blur(24px);
  display:flex;flex-direction:column;
  overflow-y:auto;scrollbar-width:none;
}
#panel::-webkit-scrollbar{display:none;}

.panel-etape-header{
  padding:16px 20px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.panel-etape-label{
  font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);
  display:flex;align-items:center;gap:5px;
}
.panel-etape-label::before{content:'📍';font-size:10px;}
.panel-etape-dots{display:flex;gap:4px;}
.panel-dot{width:5px;height:5px;border-radius:50%;background:rgba(200,168,75,.2);}
.panel-dot.active{background:var(--gold);width:14px;border-radius:3px;}

.panel-photo{
  margin:14px 20px 0;border-radius:10px;overflow:hidden;
  height:170px;position:relative;flex-shrink:0;
}
.panel-photo-img{
  width:100%;height:100%;
  background:url('https://images.unsplash.com/photo-1510672981848-a1c4f1cb5ccf?w=700&q=80') center/cover;
}
.panel-photo-badge{
  position:absolute;top:10px;left:10px;
  background:rgba(15,13,9,.75);backdrop-filter:blur(8px);
  border:1px solid rgba(200,168,75,.25);
  padding:4px 10px;border-radius:20px;
  font-size:9px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--gold);
}

.panel-
.panel-etape-num{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--gold);margin-bottom:3px;}
.panel-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:white;line-height:1.2;margin-bottom:8px;}
.panel-desc{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--cream-dim);line-height:1.6;margin-bottom:14px;}

.panel-meta{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.panel-meta-row{display:flex;align-items:center;gap:10px;}
.panel-meta-icon{width:20px;height:20px;opacity:.6;flex-shrink:0;}
.panel-meta-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(200,168,75,.6);min-width:70px;}
.panel-meta-val{font-size:12px;color:var(--cream-dim);}

.panel-weather{
  display:flex;gap:10px;margin-bottom:14px;
  padding:10px 14px;background:rgba(200,168,75,.05);
  border-radius:8px;border:1px solid rgba(200,168,75,.1);
}
.panel-weather-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--cream-dim);}
.panel-weather-item span{font-size:15px;}

.panel-journal{
  padding:12px 14px;background:rgba(200,168,75,.04);
  border-radius:8px;border:1px solid rgba(200,168,75,.08);
  margin-bottom:12px;
}
.panel-journal-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.panel-journal-text{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--cream-dim);line-height:1.6;}

.panel-photos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.panel-photo-thumb{border-radius:6px;overflow:hidden;aspect-ratio:4/3;}
.panel-photo-thumb div{width:100%;height:100%;background-size:cover!important;background-position:center!important;transition:transform .3s;}
.panel-photo-thumb:hover div{transform:scale(1.08);}

/* ── STATS BAR ── */
#stats-bar{
  grid-row:2;grid-column:2/4;
  background:rgba(10,8,5,.95);
  border-top:1px solid rgba(200,168,75,.1);
  display:flex;align-items:center;
  padding:0 28px;
  gap:0;
  position:relative;z-index:5;
}
.stats-quote{
  flex:1;
  font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;
  color:rgba(200,168,75,.5);line-height:1.4;padding-right:28px;
  border-right:1px solid rgba(200,168,75,.1);
}
.stats-items{display:flex;gap:0;flex:2;}
.stat-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 20px;border-right:1px solid rgba(200,168,75,.08);gap:3px;
}
.stat-item:last-child{border-right:none;}
.stat-icon{font-size:18px;opacity:.7;margin-bottom:2px;}
.stat-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);line-height:1;}
.stat-label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(200,168,75,.4);}
.stats-badge{
  width:58px;height:58px;border-radius:50%;
  border:1.5px solid rgba(200,168,75,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin-left:20px;flex-shrink:0;
}
.stats-badge-rnr{font-family:'Playfair Display',serif;font-size:13px;font-weight:900;color:var(--gold);letter-spacing:1px;}
.stats-badge-sub{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(200,168,75,.4);}

/* ── CARDS ITINÉRAIRE ── */
#itineraire{
  grid-row:3;grid-column:2/4;
  background:rgba(15,13,9,.97);
  border-top:1px solid rgba(200,168,75,.08);
  padding:14px 0;
  position:relative;z-index:5;
}
.itin-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;margin-bottom:12px;
}
.itin-title{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.itin-link{font-size:11px;color:rgba(200,168,75,.5);cursor:pointer;transition:color .2s;display:flex;align-items:center;gap:4px;}
.itin-link:hover{color:var(--gold);}

.itin-track{
  display:flex;gap:10px;padding:0 28px;
  overflow-x:auto;scrollbar-width:none;
  padding-bottom:4px;
}
.itin-track::-webkit-scrollbar{display:none;}

/* Timeline line */
.itin-timeline{
  position:absolute;bottom:24px;left:28px;right:28px;
  height:2px;background:rgba(200,168,75,.1);
}
.itin-progress{
  height:100%;background:linear-gradient(to right, var(--gold), rgba(200,168,75,.3));
  width:37%;border-radius:1px;
}
.itin-timeline-dots{
  position:absolute;top:50%;transform:translateY(-50%);
  width:100%;display:flex;justify-content:space-between;padding:0 0;
}
.itin-tdot{width:7px;height:7px;border-radius:50%;background:rgba(200,168,75,.2);border:1.5px solid rgba(200,168,75,.3);flex-shrink:0;}
.itin-tdot.done{background:var(--gold);border-color:var(--gold);}
.itin-tdot.active{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(200,168,75,.5);width:10px;height:10px;}

.card-stop{
  flex-shrink:0;width:140px;border-radius:10px;overflow:hidden;
  position:relative;cursor:pointer;transition:all .25s;
  border:2px solid transparent;height:100px;
}
.card-stop:hover{transform:translateY(-3px);border-color:rgba(200,168,75,.3);}
.card-stop.active{border-color:var(--gold);box-shadow:0 0 20px rgba(200,168,75,.25);}
.card-stop-bg{width:100%;height:100%;background-size:cover!important;background-position:center!important;position:relative;}
.card-stop-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(0,0,0,.65) 100%);}
.card-stop-jour{position:absolute;top:8px;left:9px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(200,168,75,.9);}
.card-stop-info{position:absolute;bottom:8px;left:9px;right:9px;}
.card-stop-city{font-size:13px;font-weight:700;color:white;line-height:1.1;}
.card-stop-region{font-size:9px;color:rgba(245,239,224,.6);margin-top:1px;}

/* Nav arrows */
.itin-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.2);
  color:var(--gold);width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;transition:all .2s;z-index:2;
}
.itin-nav:hover{background:rgba(200,168,75,.2);}
#itin-prev{left:4px;top:60px;}
#itin-next{right:368px;top:60px;}

/* ── ANIMATIONS ── */
@keyframes fadeup{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fadeup{animation:fadeup .6s ease forwards;}
.fadeup-2{animation:fadeup .6s .15s ease forwards;opacity:0;}
.fadeup-3{animation:fadeup .6s .3s ease forwards;opacity:0;}
.fadeup-4{animation:fadeup .6s .45s ease forwards;opacity:0;}

/* Route SVG animation */

/* MAIN */
#app-main{height:100vh;}/* override app.css */
#top-bar{background:rgba(22,20,16,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,168,75,.15);padding:0 20px;height:46px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100;}

.top-bar-actions{display:flex;gap:8px;}
.tb-btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;border:none;}
.tb-btn-clear{background:rgba(200,50,0,.15);color:#ff8060;border:1px solid rgba(200,50,0,.2);}
.tb-btn-clear:hover{background:rgba(200,50,0,.3);}
.tb-btn-add{background:var(--gold);color:var(--dark);}
.tb-btn-add:hover{background:#e0c060;}
.tb-btn-print{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.12);}

/* CONTENU */
#voyage-content{display:flex;flex:1;overflow:hidden;}
#voyage-panel{width:300px;flex-shrink:0;background:#1E1A16;border-right:1px solid rgba(200,168,75,.1);display:flex;flex-direction:column;overflow:hidden;}
#panel-header{padding:16px 16px 12px;border-bottom:1px solid rgba(200,168,75,.08);flex-shrink:0;}
#panel-header h2{font-family:'Playfair Display',serif;font-size:18px;color:white;margin-bottom:2px;}
#panel-header p{font-size:11px;color:rgba(255,255,255,.35);}
#stops-list{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:rgba(200,168,75,.2) transparent;}
#panel-footer{padding:12px 16px;border-top:1px solid rgba(200,168,75,.08);flex-shrink:0;background:#1a1610;}
.pf-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.pf-label{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);}
.pf-val{font-size:20px;font-weight:800;color:var(--gold);}
.pf-val.sm{font-size:13px;}

/* STOP ITEMS */
.stop-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);margin-bottom:6px;cursor:grab;transition:background .15s;}
.stop-item:hover{background:rgba(255,255,255,.07);}
.drag-handle{color:rgba(255,255,255,.2);font-size:14px;cursor:grab;flex-shrink:0;user-select:none;}
.stop-num{width:22px;height:22px;border-radius:50%;background:var(--gold);color:var(--dark);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;flex-shrink:0;}
.stop-info{flex:1;min-width:0;}
.stop-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stop-meta{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;}
.stop-dist{font-size:9px;color:rgba(200,168,75,.6);margin-top:2px;}
.stop-remove{background:none;border:none;color:rgba(255,255,255,.25);font-size:16px;cursor:pointer;padding:2px 6px;border-radius:4px;flex-shrink:0;line-height:1;transition:all .15s;}
.stop-remove:hover{background:rgba(200,50,0,.25);color:#ff8060;}

/* VIDE */
.empty-voyage{display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;height:100%;}
.empty-voyage .icon{font-size:44px;margin-bottom:12px;opacity:.4;}
.empty-voyage h3{font-family:'Playfair Display',serif;font-size:18px;color:rgba(255,255,255,.6);margin-bottom:6px;}
.empty-voyage p{font-size:12px;color:rgba(255,255,255,.3);line-height:1.6;max-width:220px;}

#map{flex:1;height:100%;}

@media print{#sidebar,#top-bar,#voyage-panel{display:none!important;}#app-main{height:100vh;}/* override app.css */#map{height:100vh!important;width:100vw!important;}}
/* ── SIDEBAR ── */
#sidebar{
  position:fixed;top:0;left:0;bottom:0;
  background:rgba(15,13,9,.95);
  border-right:1px solid rgba(200,168,75,.1);
  display:flex;flex-direction:column;
  padding:0;
  position:relative;z-index:10;
}

</style>

  <div style="font-size:44px;">🐾</div>
  <h2>RockNRoad</h2>
  <p style="font-size:11px;opacity:.5;letter-spacing:2px;">Chargement...</p>
  <div class="spinner"></div>
</div>

<div id="sidebar"></div>

<div id="app-main">
  <div id="top-bar">
    <div class="top-bar-title">🧭 Mon <em>Voyage</em></div>
    <div class="top-bar-actions">
      <button class="tb-btn tb-btn-clear" onclick="clearAll()">🗑 Tout effacer</button>
      <button class="tb-btn tb-btn-add" onclick="window.location.href='carnet.html'">+ Ajouter des lieux</button>

        </div>

          <span class="pf-val" id="totalDist">— km</span>

          <span class="pf-label">Étapes</span>
          <span class="pf-val sm" id="totalStops">0</span>

  </div>
</div>

<script>
const SURL='https://cazqllstxhuecoqpktwm.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhenFsbHN0eGh1ZWNvcXBrdHdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTExNTQsImV4cCI6MjA5NDk2NzE1NH0.6YYAJXG4s-h78YUp2pd7fBvQJzDprSxtSkUZTv6ZtZs';
const sb=supabase.createClient(SURL,SKEY);

let map, routeLayer;
// Source unique de vérité — tableau d'objets {uid, nom, lat, lng, region, type}
// uid = identifiant UNIQUE généré à l'ajout (pas l'id Supabase, pas l'index)
let voyage = [];

// ── Auth ──────────────────────────────────────────────────────────────────────
(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  document.getElementById('auth-check').style.display='none';
  const e=session.user.email;
  document.getElementById('sb-avatar').textContent=e.charAt(0).toUpperCase();
  document.getElementById('sb-username').textContent=e.split('@')[0];
  initMap();
  initListEvents();
  loadVoyage();
})();
async function logout(){await sb.auth.signOut();window.location.href='index.html';}

// ── Carte ─────────────────────────────────────────────────────────────────────
function initMap(){
  map=L.map('map').setView([46.5,2.5],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);
  routeLayer=L.layerGroup().addTo(map);
  setTimeout(()=>map.invalidateSize(),200);
}

// ── Persistance ───────────────────────────────────────────────────────────────
function saveVoyage(){
  localStorage.setItem('rr_voyage_full', JSON.stringify(voyage));
  localStorage.setItem('rr_voyage', JSON.stringify(voyage.map(v=>v.id)));
}

function loadVoyage(){
  const raw = JSON.parse(localStorage.getItem('rr_voyage_full')||'[]');
  // Migrer les anciens formats : garantir que chaque item a un uid
  voyage = raw
    .filter(v=>v&&v.lat&&v.lng)
    .map(v=>{
      // Générer un uid unique pour chaque item sans uid
      const uid = v.uid && typeof v.uid==='string' && v.uid.length>4
        ? v.uid
        : Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2);
      return {...v, uid};
    });
  render();
}

// ── Render central (UN seul endroit qui dessine tout) ─────────────────────────
function render(){
  // Toujours vider la carte en premier — synchrone, garanti
  if(routeLayer) routeLayer.clearLayers();
  renderList();
  // Redessiner la carte seulement s'il reste des lieux
  if(voyage.length) renderMap();
}

// ── Délégation d'événements — UN seul listener permanent sur le container ─────
function initListEvents(){
  const list = document.getElementById('stops-list');

  // Bouton ✕ — délégation
  list.addEventListener('click', function(e){
    const btn = e.target.closest('.stop-remove');
    if(!btn) return;
    e.stopPropagation();
    e.preventDefault();
    const uid = btn.closest('.stop-item')?.dataset.uid;
    if(uid) removeByUid(uid);
  });

  // Drag & drop — délégation
  list.addEventListener('dragstart', e=>{
    const item = e.target.closest('.stop-item');
    if(!item) return;
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain', item.dataset.uid||'');
    item.style.opacity='0.4';
  });
  list.addEventListener('dragend', e=>{
    const item = e.target.closest('.stop-item');
    if(item) item.style.opacity='';
  });
  list.addEventListener('dragover', e=>{ e.preventDefault(); });
  list.addEventListener('drop', e=>{
    e.preventDefault();
    const target = e.target.closest('.stop-item');
    if(!target) return;
    const fromUid = e.dataTransfer.getData('text/plain');
    const toUid = target.dataset.uid;
    if(!fromUid||!toUid||fromUid===toUid) return;
    const fi = voyage.findIndex(v=>v.uid===fromUid);
    const ti = voyage.findIndex(v=>v.uid===toUid);
    if(fi<0||ti<0) return;
    const moved = voyage.splice(fi,1)[0];
    voyage.splice(ti,0,moved);
    saveVoyage();
    render();
  });
}

function renderList(){
  const list = document.getElementById('stops-list');
  const empty = document.getElementById('emptyVoyage');

  if(!voyage.length){
    // Vider uniquement les stop-items, pas l'empty
    list.querySelectorAll('.stop-item').forEach(el=>el.remove());
    list.appendChild(empty);
    empty.style.display='flex';
    document.getElementById('totalDist').textContent='— km';
    document.getElementById('totalStops').textContent='0';
    return;
  }

  // Vider uniquement les stop-items
  list.querySelectorAll('.stop-item').forEach(el=>el.remove());
  empty.style.display='none';

  voyage.forEach((item, i)=>{
    const dist = i>0 && voyage[i-1].lat && item.lat
      ? calcDist(voyage[i-1].lat, voyage[i-1].lng, item.lat, item.lng)
      : null;
    const distHtml = dist ? `<div class="stop-dist">↑ ${dist} km</div>` : '';

    const row = document.createElement('div');
    row.className='stop-item';
    row.draggable=true;
    row.dataset.uid = item.uid; // ← uid dans le DOM, pas dans un listener

    row.innerHTML=`
      <span class="drag-handle">⠿</span>
      <div class="stop-num">${i+1}</div>
      <div class="stop-info">
        <div class="stop-name">${item.nom||'—'}</div>
        <div class="stop-meta">${item.region||''} ${item.type?'· '+item.type:''}</div>
        ${distHtml}
      </div>
      <button class="stop-remove" title="Retirer">✕</button>
    `;
    list.appendChild(row);
  });

  // Totaux
  let total=0;
  for(let i=1;i<voyage.length;i++){
    const a=voyage[i-1], b=voyage[i];
    if(a.lat&&b.lat) total+=calcDist(a.lat,a.lng,b.lat,b.lng);
  }
  document.getElementById('totalDist').textContent=total>0?Math.round(total)+' km':'— km';
  document.getElementById('totalStops').textContent=voyage.length;
}

function renderMap(){
  if(!map||!routeLayer) return;
  // clearLayers déjà appelé dans render() avant renderMap()
  const pts = voyage.filter(v=>v.lat&&v.lng);
  if(!pts.length) return;

  pts.forEach((v,i)=>{
    const icon=L.divIcon({
      html:`<div style="background:#1A1208;color:#C8A84B;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;border:2.5px solid #C8A84B;box-shadow:0 2px 8px rgba(0,0,0,.4);">${i+1}</div>`,
      className:'',iconSize:[30,30],iconAnchor:[15,15]
    });
    L.marker([v.lat,v.lng],{icon}).addTo(routeLayer).bindPopup(`
      <div style="font-family:Inter,sans-serif;min-width:160px;">
        <div style="font-weight:700;font-size:14px;margin-bottom:4px;">${i+1}. ${v.nom||'—'}</div>
        <div style="font-size:11px;color:#888;">${v.region||''} ${v.type?'· '+v.type:''}</div>
      </div>
    `);
  });

  if(pts.length>1){
    const coords=pts.map(v=>[v.lat,v.lng]);
    L.polyline(coords,{color:'rgba(200,168,75,.2)',weight:10}).addTo(routeLayer);
    L.polyline(coords,{color:'#C8A84B',weight:3,dashArray:'10,6'}).addTo(routeLayer);
  }

  if(pts.length===1) map.setView([pts[0].lat,pts[0].lng],12);
  else map.fitBounds(pts.map(v=>[v.lat,v.lng]),{padding:[40,40]});
}

// ── Actions ───────────────────────────────────────────────────────────────────
function removeByUid(uid){
  if(!uid || typeof uid !== 'string' || uid.length < 4){
    console.warn('removeByUid: uid invalide', uid);
    return;
  }
  const before = voyage.length;
  voyage = voyage.filter(v=>v.uid!==uid);
  const after = voyage.length;
  if(before===after){
    console.warn('removeByUid: aucun item supprimé pour uid', uid);
    return;
  }
  saveVoyage();
  render();
}

function clearAll(){
  if(!confirm('Effacer tout le voyage ?')) return;
  voyage=[];
  saveVoyage();
  render();
}

// ── Haversine ─────────────────────────────────────────────────────────────────
function calcDist(lat1,lng1,lat2,lng2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

window.addEventListener('resize',()=>{if(map)map.invalidateSize();});
</script>
