<!DOCTYPE html>
<html lang="fr">
<head>
<script src="rnr-config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RockNRoad · Souvenir · L'aventure ne s'oublie pas</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&family=Caveat:wght@600;700&family=Special+Elite&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="chrome.js"></script>
<script src="tags.js"></script>
<script src="fiche-complete.js"></script>
<script src="lightbox.js"></script>
<style>
/* SOUVENIR v3 (20/07 suite, B114) — bloc② : l'écran principal est câblé au réel
   (fenêtre de collecte + mode live + galerie temps réel). La carte à tags, le
   tourniquet et le carré d'ambiance restent des emplacements honnêtes (état
   "à venir"), PAS des données inventées — ce sera bloc④/⑤. Zéro couleur en
   dur : tout via tokens.css, comme partout ailleurs sur le site. */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-body);color:var(--ink);background:var(--bg);}

.stage{
  height:calc(100vh - 56px);
  padding:12px;display:flex;gap:11px;
  min-height:0;
}
.col{display:flex;flex-direction:column;gap:11px;min-height:0;min-width:0;}
.col-left{flex:2;}
.col-right{flex:1;}
/* Mode Montage : plus besoin de la carte, du tourniquet ni de l'ambiance —
   ce n'est pas leur moment. Le bloc principal prend toute la place pour
   devenir un vrai atelier de montage (retour Bruno 21/07). */
.stage.mode-montage .col-right,
.stage.mode-montage .b-shelf{display:none;}
.stage.mode-montage .col-left{flex:1;}

.blk{background:var(--surface);border:1px solid var(--surface-line);border-radius:var(--r-lg);
  display:flex;flex-direction:column;min-height:0;overflow:hidden;box-shadow:var(--shadow);}
.bh{display:flex;align-items:center;gap:8px;padding:11px 15px;border-bottom:1px solid var(--surface-line);flex-shrink:0;}
#souv-bh{background:linear-gradient(90deg,var(--gold-deep),var(--gold) 60%,var(--gold-light));
  color:#1a1208;padding:0 14px;height:46px;box-sizing:border-box;flex-wrap:nowrap;overflow:hidden;}
#souv-bh .sb-t{font-family:var(--font-title);font-weight:700;font-size:14.5px;flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#souv-bh button{font-family:var(--font-title);font-weight:700;font-size:12.5px;color:#1a1208;
  background:var(--surface);border:none;border-radius:var(--r-pill);padding:7px 16px;cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,.25);white-space:nowrap;flex-shrink:0;}
#souv-bh button:disabled{opacity:.6;cursor:wait;}
.souv-onglets{display:flex;gap:2px;padding:4px 16px 0;flex-shrink:0;}
.souv-onglets button{font-family:var(--font-title);font-weight:700;font-size:12.5px;color:var(--ink-dim);
  background:transparent;border:none;border-bottom:2px solid transparent;padding:6px 14px;cursor:pointer;}
.souv-onglets button.actif{color:var(--gold-text);border-bottom-color:var(--gold);}
.bh .ic{font-size:15px;}

/* Mode Montage (B129, corrigé B132 22/07 — retour Bruno : "rien ne colle",
   le display:contents ne marchait pas de façon fiable en vrai navigateur).
   Nouvelle approche, robuste : un VRAI second conteneur frère (#souv-page-
   droite, posé dans le HTML statique), pas un bricolage CSS qui essaie de
   faire sortir des éléments de leurs parents. Bandeau confiné à la colonne
   de gauche, page de droite = grid-row 1/3, pleine hauteur dès le sommet. */
.stage.mode-montage .b-main{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr;height:100%;}
.stage.mode-montage #souv-bh{grid-column:1;grid-row:1;}
.stage.mode-montage #souv-main{grid-column:1;grid-row:2;min-height:0;overflow:hidden;display:flex;flex-direction:column;}
.stage.mode-montage #souv-page-droite{grid-column:2;grid-row:1/3;min-height:0;overflow:hidden;display:block;}
#souv-page-droite{flex:0 0 0;overflow:hidden;}
.bh h3{font-family:var(--font-title);font-size:14.5px;font-weight:600;flex:1;color:var(--ink);}

/* ══════════ ÉCRAN PRINCIPAL (2/3) ══════════ */
.b-main{flex:1;min-height:0;}
.main-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:auto;}

/* -- état neutre (dates manquantes / avant / après fenêtre) -- */
.etat-vide{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:28px;gap:8px;}
.etat-vide .ic{font-size:30px;opacity:.7;}
.etat-vide .t{font-family:var(--font-title);font-size:16px;font-weight:600;color:var(--ink);max-width:360px;}
.etat-vide .s{font-size:12.5px;color:var(--ink-dim);max-width:340px;line-height:1.4;}
.etat-vide a.lien{font-size:12.5px;color:var(--gold-text);text-decoration:underline;margin-top:2px;}

/* Mosaïque en colonnes (façon Pinterest/Google Photos) : chaque photo garde
   sa vraie forme, jamais recadrée en carré. Classe renommée "souv-item"
   (au lieu de "ph") après collision constatée avec une classe existante
   d'app.css qui écrasait le cadrage — leçon : jamais de nom de classe à
   2-3 lettres sur une page qui charge le style global du site. */
.live-grid{column-count:4;column-gap:7px;padding:8px 16px 12px;}
.souv-item{break-inside:avoid;margin-bottom:8px;border-radius:var(--r);overflow:hidden;position:relative;
  box-shadow:0 3px 10px rgba(0,0,0,.28);background:var(--gold-a10);cursor:pointer;}
.souv-item img{display:block;width:100%;height:auto;}
.souv-item .meta{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(to top,rgba(15,13,9,.92) 45%,transparent);
  padding:18px 8px 6px;font-size:11px;color:#fff;line-height:1.3;}
.souv-item .meta b{display:block;font-size:11.5px;}
.souv-item .meta i{display:block;font-size:10.5px;opacity:.9;margin-top:1px;}
.souv-item-img-wrap{position:relative;}
.souv-item-suppr{position:absolute;top:6px;right:6px;z-index:2;width:22px;height:22px;border:none;border-radius:50%;
  background:rgba(20,16,10,.65);color:#fff;font-size:12px;line-height:22px;padding:0;cursor:pointer;}
.souv-item img{cursor:pointer;}
.souv-item-legende{display:block;width:100%;box-sizing:border-box;font-family:var(--font-body);font-size:10.5px;
  color:var(--ink);background:var(--surface);border:none;padding:6px 8px;}
.souv-item-legende::placeholder{color:var(--ink-dim);}
.live-note{padding:0 16px 10px;font-size:11px;color:var(--ink-dim);font-style:italic;text-align:center;flex-shrink:0;}
.live-vide{padding:20px;text-align:center;font-size:12.5px;color:var(--ink-dim);font-style:italic;}

/* -- l'atelier de montage (après la fenêtre de collecte) -- */
/* Atelier = 50/50 franc entre le tableau de bord (gauche) et la page qu'on
   travaille (droite) — retour Bruno 22/07 : "beaucoup de vide", "un vrai
   atelier de travail à gauche et la page à droite en pleine largeur". Le
   sélecteur de carnet ET le sélecteur de page vivent maintenant DANS la
   colonne de gauche (plus aucune barre ne traverse tout l'écran au-dessus
   de la page travaillée, qui gagne un maximum de hauteur). */
.cahier-selecteur{display:flex;align-items:center;gap:6px;padding:10px 12px;border-bottom:1px solid var(--surface-line);flex-shrink:0;flex-wrap:wrap;}
.cahier-selecteur select{font-family:var(--font-body);font-size:12px;background:var(--bg);color:var(--ink);border:1px solid var(--gold-a35);border-radius:8px;padding:5px 8px;min-width:0;flex:1 1 140px;}
.cahier-selecteur button{font-family:var(--font-title);font-weight:700;font-size:11.5px;color:var(--gold-text);background:var(--gold-a10);border:1px solid var(--gold-a35);border-radius:var(--r-pill);padding:5px 12px;cursor:pointer;white-space:nowrap;}
.cahier-selecteur .montage-valid-btn{font-family:var(--font-title);font-weight:700;font-size:12px;color:#1a1208;background:linear-gradient(90deg,var(--gold),var(--gold-light));border:none;border-radius:var(--r-pill);padding:6px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.cahier-selecteur .montage-badge{background:var(--gold-a10);border:1px solid var(--gold-a35);border-radius:var(--r-pill);padding:5px 12px;font-size:11px;color:var(--gold-light);white-space:nowrap;flex-shrink:0;}

.atelier-tri{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;border-right:1px solid var(--surface-line);background:var(--surface);}
.dash-outils{flex-shrink:0;padding:10px 12px 8px;border-bottom:1px solid var(--surface-line);}
.dash-outils-hint{font-size:11.5px;color:var(--ink-dim);line-height:1.4;margin:0;}
.dash-photos{flex:1;min-height:0;overflow:auto;padding:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-content:start;}
.dash-ph{position:relative;min-width:0;background:var(--bg);border:1px solid var(--gold-a20);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.15);}
.dash-ph-suppr{position:absolute;top:4px;right:4px;z-index:2;width:20px;height:20px;border:none;border-radius:50%;
  background:rgba(20,16,10,.7);color:#fff;font-size:11px;line-height:20px;padding:0;cursor:pointer;}
.dash-ph-img{width:100%;height:110px;background-size:contain;background-repeat:no-repeat;background-position:center;background-color:var(--surface);cursor:pointer;}
.dash-ph-legende{display:block;width:100%;min-width:0;box-sizing:border-box;font-family:var(--font-body);font-size:10px;
  background:var(--bg);color:var(--ink);border:none;border-top:1px solid var(--surface-line);padding:4px 6px;}
.dash-ph[draggable="true"]{cursor:grab;}
.dash-ph[draggable="true"]:active{cursor:grabbing;}
.page-selecteur{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--surface-line);}
.page-selecteur select{flex:1;min-width:0;font-family:var(--font-title);font-weight:700;font-size:12.5px;color:var(--ink);
  background:var(--surface);border:1px solid var(--gold-a35);border-radius:8px;padding:6px 10px;}
.page-nav{font-family:var(--font-title);font-weight:700;font-size:14px;color:var(--gold-text);background:var(--gold-a10);
  border:1px solid var(--gold-a35);border-radius:50%;width:28px;height:28px;flex-shrink:0;cursor:pointer;}
.page-nav:disabled{opacity:.3;cursor:default;}
.atelier-livre{height:100%;box-sizing:border-box;overflow:auto;padding:24px;display:flex;justify-content:center;align-items:flex-start;background:var(--bg);}
/* Feuille A4 (B131, 22/07) : calibrage du FORMAT seulement — ratio réel
   210×297mm, teinte papier déjà définie dans tokens.css (--paper). Les
   réglages fins de l'habillage papier (couleurs internes des cartes, etc.)
   viendront plus tard — pour l'instant, juste voir si une page est pleine
   ou vide au format d'impression réel. */
.feuille-a4{width:100%;max-width:600px;aspect-ratio:210/297;flex-shrink:0;background:var(--paper);
  box-shadow:0 10px 34px rgba(0,0,0,.35);border-radius:3px;overflow:auto;display:flex;flex-direction:column;}
.sv-page-style{display:flex;flex-direction:column;flex:1;min-height:0;box-sizing:border-box;}
.sv-zone{border:1.5px dashed var(--gold-a35);border-radius:6px;box-sizing:border-box;}
.sv-zone-vide{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-body);font-size:12.5px;color:var(--gold-deep);font-style:italic;}
.sv-zone-photo-heritee{width:100%;height:100%;background-size:cover;background-position:center;
  display:flex;align-items:flex-end;}
.sv-zone-photo-heritee span{display:block;width:100%;box-sizing:border-box;background:rgba(20,16,10,.6);
  color:#F5EFE0;font-family:var(--font-body);font-size:10.5px;text-align:center;padding:6px 8px;}

/* ── Page de garde (B133, 22/07) — calée sur la VRAIE couverture de
   cahier.html (thème Edition) : bandeau, titre+sous-titre, photo, stats.
   Texte sombre sur papier clair (--paper-ink), comme le vrai Cahier —
   jamais l'habillage sombre/or du reste de l'atelier. ── */
.sv-cover{padding:32px 26px 20px;text-align:center;}
.sv-e-rule{width:32px;height:1px;background:var(--gold-deep);margin:0 auto 12px;}
.sv-e-zone-eyebrow{display:inline-block;padding:3px 10px;margin:0 auto 14px;}
.sv-e-eyebrow{display:block;border:none;background:transparent;text-align:center;font-family:var(--font-body);
  font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-deep);font-weight:600;width:230px;max-width:60vw;}
.sv-e-zone-titre{padding:8px 16px 12px;margin:0 auto 16px;max-width:92%;}
.sv-e-title{display:block;width:100%;border:none;background:transparent;text-align:center;
  font-family:var(--font-title);font-weight:700;font-size:32px;color:var(--paper-ink);margin-bottom:6px;}
.sv-e-sub{display:block;width:100%;border:none;background:transparent;text-align:center;
  font-family:var(--font-title);font-style:italic;font-size:12.5px;color:var(--ink-dim);}
.sv-e-zone-photo{margin:0 14px 14px;overflow:hidden;}
.sv-e-photo-nb{display:flex;justify-content:center;gap:6px;padding:6px;border-bottom:1px dashed var(--gold-a35);}
.sv-e-photo-nb button{width:20px;height:20px;font-size:10.5px;font-family:var(--font-title);font-weight:700;
  color:var(--ink-dim);background:var(--surface);border:1px solid var(--surface-line);border-radius:50%;cursor:pointer;padding:0;}
.sv-e-photo-nb button.actif{color:var(--gold-deep);background:var(--gold-a10);border-color:var(--gold-a35);}
.sv-e-photo-slots{display:grid;height:210px;}
.sv-e-photo-slot{position:relative;overflow:hidden;border-right:1px solid var(--paper-line);}
.sv-e-photo-slot:last-child{border-right:none;}
.sv-e-photo-slot .sv-galerie{height:100%;width:100%;margin:0;padding:0;}
.sv-e-photo-slot .sv-ph-bloc{width:100%;height:100%;}
.sv-e-photo-slot .sv-ph{width:100%;height:100%;border-radius:0;border:none;}
.sv-e-zone-stats{margin:0 14px 14px;display:flex;padding:12px 0;}
.sv-e-stat{flex:1;text-align:center;border-left:1px solid var(--paper-line);padding:0 6px;}
.sv-e-stat:first-child{border-left:none;}
.sv-e-stat b{display:block;font-family:var(--font-title);font-size:15px;color:var(--paper-ink);}
.sv-e-stat span{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);}

/* ── Autres pages « papier » (B134, 22/07) : même langage que la Page de
   garde — en-tête calé sur cahier.html (kicker + titre), zones en
   pointillés, texte sombre sur papier clair. ── */
.sv-e-zone-entete{padding:6px 14px;margin:0 auto 14px;display:inline-block;}
.sv-e-kicker{margin:0 0 2px;font-family:var(--font-body);font-size:10.5px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--ink-dim);}
.sv-e-titre-page{margin:0;color:var(--paper-ink);
  font-family:var(--sv-font,var(--font-title));font-size:var(--sv-size,26px);
  font-weight:var(--sv-weight,700);font-style:var(--sv-style,normal);text-align:var(--sv-align,center);}
.sv-e-zone-cartes{margin:0 14px 14px;padding:10px 4px;}
.sv-e-zone-libre{margin:0 14px 14px;padding:12px;min-height:70px;text-align:left;}
.sv-e-zone-libre-hint{margin:0 0 8px;font-family:var(--font-body);font-size:11.5px;color:var(--gold-deep);
  font-style:italic;text-align:center;}
.sv-e-texte-libre,.sv-e-texte-principal{display:block;width:100%;box-sizing:border-box;border:none;
  background:transparent;resize:vertical;color:var(--paper-ink);
  font-family:var(--sv-font,var(--font-body));font-weight:var(--sv-weight,400);
  font-style:var(--sv-style,normal);text-align:var(--sv-align,left);}
.sv-e-texte-libre{font-size:var(--sv-size,12.5px);line-height:1.6;min-height:70px;}
.sv-e-texte-principal{font-size:var(--sv-size,13.5px);line-height:1.7;min-height:160px;}
/* (B140, 22/07) contenteditable n'a pas de vrai attribut placeholder — on
   le simule ; et un léger repère visuel au clic, pour qu'on sache où on
   écrit (les champs n'ont plus de cadre de formulaire classique). */
[contenteditable="true"]:empty::before{content:attr(data-placeholder);color:var(--ink-dim);opacity:.6;
  font-style:italic;pointer-events:none;}
[contenteditable="true"]:focus{outline:1.5px dashed var(--gold-deep);outline-offset:2px;border-radius:3px;}

/* ── Briques modulables (B136, 22/07) : texte ou photo, au choix, ajoutées/
   retirées librement — même moteur partout (4 pages libres, pages "suite"
   des étapes, pages entièrement libres). ── */
.sv-e-zone-briques{margin:0 14px 14px;padding:12px;text-align:left;}
.sv-brique{position:relative;border:1px dashed var(--paper-line);border-radius:6px;padding:10px;margin-bottom:10px;}
.sv-brique:last-of-type{margin-bottom:0;}
.sv-brique-retirer{position:absolute;top:4px;right:4px;width:20px;height:20px;border:none;border-radius:50%;
  background:var(--paper);color:var(--ink-dim);font-size:11px;line-height:20px;padding:0;cursor:pointer;z-index:2;}
.sv-brique-photo{min-height:100px;}
.sv-brique-photo .sv-galerie{margin:0;}
.sv-brique-texte .sv-e-texte-libre{min-height:50px;}
.sv-brique-ajout{display:flex;gap:8px;justify-content:center;}
.sv-brique-ajout button{font-family:var(--font-title);font-weight:700;font-size:11.5px;color:var(--gold-deep);
  background:var(--gold-a10);border:1px solid var(--gold-a35);border-radius:999px;padding:6px 12px;cursor:pointer;}
/* ── Gabarits & cadres (B137, 22/07 — modèle CEWE) ── */
/* (B138) La colonne des gabarits vit ENTRE l'atelier et la feuille — plus
   jamais en haut de la page, qui reste pleine page. */
.sv-gab-col{display:flex;flex-direction:column;gap:8px;padding-right:14px;flex-shrink:0;align-self:flex-start;position:sticky;top:0;}
.sv-cover-libre{display:flex;flex-direction:column;flex:1;min-height:0;padding:16px 18px;}
.sv-gab-vignette{width:44px;height:56px;padding:5px;background:var(--bg);border:1.5px solid var(--gold-a20);
  border-radius:6px;cursor:pointer;}
.sv-gab-vignette.actif{border-color:var(--gold);background:var(--gold-a10);}
.sv-gab-mini{display:grid;gap:3px;width:100%;height:100%;}
.sv-gab-mini span{background:var(--gold-a35);border-radius:2px;}
.sv-gab-vignette.actif .sv-gab-mini span{background:var(--gold);}
/* Menu déroulant maison des pages (B138) — un "+" par ligne */
.page-dd{position:relative;flex:1;min-width:0;}
.page-dd-btn{width:100%;box-sizing:border-box;text-align:left;font-family:var(--font-title);font-weight:700;font-size:12.5px;
  color:var(--ink);background:var(--bg);border:1px solid var(--gold-a35);border-radius:8px;padding:6px 10px;cursor:pointer;
  display:flex;align-items:center;gap:6px;overflow:hidden;}
.page-dd-btn{white-space:nowrap;text-overflow:ellipsis;}
.page-dd-caret{margin-left:auto;color:var(--gold-text);flex-shrink:0;}
.page-dd-panel{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:60;background:var(--bg);
  border:1px solid var(--gold-a35);border-radius:8px;max-height:320px;overflow:auto;box-shadow:0 10px 30px rgba(0,0,0,.4);}
.page-dd-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid var(--surface-line);}
.page-dd-row:last-child{border-bottom:none;}
.page-dd-row.actif{background:var(--gold-a10);}
.page-dd-label{flex:1;min-width:0;font-family:var(--font-body);font-size:12px;color:var(--ink);cursor:pointer;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:3px 0;}
.page-dd-row.actif .page-dd-label{color:var(--gold-text);font-weight:600;}
.page-dd-plus{width:22px;height:22px;flex-shrink:0;font-family:var(--font-title);font-weight:700;font-size:13px;
  color:var(--gold-text);background:var(--gold-a10);border:1px solid var(--gold-a35);border-radius:6px;padding:0;cursor:pointer;}
.page-dd-suppr{width:22px;height:22px;flex-shrink:0;font-family:var(--font-title);font-weight:700;font-size:12px;
  color:var(--ink-dim);background:var(--bg);border:1px solid var(--surface-line);border-radius:6px;padding:0;cursor:pointer;}
.page-dd-suppr:hover{color:var(--danger,#c0392b);}
/* En-têtes et stats éditables (B138/B139) — chacun garde SA propre allure

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const {createClient}=supabase;
const sb=createClient(RNR_SURL,RNR_SKEY);
let VOYAGE_ID=null, GROUPE_ID=null, MON_MEMBRE_ID=null;
let MEMBRES=[];
let ANIMAUX=[]; // pour le texte de départ du bloc② Équipe — même source que cahier.html (RNR_ANIMAUX, chrome.js)
let RB_INFO={nom:'',date_debut:null,date_fin_envisagee:null,destination_libre:'',nb_participants:null,nb_animaux:null,but_voyage:'',notes_groupe:'',budget_estime:null,cahier_theme:null};
let PHOTOS=[];
let CANAL_PHOTOS=null;
let ITINERAIRE=[]; // pour le montage bloc③ : uid, ordre, rattache + tous les champs de la fiche (lieux.*)
let LEADERS=new Set();
let TOUS_VOYAGES=[]; // pour le tourniquet + la carte à tags (bloc④), toujours de vraies données
let MODE_ACTIF=null; // 'galerie' | 'montage' — deux onglets TOUJOURS accessibles (retour Bruno 21/07 :
                      // "il ne faut pas être bloqué"). La date ne choisit plus qu'un réglage par défaut.

function esc(t){ const d=document.createElement('div'); d.textContent=(t==null?'':t); return d.innerHTML; }
function fmtDateCourt(d){
  try{ return new Intl.DateTimeFormat('fr-FR',{day:'numeric',month:'long'}).format(d); }
  catch(e){ return ''; }
}
function fmtRelatif(iso){
  const d=new Date(iso); const diffMs=Date.now()-d.getTime();
  const min=Math.floor(diffMs/60000);
  if(min<1) return 'à l\'instant';
  if(min<60) return min+' min';
  const h=Math.floor(min/60);
  if(h<24) return h===1?'il y a 1 h':'il y a '+h+' h';
  const j=Math.floor(h/24);
  return j===1?'hier':'il y a '+j+' j';
}

async function resoutVoyageId(userId){
  let sess=null;
  try{ sess=sessionStorage.getItem('rnr_voyage_id'); }catch(e){}
  const {data:mem}=await sb.from('membres').select('id,groupe_id').eq('user_id',userId).limit(1).single();
  if(mem){ MON_MEMBRE_ID=mem.id; GROUPE_ID=mem.groupe_id; }
  if(sess){ VOYAGE_ID=sess; return; }
  if(!mem) return;
  const {data:vs}=await sb.from('voyages').select('id,est_principal,created_at').eq('groupe_id',mem.groupe_id).order('created_at',{ascending:true});
  const liste=vs||[]; const actif=liste.find(v=>v.est_principal)||liste[0];
  VOYAGE_ID=actif?actif.id:null;
}

// même patron que Cahier/Roadbook — un seul sélecteur de voyage, dans la barre (chrome.js)
async function chargeSelecteurChrome(){
  if(!GROUPE_ID) return;
  try{
    const {data:vs}=await sb.from('voyages').select('id,nom,est_principal,created_at').eq('groupe_id',GROUPE_ID).order('created_at',{ascending:true});
    const liste=vs||[];
    if(!liste.length) return;
    const actif=liste.find(v=>v.id===VOYAGE_ID)||liste.find(v=>v.est_principal)||liste[0];
    if(window.rnrChrome && rnrChrome.setVoyage){
      rnrChrome.setVoyage(actif.nom, liste, function(id){
        if(id==='__new__'){ window.location.href='home.html?nouveau=1'; return; }
        try{ sessionStorage.setItem('rnr_voyage_id',id); const v=liste.find(x=>x.id===id); if(v) sessionStorage.setItem('rnr_voyage_nom',v.nom); }catch(e){}
        window.location.reload();
      });
    }
  }catch(e){ console.warn('Souvenir: sélecteur de voyage', e); }
}

async function chargerInfosVoyage(){

// TOUS les carnets (officiel + personnels, étape B) : ils rangent les photos

async function assurerEtapesSnapshot(){
  try{
    const {data:existant}=await sb.from('souvenir_cahier_etapes').select('id').eq('voyage_id',VOYAGE_ID).limit(1);
    if(existant && existant.length) return true;

    const ids=[...new Set((rows||[]).map(r=>r.lieu_id))];
    let lieuxMap={};
    if(ids.length){
      const {data:fs}=await sb.from('lieux').select('*').in('id',ids);
      (fs||[]).forEach(f=>{ lieuxMap[f.id]=f; });
    }
    const etapes=(rows||[]).map(r=>{
      const f=lieuxMap[r.lieu_id]; if(!f) return null;
      return { voyage_id:VOYAGE_ID, groupe_id:GROUPE_ID, uid:r.uid,
        ordre:r.ordre, rattache_a_nuit_uid:r.rattache_a_nuit_uid||null, nb_nuits:r.nb_nuits||null,
        jour_offset:r.jour_offset||null, lieu_snapshot:f };

      const insE=await sb.from('souvenir_cahier_etapes').insert(etapes);

async function chargerOuCreerCahier(type, membreId){
  try{
    let q=sb.from('souvenir_cahiers').select('*').eq('voyage_id',VOYAGE_ID).eq('type',type);
    q = membreId ? q.eq('membre_id',membreId) : q.is('membre_id',null);

    const infosSnapshot={
      nom:RB_INFO.nom||null, destination_libre:RB_INFO.destination_libre||null,
      date_debut:RB_INFO.date_debut||null, date_fin_envisagee:RB_INFO.date_fin_envisagee||null,
      nb_participants:RB_INFO.nb_participants||null, nb_animaux:RB_INFO.nb_animaux||null,
      but_voyage:RB_INFO.but_voyage||null, notes_groupe:RB_INFO.notes_groupe||null,
      budget_estime:RB_INFO.budget_estime||null
      // volontairement PAS memo_blocs — page technique, exclue de la copie (consigne Bruno)
    };
    // Blocs libres ①②③④ (B126) : un texte de départ copié depuis les mêmes
    // calculs que cahier.html, généré UNE FOIS à la création — chaque carnet
    // (officiel ou personnel) reçoit ensuite sa PROPRE copie, totalement
    // libre à modifier sans jamais affecter les autres carnets.
    const blocsTexte={};
    SOUV_BLOCS_LIBRES.forEach(b=>{ blocsTexte[b.cle]=b.generer(); });
    const ins=await sb.from('souvenir_cahiers').insert({
      voyage_id:VOYAGE_ID, groupe_id:GROUPE_ID, type, membre_id:membreId||null,
      nom: type==='personnel' ? 'Le carnet de '+nomEnvoyeur(membreId) : null,
      infos_snapshot:infosSnapshot, cahier_theme:RB_INFO.cahier_theme||null,
      blocs_texte:blocsTexte, zones_page_garde:genererZonesPageGarde(), cree_par:MON_MEMBRE_ID
    }).select().single();
    if(ins.error) throw ins.error;
    return ins.data;
  }catch(e){ console.warn('Souvenir: création du carnet', e); return null; }
}

async function chargerItineraire(){
  ITINERAIRE=[];
  if(!VOYAGE_ID) return;
  try{
    const {data:rows}=await sb.from('souvenir_cahier_etapes').select('uid,ordre,rattache_a_nuit_uid,nb_nuits,jour_offset,lieu_snapshot')
      .eq('voyage_id',VOYAGE_ID).order('ordre',{ascending:true});
    const items=(rows||[]).map(r=>Object.assign({}, r.lieu_snapshot, {uid:r.uid, ordre:r.ordre, rattache:r.rattache_a_nuit_uid||null, jour:r.jour_offset||0}));
    // La colonne "ordre" seule ne suffit pas : une excursion peut s'y trouver
    // avant son propre camp de base (constaté sur La Rochotte). On reconstruit
    // le bon ordre : chaque camp de base (rattache=null) dans son ordre propre,
    // suivi immédiatement de ses excursions triées par jour — comme le Roadbook.
    const chaine=items.filter(it=>!it.rattache).sort((a,b)=>a.ordre-b.ordre);
    const parNuit={};
    items.filter(it=>it.rattache).forEach(it=>{ (parNuit[it.rattache]=parNuit[it.rattache]||[]).push(it); });
    Object.values(parNuit).forEach(liste=>liste.sort((a,b)=>(a.jour-b.jour)||(a.ordre-b.ordre)));
    ITINERAIRE=[];
    chaine.forEach(it=>{ ITINERAIRE.push(it); (parNuit[it.uid]||[]).forEach(ex=>ITINERAIRE.push(ex)); });
  }catch(e){ console.warn('Souvenir: itinéraire (copie figée)', e); ITINERAIRE=[]; }
}

// ══ Blocs libres ①②③④ (Présentation/Équipe/Trajet/Clôture, B126) ══
// Un texte de départ généré UNE FOIS à la création du carnet, à partir des
// mêmes calculs que cahier.html (jamais inventé) — ensuite totalement libre
// à modifier/compléter, indépendamment par carnet (retour Bruno 21/07 :
// "on copie juste cahier d'origine, pas d'invention de plus").
function calcDistKm(lat1,lng1,lat2,lng2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
function chaineDuVoyage(){ return ITINERAIRE.filter(it=>!it.rattache); }
// (22/07, B131) Même photo que la VRAIE couverture de cahier.html (fonction
// pageCouverture : la 1ère photo de fiche trouvée dans la chaîne principale)
// — juste pour ne jamais démarrer sur une page blanche. Remplacée dès
// qu'une vraie photo souvenir est déposée dessus (jamais une vraie
// "photo rangée", juste un fond visuel de départ).
function photoHeriteeCahier(){
  for(const it of chaineDuVoyage()){
    const p = it.photo_url || (it.photos_urls && it.photos_urls[0]);
    if(p) return p;
  }
  return null;
}
// (note : contrairement à cahier.html, ne compte pas la jambe domicile→1ère
// étape — Souvenir ne charge pas la position de départ du groupe. Différence
// assumée, pas un bug : l'essentiel du kilométrage réel y est déjà.)
function statsVoyage(){
  const chaine=chaineDuVoyage();
  let km=0;
  for(let i=1;i<chaine.length;i++){
    if(chaine[i-1].lat!=null && chaine[i].lat!=null) km+=calcDistKm(chaine[i-1].lat,chaine[i-1].lng,chaine[i].lat,chaine[i].lng);
  }
  const nuits=ITINERAIRE.reduce((s,it)=>{
    const estNuit=(window.RNR_TAGS && RNR_TAGS.estCouchage) ? RNR_TAGS.estCouchage(it) : false;
    return s+(estNuit?((it.nb_nuits&&it.nb_nuits>0)?it.nb_nuits:1):0);
  },0);
  return {km, nuits, etapes:chaine.length};
}

function genererTextePresentation(){
  const lignes=[];
  if(RB_INFO.destination_libre) lignes.push('Destination : '+RB_INFO.destination_libre);
  if(RB_INFO.date_debut) lignes.push('Départ : '+RB_INFO.date_debut+(RB_INFO.date_fin_envisagee?' → '+RB_INFO.date_fin_envisagee:''));
  const gens=[];
  if(RB_INFO.nb_participants) gens.push(RB_INFO.nb_participants+' participant'+(RB_INFO.nb_participants>1?'s':''));
  if(RB_INFO.nb_animaux) gens.push(RB_INFO.nb_animaux+' animal'+(RB_INFO.nb_animaux>1?'aux':''));
  if(gens.length) lignes.push(gens.join(' et '));
  const s=statsVoyage();
  if(s.etapes) lignes.push((s.km?('≈'+s.km+' km · '):'')+s.nuits+' nuit'+(s.nuits>1?'s':'')+' · '+s.etapes+' étape'+(s.etapes>1?'s':''));
  return lignes.join('\n');
}
function genererTexteEquipe(){
  const noms=MEMBRES.map(m=>m.prenom||m.pseudo).filter(Boolean);
  const animauxNoms=ANIMAUX.map(a=>a.nom).filter(Boolean);
  const total=noms.length+animauxNoms.length;
  const tagline=total>1 ? (total+' voyageurs, une seule route') : (total===1 ? 'Un voyageur, une route rien qu\'à lui' : '');
  const lignes=[]; if(tagline) lignes.push(tagline);
  if(noms.length) lignes.push('Qui embarque : '+noms.join(', '));
  if(animauxNoms.length) lignes.push('Et aussi : '+animauxNoms.join(', '));
  return lignes.join('\n');
}

// document.execCommand('fontSize', false, N) n'accepte que 1-7 (l'échelle
// HTML historique) — pas de px arbitraire, c'est une vraie limite de
// l'API, pas un choix. Correspondance : 2=petit, 3=normal (défaut), 5=grand.
const SOUV_TAILLES=[ {v:'2', label:'Petit'}, {v:'3', label:'Normal'}, {v:'5', label:'Grand'} ];

// Sanitisation (obligatoire) : le HTML tapé/formaté par une personne est vu
// par TOUTES les autres qui ouvrent ce carnet — jamais stocker/réafficher
// du HTML brut sans filtrage (balises et attributs strictement limités à
// la mise en forme). Liste blanche, pas liste noire.
const SOUV_RICH_TAGS_OK={B:1,STRONG:1,I:1,EM:1,U:1,SPAN:1,FONT:1,BR:1,DIV:1,P:1};
// Ces balises doivent disparaître ENTIÈREMENT, contenu compris (jamais
// dépilées comme les autres) — leur "texte" n'est pas du texte pour
// l'utilisateur (code, styles, document embarqué).
const SOUV_RICH_TAGS_SUPPRIMER={SCRIPT:1,STYLE:1,IFRAME:1,OBJECT:1,EMBED:1,LINK:1,META:1};
function sanitizeRichHtml(html){
  const tmp=document.createElement('div');
  tmp.innerHTML=html;
  (function nettoyer(node){
    Array.from(node.childNodes).forEach(child=>{
      if(child.nodeType===1){
        if(SOUV_RICH_TAGS_SUPPRIMER[child.tagName]){
          node.removeChild(child);
          return;
        }
        if(!SOUV_RICH_TAGS_OK[child.tagName]){
          while(child.firstChild) node.insertBefore(child.firstChild, child);
          node.removeChild(child);
          return;
        }
        Array.from(child.attributes).forEach(attr=>{
          if(attr.name==='style'){
            const okProps=['font-family','font-weight','font-style','text-align','font-size'];
            const garde=attr.value.split(';').map(s=>s.trim()).filter(s=>{
              const prop=s.split(':')[0].trim().toLowerCase();
              return okProps.indexOf(prop)>=0;
            }).join(';');
            if(garde) child.setAttribute('style', garde); else child.removeAttribute('style');
          } else if(!(child.tagName==='FONT' && attr.name==='size')){
            child.removeAttribute(attr.name);
          }
        });
        nettoyer(child);
      } else if(child.nodeType!==3){
        node.removeChild(child);
      }
    });
  })(tmp);
  return tmp.innerHTML;
}
// Valeur affichée dans un champ riche : si déjà édité, c'est du HTML
// sanitizé stocké tel quel ; sinon, le texte calculé de départ, échappé et
// avec ses retours à la ligne convertis (jamais de HTML non filtré).
function valeurRiche(store, texteDefaut){
  if(store!==undefined && store!==null && store!=='') return store;
  return esc(texteDefaut||'').replace(/\n/g,'<br>');
}
let _richBlocsSaveTimer=null, _richZoneSaveTimer=null, _richCadreSaveTimer=null, _richModuleSaveTimer=null;
function souvRichInput(el){
  const html=sanitizeRichHtml(el.innerHTML);
  const store=el.getAttribute('data-store');
  if(!SOUVENIR_CAHIER) return;
  if(store==='blocs'){
    const cle=el.getAttribute('data-cle');
    SOUVENIR_CAHIER.blocs_texte=Object.assign({}, SOUVENIR_CAHIER.blocs_texte, {[cle]:html});
    const cahierId=SOUVENIR_CAHIER.id, blocsTexte=SOUVENIR_CAHIER.blocs_texte;
    clearTimeout(_richBlocsSaveTimer);
    _richBlocsSaveTimer=setTimeout(()=>sauvegarderTexteLibre(cahierId, blocsTexte), 700);
  } else if(store==='zone'){
    const cle=el.getAttribute('data-cle');
    const zones=Object.assign({}, SOUVENIR_CAHIER.zones_page_garde, {[cle]:html});
    SOUVENIR_CAHIER.zones_page_garde=zones;
    const cahierId=SOUVENIR_CAHIER.id;
    clearTimeout(_richZoneSaveTimer);
    _richZoneSaveTimer=setTimeout(()=>sauvegarderZonesPageGarde(cahierId, zones), 700);
  } else if(store==='cadre'){
    const pageId=el.getAttribute('data-page'), n=el.getAttribute('data-n');
    const pageLibre=(SOUVENIR_CAHIER.pages_libres||[]).find(p=>p.id===pageId); if(!pageLibre) return;
    const cadres=Object.assign({}, pageLibre.cadres);
    cadres['c'+n]=Object.assign({type:'texte'}, cadres['c'+n], {texte:html});
    const pages=(SOUVENIR_CAHIER.pages_libres||[]).map(p=>p.id===pageId?Object.assign({},p,{cadres}):p);
    SOUVENIR_CAHIER.pages_libres=pages;
    const cahierId=SOUVENIR_CAHIER.id;
    clearTimeout(_richCadreSaveTimer);
    _richCadreSaveTimer=setTimeout(()=>sauvegarderPagesLibres(cahierId, pages), 700);
  } else if(store==='titrelibre'){
    const pageId=el.getAttribute('data-page');
    _modifierPageLibre(pageId, {titre:html}, false);
  } else if(store==='module'){
    const pageUid=el.getAttribute('data-page'), modId=el.getAttribute('data-id');
    const modules=Object.assign({}, SOUVENIR_CAHIER.modules_libres);
    modules[pageUid]=(modules[pageUid]||[]).map(m=>m.id===modId?Object.assign({},m,{texte:html}):m);
    SOUVENIR_CAHIER.modules_libres=modules;
    const cahierId=SOUVENIR_CAHIER.id;
    clearTimeout(_richModuleSaveTimer);
    _richModuleSaveTimer=setTimeout(()=>sauvegarderModulesLibres(cahierId, modules), 700);
  }
}

// ══ Zones de la Page de garde (B133, 22/07) — calées sur la VRAIE
// couverture de cahier.html (thème Edition, audit du 22/07 : bandeau
// "RockNRoad · Carnet de route", titre = destination, sous-titre calculé,
// bande photo, bandeau 4 chiffres). Chaque bloc devient une zone en
// pointillés, éditable indépendamment, propre à ce carnet — jamais un
// simple bloc de texte unique comme avant (retour Bruno : "ça n'a rien à
// voir"). La photo peut se scinder en 1 à 4 emplacements côte à côte, sans
// jamais changer la taille globale de la zone.
function genererZonesPageGarde(){
  const s=statsVoyage();
  const nuitsTxt = s.nuits ? (s.nuits+' nuit'+(s.nuits>1?'s':'')) : '';
  const partTxt = RB_INFO.nb_participants ? (RB_INFO.nb_participants+' voyageur'+(RB_INFO.nb_participants>1?'s':'')) : '';
  const sousTitre = (nuitsTxt && partTxt) ? (nuitsTxt+', '+partTxt+', une route à raconter') : 'Une route à raconter';
  return {
    eyebrow:'RockNRoad · Carnet de route',
    titre: RB_INFO.destination_libre || RB_INFO.nom || 'Notre voyage',
    sousTitre: sousTitre,
    nbPhotos: 1
  };
}
function zonesPageGarde(){
  return Object.assign({eyebrow:'', titre:'', sousTitre:'', nbPhotos:1}, (SOUVENIR_CAHIER && SOUVENIR_CAHIER.zones_page_garde)||{});
}

// liste inventée. Couverture = la première photo Souvenir de ce voyage (si
// la collecte a déjà commencé) ; position sur la carte = centroïde des vraies
// coordonnées de son itinéraire (même source que la carto régionale du site).
async function chargerTourniquetEtCarte(){
  if(!GROUPE_ID){ TOUS_VOYAGES=[]; return; }
  try{
    const {data:vs}=await sb.from('voyages').select('id,nom,date_debut,date_fin_envisagee,est_principal,created_at').eq('groupe_id',GROUPE_ID).order('created_at',{ascending:true});
    TOUS_VOYAGES=vs||[];
    if(!TOUS_VOYAGES.length) return;
    const ids=TOUS_VOYAGES.map(v=>v.id);
    const [itinsRes, photosRes]=await Promise.all([
      sb.from('voyage_itineraire').select('voyage_id,lieu_id').in('voyage_id',ids),
      sb.from('voyage_photos').select('voyage_id,url,created_at').in('voyage_id',ids).order('created_at',{ascending:true})
    ]);
    const itins=itinsRes.data||[], photos=photosRes.data||[];
    const lieuIds=[...new Set(itins.map(r=>r.lieu_id))];
    let lieuxMap={};
    if(lieuIds.length){
      const {data:ls}=await sb.from('lieux').select('id,lat,lng').in('id',lieuIds);
      (ls||[]).forEach(l=>{ lieuxMap[l.id]=l; });
    }
    TOUS_VOYAGES.forEach(v=>{
      const pts=itins.filter(r=>r.voyage_id===v.id).map(r=>lieuxMap[r.lieu_id]).filter(l=>l&&l.lat!=null&&l.lng!=null);
      if(pts.length){
        v._lat=pts.reduce((s,p)=>s+Number(p.lat),0)/pts.length;
        v._lng=pts.reduce((s,p)=>s+Number(p.lng),0)/pts.length;
      }
      const cov=photos.find(p=>p.voyage_id===v.id);
      v._cover=cov?cov.url:null;
      const d=v.date_debut||v.created_at;
      v._annee=d?new Date(d).getFullYear():'';
    });
  }catch(e){ console.warn('Souvenir: tourniquet/carte', e); TOUS_VOYAGES=[]; }
}

// Carré d'ambiance (bloc⑤, le plus cosmétique) : un vrai fondu entre de
// vraies photos du groupe (tous voyages confondus, pas seulement celui
// affiché) — jamais d'image inventée. Si le groupe n'a encore aucune photo
// Souvenir nulle part, état honnête plutôt qu'un décor vide qui fait semblant.
let AMBIANCE_PHOTOS=[];
let AMBIANCE_TIMER=null;
async function chargerAmbiance(){
  if(!TOUS_VOYAGES.length){ AMBIANCE_PHOTOS=[]; return; }
  try{
    const ids=TOUS_VOYAGES.map(v=>v.id);
    const {data}=await sb.from('voyage_photos').select('url').in('voyage_id',ids).order('created_at',{ascending:false}).limit(30);
    const urls=[...new Set((data||[]).map(p=>p.url))];
    // mélange léger (Fisher-Yates) puis on garde un petit lot pour le défilement
    for(let i=urls.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [urls[i],urls[j]]=[urls[j],urls[i]]; }
    AMBIANCE_PHOTOS=urls.slice(0,6);
  }catch(e){ console.warn('Souvenir: ambiance', e); AMBIANCE_PHOTOS=[]; }
}
function renderAmbiance(){
  const wrap=document.getElementById('souv-ambiance-wrap'); if(!wrap) return;
  if(AMBIANCE_TIMER){ clearInterval(AMBIANCE_TIMER); AMBIANCE_TIMER=null; }
  if(!AMBIANCE_PHOTOS.length){
    wrap.innerHTML='<div class="a-venir">Les premières photos du groupe<br>animeront ce coin-là.</div>';
    return;
  }
  wrap.innerHTML='<div class="amb-photo on" id="souv-amb-a"></div><div class="amb-photo" id="souv-amb-b"></div>'+
    '<div class="amb-label">souvenirs en vrac</div>';
  let idx=0, surA=true;
  const elA=document.getElementById('souv-amb-a'), elB=document.getElementById('souv-amb-b');
  elA.style.backgroundImage="url('"+AMBIANCE_PHOTOS[0].replace(/'/g,'')+"')";
  if(AMBIANCE_PHOTOS.length<2) return; // une seule photo : rien à faire défiler
  AMBIANCE_TIMER=setInterval(()=>{
    idx=(idx+1)%AMBIANCE_PHOTOS.length;
    const montant = surA?elB:elA, descendant = surA?elA:elB;
    montant.style.backgroundImage="url('"+AMBIANCE_PHOTOS[idx].replace(/'/g,'')+"')";
    montant.classList.add('on'); descendant.classList.remove('on');
    surA=!surA;
  }, 4000);
}

// Fenêtre de collecte (B114) : date_debut-7j -> date_fin_envisagee+15j.
// Les deux dates du voyage restent facultatives (voyage.html) — si l'une
// manque, Souvenir ne bloque rien, il explique juste calmement l'état.
function calculeFenetre(){
  if(!RB_INFO.date_debut || !RB_INFO.date_fin_envisagee) return null;
  const debut=new Date(RB_INFO.date_debut+'T00:00:00');
  const fin=new Date(RB_INFO.date_fin_envisagee+'T00:00:00');
  if(isNaN(debut)||isNaN(fin)) return null;
  const ouverture=new Date(debut); ouverture.setDate(ouverture.getDate()-7);
  const fermeture=new Date(fin); fermeture.setDate(fermeture.getDate()+15);
  return {ouverture, fermeture};
}
function etatSouvenir(){
  const fen=calculeFenetre();
  if(!fen) return 'dates_manquantes';
  const now=new Date();
  if(now<fen.ouverture) return 'avant_fenetre';
  if(now>fen.fermeture) return 'apres_fenetre';
  return 'live';
}

let SOUV_BLOB_EN_ATTENTE=null, SOUV_HASH_EN_ATTENTE=null;

// (B143, 22/07, retour Bruno) : empreinte du contenu réel de la photo
// (SHA-256, Web Crypto — déjà présente dans tous les navigateurs modernes,
// rien à ajouter) — calculée sur le fichier APRÈS redimensionnement, donc
// la même vraie photo envoyée deux fois produit toujours la même empreinte,
// même si le fichier d'origine a un nom différent.
async function souvHashBlob(blob){
  const buf=await blob.arrayBuffer();
  const digest=await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(digest)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Même moulinette que partout ailleurs sur le site (redimension canvas, retrait
// EXIF au passage — obligation S9) mais en plus grande taille : c'est une
// galerie souvenir destinée à être regardée/imprimée, pas un avatar.
// Redimensionnement factorisé — utilisé pour UNE photo (aperçu + légende)
// ET pour un LOT de photos (B141, 22/07, retour Bruno : "envoyer plusieurs
// photos depuis mon téléphone en une fois").
// (B142, 22/07) img.decode() plutôt que onload seul : bug connu de
// Safari/iOS où l'événement "load" peut se déclencher avant que l'image
// soit VRAIMENT décodée, surtout en enchaînant plusieurs photos d'affilée
// (vignettes qui apparaissent comme du bruit/des bandes de couleur — c'est
// une image dessinée sur le canevas trop tôt, pas un fichier corrompu).
// decode() attend le décodage réel avant de continuer. Repli sur onload
// pour les très vieux navigateurs qui ne le supportent pas.
function souvRedimensionnerImage(file){
  return new Promise((resolve, reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    const dessiner=()=>{
      URL.revokeObjectURL(url);
      const MAX=1600; let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
      if(!w||!h){ reject(new Error('Image illisible')); return; }
      if(w>h){ if(w>MAX){ h=Math.round(h*MAX/w); w=MAX; } } else { if(h>MAX){ w=Math.round(w*MAX/h); h=MAX; } }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob((blob)=>{ blob ? resolve(blob) : reject(new Error('Compression impossible')); }, 'image/jpeg', 0.85);
    };
    img.src=url;
    if(img.decode){
      img.decode().then(dessiner).catch(()=>{
        // repli : quelques navigateurs renvoient une erreur de decode()
        // même quand l'image est en réalité valide — on retente via
        // l'événement classique plutôt que d'abandonner tout de suite.
        img.onload=dessiner;
        img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('Image illisible')); };
      });
    } else {
      img.onload=dessiner;
      img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('Image illisible')); };
    }
  });
}
async function souvUploaderPhoto(blob, legende, hash){
  const chemin=VOYAGE_ID+'/'+Date.now()+'-'+Math.random().toString(36).slice(2,8)+'-'+(MON_MEMBRE_ID||'x').slice(0,8)+'.jpg';
  const up=await sb.storage.from('photos-souvenir').upload(chemin, blob, {contentType:'image/jpeg', upsert:true});
  if(up.error) throw up.error;
  const pub=sb.storage.from('photos-souvenir').getPublicUrl(chemin);
  const publicUrl=pub&&pub.data&&pub.data.publicUrl;
  if(!publicUrl) throw new Error('URL publique introuvable');
  const ins=await sb.from('voyage_photos').insert({voyage_id:VOYAGE_ID, groupe_id:GROUPE_ID, membre_id:MON_MEMBRE_ID, url:publicUrl, legende:legende||null, hash:hash||null});
  if(ins.error) throw ins.error;
}

}

// Une seule photo : l'aperçu s'ouvre pour laisser une légende (retour Bruno,
// 21/07 — comme "Petit Potin" : nom+commentaire posés au moment de l'envoi,
// pas retrouvés plus tard). Plusieurs à la fois : on saute la légende
// individuelle (fastidieux sur un lot) et on envoie directement, avec une
// petite barre de progression — chacun pourra ajouter une légende après
// coup, une fois la photo rangée sur une page.
async function souvPhotoChoisie(input){
  const fichiers=Array.from(input.files||[]); input.value='';
  if(!fichiers.length) return;
  const images=fichiers.filter(f=>/^image\//.test(f.type));
  if(!images.length){ alert('Ces fichiers ne sont pas des images.'); return; }
  if(images.length===1){
    try{
      const blob=await souvRedimensionnerImage(images[0]);
      const hash=await souvHashBlob(blob);
      if(PHOTOS.some(p=>p.hash===hash)){
        alert('Cette photo a déjà été envoyée pour ce voyage.');
        return;
      }
      SOUV_BLOB_EN_ATTENTE=blob;
      SOUV_HASH_EN_ATTENTE=hash;
      const prev=document.getElementById('souv-apercu-img');
      if(prev) prev.style.backgroundImage="url('"+URL.createObjectURL(blob)+"')";
      const leg=document.getElementById('souv-apercu-legende'); if(leg) leg.value='';
      const ov=document.getElementById('souv-apercu-overlay'); if(ov) ov.style.display='flex';
    }catch(e){ console.warn('Souvenir: préparation photo', e); alert('Cette photo n\'a pas pu être préparée.'); }
    return;
  }
  await souvEnvoyerPlusieurs(images);
}
window.souvPhotoChoisie = souvPhotoChoisie;

async function souvEnvoyerPlusieurs(fichiers){
  const total=fichiers.length;
  // (B143) Empreintes déjà connues pour ce voyage + celles du lot en cours,
  // au fur et à mesure — pour attraper aussi deux photos identiques
  // sélectionnées dans le MÊME lot, pas seulement contre l'historique.
  const dejaVus=new Set(PHOTOS.map(p=>p.hash).filter(Boolean));
  const statut=document.getElementById('souv-envoi-statut');
  if(statut) statut.style.display='block';
  let reussies=0, echouees=0, doublons=0;
  for(let i=0;i<fichiers.length;i++){
    if(statut) statut.textContent='Envoi de la photo '+(i+1)+' / '+total+'…';
    try{
      const blob=await souvRedimensionnerImage(fichiers[i]);
      const hash=await souvHashBlob(blob);
      if(dejaVus.has(hash)){ doublons++; continue; }
      dejaVus.add(hash);
      await souvUploaderPhoto(blob, null, hash);
      reussies++;
    }catch(e){
      console.warn('Souvenir: envoi photo (lot)', e);
      echouees++;
    }
  }
  if(statut) statut.style.display='none';
  await chargerPhotos(); renderMain();
  if(doublons || echouees){
    let msg=reussies+' photo'+(reussies>1?'s':'')+' envoyée'+(reussies>1?'s':'')+'.';
    if(doublons) msg+=' '+doublons+' déjà envoyée'+(doublons>1?'s':'')+' (ignorée'+(doublons>1?'s':'')+').';
    if(echouees) msg+=' '+echouees+' n\'a pas pu être envoyée'+(echouees>1?'s':'')+'.';
    alert(msg);
  }
}

// Source UNIQUE de la liste ordonnée des pages d'un carnet (B128, 22/07) —
// utilisée par le sélecteur de page ET l'ancien menu déroulant du tri. Ordre
// aujourd'hui = position réelle dans l'itinéraire (souvenir_cahier_etapes.
// ordre, déjà la copie figée du RÉEL, pas du prévu). Bruno a soulevé un vrai
// sujet pour plus tard : pouvoir réordonner les pages DANS un carnet (le
// prévu jour 2 devenu réel jour 5, etc.), indépendamment par carnet — pas
// construit maintenant ("on verra"), mais c'est ICI, et seulement ici,
// qu'il faudra brancher un ordre stocké/propre au carnet le jour venu.
function listePagesCahier(){
  let n=0;
  const avant = SOUV_BLOCS_LIBRES.slice(0,3).map(b=>({uid:b.uid, label:b.titre, type:'libre', bloc:b}));
  const etapes = [];
  ITINERAIRE.forEach(it=>{
    if(!it.rattache) n++;
    const label = (it.rattache?'↳ ':'') + (it.rattache?'':(n+'. ')) + (it.nom||'—');
    etapes.push({uid:it.uid, label, type:'etape', item:it});
  });
  const apres = [{uid:SOUV_BLOCS_LIBRES[3].uid, label:SOUV_BLOCS_LIBRES[3].titre, type:'libre', bloc:SOUV_BLOCS_LIBRES[3]}];
  let liste = avant.concat(etapes, apres);
  // Pages libres (B137) : insérées juste APRÈS leur page d'ancrage (celle
  // affichée quand le "+" a été cliqué) — repli avant "Bonne route" si
  // l'ancrage a disparu. Plus jamais de page "vos ajouts" automatique.
  ((SOUVENIR_CAHIER && SOUVENIR_CAHIER.pages_libres)||[]).forEach(p=>{
    const entree={uid:'__libre__'+p.id+'__', label:'↳ '+(p.titre||'Page ajoutée'), type:'page_libre', pageLibre:p};
    const idx=liste.findIndex(x=>x.uid===p.apres);
    if(idx>=0) liste.splice(idx+1, 0, entree);
    else liste.splice(liste.length-1, 0, entree);
  });
  return liste;
}
function optionsItineraireHtml(selectedUid){
  const opts = listePagesCahier().map(p=>
    '<option value="'+esc(p.uid)+'"'+(p.uid===selectedUid?' selected':'')+'>'+(p.type==='libre'?'— '+esc(p.label)+' —':esc(p.label))+'</option>'
  ).join('');
  return '<option value="">— choisir une page —</option>' + opts;
}

async function assignerPhotoAEtape(photoId, uid, legende){
  if(!uid){ alert('Choisis une étape avant de ranger cette photo.'); return; }
  if(!SOUVENIR_CAHIER) return;
  try{
    const existant=RANGEMENTS[photoId];
    let err=null;
    if(existant){
      const up=await sb.from('souvenir_cahier_photos').update({etape_uid:uid, legende:legende||null}).eq('id',existant.id);
      err=up.error;
    } else {
      const ins=await sb.from('souvenir_cahier_photos').insert({
        cahier_id:SOUVENIR_CAHIER.id, groupe_id:GROUPE_ID, voyage_photo_id:photoId, etape_uid:uid, legende:legende||null
      });
      err=ins.error;
    }
    if(err) throw err;
    await chargerRangements(); renderMain();
  }catch(e){
    console.warn('Souvenir: rangement photo', e);
    alert('Le rangement n\'a pas pu être enregistré : '+(e&&e.message?e.message:String(e)));
  }
}

// Le montage : les photos déjà rangées DANS CE CARNET se regroupent par étape
// et se rendent via le MÊME moteur que le Cahier (RNR_FICHE_COMPLETE) — la
// fiche réelle du lieu, dont on remplace juste la galerie par les vraies
// photos du voyage et la citation par la légende posée pour ce carnet. Un
// seul moteur, jamais une redite (B114/Q4). Chaque carnet (officiel ou
// personnel, étape B) range les MÊMES photos à sa façon, sans se marcher dessus.
//
// (22/07, B128, retour Bruno) : refonte de la mise en page — plus un cahier
// qui défile en continu, mais UNE page à la fois (sélecteur en haut de la
// colonne de travail), et à gauche un vrai tableau de bord (outils en haut,
// photos en grille en dessous) plutôt qu'une pile étroite.
function renderMontage(){
  if(!SOUVENIR_CAHIER){
    return '<div class="etat-vide"><div class="t">Le Cahier Souvenir n\'a pas pu être préparé</div>'+
      '<div class="s">Réessaie de recharger la page dans un instant.</div></div>';
  }
  const aRanger = PHOTOS.filter(p=>!RANGEMENTS[p.id]);
  const rangees = PHOTOS.filter(p=>RANGEMENTS[p.id]);
  const parEtape = {};
  rangees.forEach(p=>{ const uid=RANGEMENTS[p.id].etape_uid; (parEtape[uid] = parEtape[uid]||[]).push(p); });
  const uidsOrdonnes = ITINERAIRE.map(it=>it.uid).filter(uid=>parEtape[uid]);

  // ══ le sélecteur de carnet ET le sélecteur de page vivent maintenant
  // TOUS LES DEUX dans la colonne de gauche (B129, 22/07 : "rien ne gêne
  // notre présentation de page") — la colonne de droite ne porte plus
  // aucune barre, juste la page, pour un maximum de hauteur.
  let barreCarnet = '<div class="cahier-selecteur">'+
    '<select onchange="souvChangerCahier(this.value)">'+optionsCahiersHtml()+'</select>'+
    (CAHIERS_DISPONIBLES.find(c=>c.type==='personnel'&&c.membre_id===MON_MEMBRE_ID) ? '' :
      '<button onclick="souvCreerCarnetPerso()">+ Créer mon carnet</button>');
  const estLeader = MON_MEMBRE_ID && LEADERS.has(MON_MEMBRE_ID);
  if(SOUVENIR_CAHIER.type==='officiel'){
    if(SOUVENIR_CAHIER.valide_par){
      barreCarnet += '<span class="montage-badge">✓ Validé par les leaders du voyage</span>';
    } else if(estLeader && uidsOrdonnes.length){
      barreCarnet += '<button class="montage-valid-btn" onclick="souvValider()">Valider le Cahier Souvenir</button>';
    }
  }
  barreCarnet += '</div>';

  const listePages = listePagesCahier();
  if(!PAGE_ACTIF || !listePages.find(p=>p.uid===PAGE_ACTIF)) PAGE_ACTIF = listePages.length ? listePages[0].uid : null;
  const idxActif = listePages.findIndex(p=>p.uid===PAGE_ACTIF);
  const pageActive = listePages[idxActif];

  let selecteurPage = '<div class="page-selecteur">';
  selecteurPage += '<button class="page-nav" onclick="souvChangerPage(\''+(idxActif>0?listePages[idxActif-1].uid:'')+'\')"'+(idxActif<=0?' disabled':'')+'>‹</button>';
  // (B138, 22/07) Menu déroulant MAISON : un <select> natif ne peut pas
  // porter de bouton par ligne — ici chaque ligne a son "+" qui crée une
  // page juste après ELLE. Plus explicite, comme demandé.
  selecteurPage += '<div class="page-dd">'
    + '<button class="page-dd-btn" onclick="souvToggleDdPages()">'+(pageActive?esc(pageActive.label):'—')+' <span class="page-dd-caret">▾</span></button>'
    + (DD_PAGES_OUVERT ? ('<div class="page-dd-panel">'+listePages.map(p=>
        '<div class="page-dd-row'+(p.uid===PAGE_ACTIF?' actif':'')+'">'
        + '<span class="page-dd-label" onclick="souvChangerPage(\''+esc(p.uid)+'\')">'+(p.type==='libre'?'— '+esc(p.label)+' —':esc(p.label))+'</span>'
        + (p.type==='page_libre' ? '<button class="page-dd-suppr" onclick="event.stopPropagation();souvSupprimerPageLibre(\''+esc(p.pageLibre.id)+'\')" title="Supprimer cette page">✕</button>' : '')
        + '<button class="page-dd-plus" onclick="souvCreerPageLibre(\''+esc(p.uid)+'\')" title="Ajouter une page après celle-ci">+</button>'
        + '</div>'
      ).join('')+'</div>') : '')
    + '</div>';
  selecteurPage += '<button class="page-nav" onclick="souvChangerPage(\''+(idxActif>=0&&idxActif<listePages.length-1?listePages[idxActif+1].uid:'')+'\')"'+(idxActif<0||idxActif>=listePages.length-1?' disabled':'')+'>›</button>';
  selecteurPage += '</div>';

  // ══ colonne de gauche : le tableau de bord — sélecteurs, onglets Photos/
  // Mise en page (B130, 22/07 : "un moteur comme les css", pas d'outils
  // par page — le même onglet vit sur toutes les pages) ══
  let colTri = '<div class="atelier-tri">';
  colTri += barreCarnet;
  colTri += selecteurPage;
  colTri += '<div class="atelier-onglets">'
    + '<button class="'+(ONGLET_ATELIER==='photos'?'actif':'')+'" onclick="souvChangerOngletAtelier(\'photos\')">📷 Photos'+(aRanger.length?' <span class="onglet-badge">'+aRanger.length+'</span>':'')+'</button>'
    + '<button class="'+(ONGLET_ATELIER==='style'?'actif':'')+'" onclick="souvChangerOngletAtelier(\'style\')">🎨 Mise en page</button>'
    + '</div>';
  if(ONGLET_ATELIER==='style'){
    colTri += rendreOngletMiseEnPage();
  } else {
    colTri += '<div class="dash-outils"><p class="dash-outils-hint">Clique sur une photo pour la ranger sur la page affichée à droite, ou glisse-la dessus.</p></div>';
    colTri += '<div class="dash-photos">';
    if(!aRanger.length){
      colTri += '<div class="live-vide">Tout est rangé !</div>';
    } else {
      colTri += aRanger.map(p=>
        '<div class="dash-ph" id="tri-'+p.id+'" draggable="true" ondragstart="souvDragStart(event,\''+p.id+'\')" title="'+esc(nomEnvoyeur(p.membre_id))+' · '+esc(fmtRelatif(p.created_at))+'">'+
          '<button class="dash-ph-suppr" onclick="event.stopPropagation();souvSupprimerPhotoDefinitivement(\''+p.id+'\')" title="Supprimer définitivement cette photo">✕</button>'+
          '<div class="dash-ph-img" style="background-image:url(\''+String(p.url).replace(/'/g,'')+'\')" onclick="souvRangerSurPageActive(\''+p.id+'\')" title="Ranger sur la page affichée"></div>'+
          '<input type="text" class="dash-ph-legende" placeholder="légende" value="'+(p.legende?esc(p.legende):'')+'">'+
        '</div>'
      ).join('');
    }
    colTri += '</div>';
  }
  colTri += '</div>';

  // (B138, 22/07) Les en-têtes des pages Cahier deviennent éditables —
  // "interactif de partout", la mise en page reste cadrée. Valeur par
  // défaut = le vrai texte du Cahier ; l'écrasement vit dans blocs_texte
  // avec une clé suffixée ('equipe__kicker', 'trajet__titre'…), même
  // mécanisme de sauvegarde que tout le reste (un comportement, une maison).
  // (B140, 22/07) contenteditable — texte enrichi, sélection + formatage.
  const enteteZoneHtml = (kickerDefaut, titreDefaut, cle) => '<div class="sv-zone sv-e-zone-entete">'
    + (kickerDefaut!==null ? richBlocsHtml(cle+'__kicker', kickerDefaut, 'sv-e-kicker sv-e-kicker-input') : '')
    + richBlocsHtml(cle+'__titre', titreDefaut, 'sv-e-titre-page sv-e-titre-page-input-inline')
  + '</div>';

  const blocLibreHtml = (b) => {
    const texte = (SOUVENIR_CAHIER.blocs_texte && SOUVENIR_CAHIER.blocs_texte[b.cle]) || '';
    const photosBloc = parEtape[b.uid] || [];

    // L'équipe (B134, 22/07) : kicker "Qui embarque" + titre "L'équipe",
    // calés sur cahier.html — cartes dans leur propre zone, puis un module
    // libre (photo + mot) pour la place qui reste sur la page.
    if(b.cle==='equipe'){
      const choixPassions=(window.RNR_PROFIL_CHOIX&&window.RNR_PROFIL_CHOIX.passions)||[];
      const choixDepuis=(window.RNR_PROFIL_CHOIX&&window.RNR_PROFIL_CHOIX.voyageurDepuis)||[];
      const cartes = MEMBRES.map(m=>carteMembreSouvenirHtml(m,choixPassions,choixDepuis))
        .concat(ANIMAUX.map(carteAnimalSouvenirHtml))
        .concat((SOUVENIR_CAHIER.invites||[]).map(inv=>carteInviteSouvenirHtml(inv,parEtape)));
      const cartesEtAjout = (cartes.length ? '<div class="sv-equipe-grid">'+cartes.join('')+'</div>' : '')
        + '<div class="sv-equipe-ajout">'
        +   '<input type="text" id="sv-invite-nom" placeholder="Prénom / surnom" maxlength="40">'
        +   '<input type="text" id="sv-invite-note" placeholder="Un mot (optionnel)" maxlength="80">'
        +   '<button onclick="souvAjouterInvite()">+ Ajouter quelqu\'un rencontré en route</button>'
        + '</div>';
      return '<div class="sv-cover">'
        + enteteZoneHtml('Qui embarque', 'L\'équipe', 'equipe')
        + '<div class="sv-zone sv-e-zone-cartes">'+cartesEtAjout+'</div>'
        + '<div class="sv-zone sv-e-zone-libre" ondragenter="event.preventDefault()" ondragover="event.preventDefault()" ondrop="souvDropSurEtape(event,\''+b.uid+'\')">'
          + (photosBloc.length ? galeriePhotosHtml(photosBloc) : '<p class="sv-e-zone-libre-hint">Dépose une photo ou écris un mot ici, s\'il reste de la place</p>')
          + richBlocsHtml(b.cle, '', 'sv-e-texte-libre', 'Écris ou complète librement…')
        + '</div>'
        + rendreModulesHtml(b.uid, parEtape)
      + '</div>';
    }

    // Notre RoadTrip (B134) : kicker "Vue d'ensemble" + titre, calés sur
    // cahier.html — le résumé du trajet reste un texte libre pour l'instant
    // (une vraie liste jour par jour viendra dans un futur réglage plus fin).
    if(b.cle==='trajet'){
      return '<div class="sv-cover">'
        + enteteZoneHtml('Vue d\'ensemble', 'Notre RoadTrip', 'trajet')
        + '<div class="sv-zone sv-e-zone-libre" ondragenter="event.preventDefault()" ondragover="event.preventDefault()" ondrop="souvDropSurEtape(event,\''+b.uid+'\')">'
          + (photosBloc.length ? galeriePhotosHtml(photosBloc) : '')
          + richBlocsHtml(b.cle, '', 'sv-e-texte-principal', 'Écris ou complète librement…')
        + '</div>'
        + rendreModulesHtml(b.uid, parEtape)
      + '</div>';
    }

    // Bonne route (B134) : pas de kicker dans le vrai Cahier, juste le
    // titre, puis le mot de clôture, puis les 3 vrais chiffres (km/nuits/
    // étapes) — mêmes calculs que statsVoyage() utilisé partout ailleurs.
    if(b.cle==='cloture'){
      const s=statsVoyage();
      return '<div class="sv-cover">'
        + enteteZoneHtml(null, 'Bonne route.', 'cloture')
        + '<div class="sv-zone sv-e-zone-libre" ondragenter="event.preventDefault()" ondragover="event.preventDefault()" ondrop="souvDropSurEtape(event,\''+b.uid+'\')">'
          + (photosBloc.length ? galeriePhotosHtml(photosBloc) : '')
          + richBlocsHtml(b.cle, '', 'sv-e-texte-principal', 'Écris ou complète librement…')
        + '</div>'
        + '<div class="sv-zone sv-e-zone-stats">'
          + '<div class="sv-e-stat"><b>'+(s.km?('≈'+s.km):'—')+'</b><span>km</span></div>'
          + '<div class="sv-e-stat"><b>'+(s.nuits||'—')+'</b><span>Nuits</span></div>'
          + '<div class="sv-e-stat"><b>'+(s.etapes||'—')+'</b><span>Étapes</span></div>'
        + '</div>'
        + rendreModulesHtml(b.uid, parEtape)
      + '</div>';
    }
    // Page de garde (B133, 22/07) : 4 zones distinctes, calées sur la VRAIE
    // couverture de cahier.html — eyebrow, titre+sous-titre, photo (1-4
    // emplacements), stats. Chacune en pointillés, éditable à part.
    if(b.cle==='presentation'){
      const z=zonesPageGarde();
      const nbPhotos=Math.max(1,Math.min(4, z.nbPhotos||1));
      let slotsHtml='';
      for(let i=1;i<=nbPhotos;i++){
        const uid=uidPresentationSlot(i);
        const photosSlot=parEtape[uid]||[];
        let contenu;
        if(photosSlot.length){
          contenu=galeriePhotosHtml(photosSlot,{legende:false});
        } else if(i===1){
          const heritee=photoHeriteeCahier();
          contenu = heritee
            ? '<div class="sv-zone-photo-heritee" style="background-image:url(\''+String(heritee).replace(/'/g,'')+'\')"><span>Photo reprise du Cahier</span></div>'
            : '<div class="sv-zone-vide">Dépose une photo</div>';
        } else {
          contenu = '<div class="sv-zone-vide">Dépose une photo</div>';
        }
        slotsHtml += '<div class="sv-e-photo-slot" ondragenter="event.preventDefault()" ondragover="event.preventDefault()" ondrop="souvDropSurEtape(event,\''+uid+'\')">'+contenu+'</div>';
      }
      const s=statsVoyage();
      const animTxt = RB_INFO.nb_animaux ? (RB_INFO.nb_animaux+' 🐕') : '—';
      return '<div class="sv-cover">'
        + '<div class="sv-e-rule"></div>'
        + '<div class="sv-zone sv-e-zone-eyebrow">'+richZoneHtml('eyebrow', z.eyebrow, 'sv-e-eyebrow')+'</div>'
        + '<div class="sv-zone sv-e-zone-titre">'
          + richZoneHtml('titre', z.titre, 'sv-e-title')
          + richZoneHtml('sousTitre', z.sousTitre, 'sv-e-sub')
        + '</div>'
        + '<div class="sv-zone sv-e-zone-photo">'
          + '<div class="sv-e-photo-nb">'+[1,2,3,4].map(n=>'<button class="'+(nbPhotos===n?'actif':'')+'" onclick="souvDefinirZonePageGarde(\'nbPhotos\','+n+')" title="'+n+' photo'+(n>1?'s':'')+'">'+n+'</button>').join('')+'</div>'
          + '<div class="sv-e-photo-slots" style="grid-template-columns:repeat('+nbPhotos+',1fr)">'+slotsHtml+'</div>'
        + '</div>'
        // (B138) Les 4 chiffres deviennent éditables — le calcul réel reste
        // la valeur de départ, l'écrasement vit dans zones_page_garde.
        + '<div class="sv-zone sv-e-zone-stats">'
          + [['statKm', s.km?('≈'+s.km+' km'):'—', 'Parcourus'],
             ['statNuits', String(s.nuits||'—'), 'Nuits'],
             ['statVoyageurs', String(RB_INFO.nb_participants||'—'), 'Voyageurs'],
             ['statCompagnons', animTxt, 'Compagnons']].map(([cle, defaut, label])=>
            '<div class="sv-e-stat">'
            + richZoneHtml(cle, defaut, 'sv-e-stat-val')
            + richZoneHtml(cle+'Label', label, 'sv-e-stat-label')
            + '</div>'
          ).join('')
        + '</div>'
        + rendreModulesHtml(b.uid, parEtape)
      + '</div>';
    }

    // (toutes les pages libres ①②③④ ont désormais leur propre rendu papier
    // ci-dessus — plus de repli générique nécessaire)
    return '<div class="sv-cover"><div class="live-vide">Page inconnue : '+esc(b.cle)+'</div></div>';
  };

  const pageHtml = pageActive
    ? (pageActive.type==='libre' ? blocLibreHtml(pageActive.bloc)
      : pageActive.type==='etape' ? rendreEtapePageHtml(pageActive.item, parEtape)
      : pageActive.type==='page_libre' ? rendrePageLibreHtml(pageActive.pageLibre, parEtape)
      : '<div class="live-vide">Cette page n\'existe plus.</div>')
    : '<div class="live-vide">Cette page n\'existe plus.</div>';

  const gabCol = (pageActive && pageActive.type==='page_libre') ? colonneGabaritsHtml(pageActive.pageLibre) : '';
  const colLivre = '<div class="atelier-livre">'+gabCol+'<div class="feuille-a4"><div class="sv-page-style">'+pageHtml+'</div></div></div>';

  return {gauche: colTri, droite: colLivre};
}

// Glisser-déposer : la photo suit la souris depuis la pile de gauche jusqu'à
// sa page à droite. Reprend le même rangement que le bouton "Ranger" — juste
// déclenché autrement.
function souvDragStart(e, photoId){
  e.dataTransfer.setData('text/plain', photoId);
  e.dataTransfer.effectAllowed='move';
}
window.souvDragStart = souvDragStart;

async function souvDropSurEtape(e, uid){
  e.preventDefault();
  const photoId=e.dataTransfer.getData('text/plain');
  if(!photoId) return;
  const row=document.getElementById('tri-'+photoId);
  const legende = row ? (row.querySelector('.dash-ph-legende')||{}).value||'' : '';
  await assignerPhotoAEtape(photoId, uid, legende.trim());
}
window.souvDropSurEtape = souvDropSurEtape;

// Retire toutes les photos rangées sur cette étape — elles reviennent dans
// "à ranger", rien n'est supprimé (juste dérangé). Répond au manque signalé
// par Bruno : une fois glissée, une photo était coincée sans façon de la
// ressortir.
async function souvViderEtape(uid){
  const idsAVider=Object.keys(RANGEMENTS).filter(pid=>RANGEMENTS[pid].etape_uid===uid);
  if(!idsAVider.length) return;
  try{
    const del=await sb.from('souvenir_cahier_photos').delete().in('id', idsAVider.map(pid=>RANGEMENTS[pid].id));
    if(del.error) throw del.error;
    await chargerRangements(); renderMain();
  }catch(e){
    console.warn('Souvenir: retrait des photos', e);
    alert('Le retrait n\'a pas pu être enregistré : '+(e&&e.message?e.message:String(e)));
  }
}
window.souvViderEtape = souvViderEtape;

// Retire une seule photo (celle-là seulement) — elle revient dans "à ranger".
// Complète souvViderEtape (qui vide toute une étape d'un coup) : ici on
// choisit précisément laquelle sortir, sans toucher aux autres.
async function souvRetirerUnePhoto(photoId){
  const rangement=RANGEMENTS[photoId]; if(!rangement) return;
  try{
    const del=await sb.from('souvenir_cahier_photos').delete().in('id',[rangement.id]);
    if(del.error) throw del.error;
    await chargerRangements(); renderMain();
  }catch(e){
    console.warn('Souvenir: retrait d\'une photo', e);
    alert('Le retrait n\'a pas pu être enregistré : '+(e&&e.message?e.message:String(e)));
  }
}
window.souvRetirerUnePhoto = souvRetirerUnePhoto;

// Édition libre des blocs ①②③④ (B126) : chaque frappe met à jour la copie
// locale tout de suite (pas de saut du curseur au ré-affichage) et planifie
// une sauvegarde groupée par carnet, même patron que le Cahier
// (planifierSauvegarde/onNoteChange) — jamais un ré-render complet à chaque
// lettre.
let _texteLibreSaveTimer=null;
function souvTexteLibreChange(cle, val){
  if(!SOUVENIR_CAHIER) return;
  SOUVENIR_CAHIER.blocs_texte = Object.assign({}, SOUVENIR_CAHIER.blocs_texte, {[cle]:val});
  const cahierId=SOUVENIR_CAHIER.id, blocsTexte=SOUVENIR_CAHIER.blocs_texte;
  clearTimeout(_texteLibreSaveTimer);
  _texteLibreSaveTimer=setTimeout(()=>sauvegarderTexteLibre(cahierId, blocsTexte), 700);
}
window.souvTexteLibreChange = souvTexteLibreChange;
async function sauvegarderTexteLibre(cahierId, blocsTexte){
  try{
    const up=await sb.from('souvenir_cahiers').update({blocs_texte:blocsTexte}).eq('id',cahierId);
    if(up.error) throw up.error;
  }catch(e){ console.warn('Souvenir: sauvegarde texte libre', e); }
}

// Cartes invité (B127) : ajout/retrait, propre au carnet courant.
function souvAjouterInvite(){
  const nomEl=document.getElementById('sv-invite-nom'), noteEl=document.getElementById('sv-invite-note');
  const nom=((nomEl&&nomEl.value)||'').trim();
  if(!nom){ if(nomEl) nomEl.focus(); return; }
  const note=((noteEl&&noteEl.value)||'').trim();
  if(!SOUVENIR_CAHIER) return;
  const id=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():('inv'+Date.now()+Math.random().toString(36).slice(2));
  SOUVENIR_CAHIER.invites=(SOUVENIR_CAHIER.invites||[]).concat([{id,nom,note}]);
  sauvegarderInvites(SOUVENIR_CAHIER.id, SOUVENIR_CAHIER.invites);
  renderMain();
}
window.souvAjouterInvite = souvAjouterInvite;
function souvRetirerInvite(id){
  if(!SOUVENIR_CAHIER) return;
  if(!confirm('Retirer cette personne du carnet ?')) return;
  SOUVENIR_CAHIER.invites=(SOUVENIR_CAHIER.invites||[]).filter(i=>i.id!==id);
  sauvegarderInvites(SOUVENIR_CAHIER.id, SOUVENIR_CAHIER.invites);
  // nettoyage : pas de photo orpheline sous sa carte disparue
  try{
    sb.from('souvenir_cahier_photos').delete().eq('cahier_id',SOUVENIR_CAHIER.id).eq('etape_uid','__invite__'+id+'__')
      .then(()=>{}).catch(e=>console.warn('Souvenir: nettoyage photo invité', e));
  }catch(e){ console.warn('Souvenir: nettoyage photo invité', e); }
  renderMain();
}
window.souvRetirerInvite = souvRetirerInvite;
async function sauvegarderInvites(cahierId, invites){
  try{
    const up=await sb.from('souvenir_cahiers').update({invites}).eq('id',cahierId);
    if(up.error) throw up.error;
  }catch(e){ console.warn('Souvenir: sauvegarde invités', e); }
}

function souvOngletsHtml(){
  return '<div class="souv-onglets">'+
    '<button class="'+(MODE_ACTIF==='galerie'?'actif':'')+'" onclick="souvChangerMode(\'galerie\')">Galerie</button>'+
    '<button class="'+(MODE_ACTIF==='montage'?'actif':'')+'" onclick="souvChangerMode(\'montage\')">Montage</button>'+
  '</div>';
}

// Changer d'onglet est TOUJOURS possible, quelle que soit la période du
// voyage (retour Bruno 21/07) — la date ne choisit qu'un onglet par défaut
// au premier chargement, elle ne bloque plus jamais l'accès à l'autre.
async function souvChangerMode(mode){
  MODE_ACTIF=mode;
  if(mode==='montage' && !SOUVENIR_CAHIER){
    renderMain(); // affiche un état de préparation pendant le chargement
    await preparerMontage();
  }
  renderMain();
}
window.souvChangerMode = souvChangerMode;

// Le petit bandeau du haut de la Galerie change de ton selon la période, mais
// n'affiche jamais un mur bloquant : le bouton d'envoi et le fil restent
// toujours accessibles en dessous, quelle que soit la date.
// L'en-tête (#souv-bh) porte TOUJOURS le titre, en doré, dans les deux modes
// — c'est la première ligne, elle ne bouge jamais. En Galerie, le statut
// (dates) et le bouton d'envoi s'y ajoutent sur la même ligne, pour ne pas
// reprendre une ligne de hauteur avec une bande séparée (retour Bruno 21/07).
function renderEnTete(phase){
  const nomVoyage=RB_INFO.nom||'Ce voyage';
  let titre='Souvenir — '+esc(nomVoyage);
  if(MODE_ACTIF==='montage'){
    return '<span class="sb-t">'+titre+'</span>';
  }
  if(phase==='dates_manquantes'){
    titre += ' · Astuce : <a href="voyage.html" style="color:inherit">renseigne les dates</a>';
  } else if(phase==='avant_fenetre'){
    const debut=new Date(RB_INFO.date_debut+'T00:00:00'), fin=new Date(RB_INFO.date_fin_envisagee+'T00:00:00');
    titre += ' · À venir · '+esc(fmtDateCourt(debut))+' → '+esc(fmtDateCourt(fin));
  } else if(phase==='apres_fenetre'){
    titre += ' · Voyage passé';
  } else {
    const debut=new Date(RB_INFO.date_debut+'T00:00:00'), fin=new Date(RB_INFO.date_fin_envisagee+'T00:00:00');
    titre += ' · En ce moment · '+esc(fmtDateCourt(debut))+' → '+esc(fmtDateCourt(fin));
  }
  return '<span class="sb-t">'+titre+'</span>'+
    '<button id="souv-btn-envoi" onclick="souvEnvoyerClic()">↑ Envoyer une photo</button>';
}

function renderGalerie(){
  if(!PHOTOS.length){
    return '<div class="live-vide">Personne n\'a encore envoyé de photo — sois le premier !</div>';
  }
  return '<div class="live-grid">'+PHOTOS.map((p,i)=>{
    return '<div class="souv-item">'
      + '<button class="souv-item-suppr" onclick="event.stopPropagation();souvSupprimerPhotoDefinitivement(\''+p.id+'\')" title="Supprimer définitivement cette photo">✕</button>'
      + '<div class="souv-item-img-wrap">'
        + '<img src="'+String(p.url).replace(/"/g,'')+'" loading="lazy" alt="" onclick="souvOuvrirLightbox('+i+')">'
        + '<div class="meta"><b>'+esc(nomEnvoyeur(p.membre_id))+'</b>'+esc(fmtRelatif(p.created_at))+'</div>'
      + '</div>'
      + '<input type="text" class="souv-item-legende" placeholder="Légende (optionnel)" value="'+(p.legende?esc(p.legende):'')+'" oninput="souvLegendePhotoChange(\''+p.id+'\', this.value)">'
    + '</div>';
  }).join('')+'</div>';
}

function renderMain(){
  const el=document.getElementById('souv-main');
  const droiteEl=document.getElementById('souv-page-droite');
  const bh=document.getElementById('souv-bh');
  const stage=document.getElementById('stage');
  const phase=etatSouvenir();

  // Réglage par défaut au tout premier rendu seulement — ensuite MODE_ACTIF
  // n'est plus jamais recalculé automatiquement, il obéit uniquement aux clics.
  if(MODE_ACTIF===null) MODE_ACTIF = (phase==='apres_fenetre') ? 'montage' : 'galerie';

  if(stage) stage.classList.toggle('mode-montage', MODE_ACTIF==='montage');
  bh.innerHTML = renderEnTete(phase);

  if(MODE_ACTIF==='montage'){
    if(SOUVENIR_CAHIER){
      const out = renderMontage(); // {gauche, droite} — B132, deux vrais conteneurs
      el.innerHTML = souvOngletsHtml() + out.gauche;
      if(droiteEl) droiteEl.innerHTML = out.droite;
    } else {
      el.innerHTML = souvOngletsHtml() + '<div class="etat-vide"><div class="t">Préparation du Cahier Souvenir…</div></div>';
      if(droiteEl) droiteEl.innerHTML = '';
    }
  } else {
    el.innerHTML = souvOngletsHtml() + renderGalerie();
    if(droiteEl) droiteEl.innerHTML = '';
  }
}

// En Montage, cliquer une photo déjà placée ne doit PAS ouvrir le lecteur
// plein écran (c'est le rôle de la Galerie, pas de l'atelier — retour Bruno
// 21/07) : on intercepte juste ce clic précis, en amont du moteur partagé
// (fiche-complete.js), sans jamais le modifier lui-même.
document.getElementById('souv-main').addEventListener('click', function(e){
  if(MODE_ACTIF==='montage' && e.target.closest('.gf-cover, .gf-galerie-grande-ph')){
    e.stopPropagation();
  }
}, true);

(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){ window.location.href="index.html"; return; }
  await resoutVoyageId(session.user.id);
  await Promise.all([chargerInfosVoyage(), chargerMembres(), chargerAnimaux(), chargerPhotos(), chargerLeaders(), chargerTourniquetEtCarte()]);
  // La copie figée (souvenir_cahiers) ne se fabrique qu'une fois la fenêtre de
  // collecte terminée — jamais avant, pour ne pas figer un itinéraire encore
  // en construction pendant la préparation du voyage.
  if(etatSouvenir()==='apres_fenetre'){
    await preparerMontage();
  }
  renderMain();
  renderTourniquet();
  renderCarteTags();
  await chargerAmbiance();
  renderAmbiance();
  abonnerRealtime();
  if(window.rnrChrome) chargeSelecteurChrome(); else window.addEventListener('load', chargeSelecteurChrome);
})();
async function logout(){await sb.auth.signOut();window.location.href="index.html";}
sb.auth.onAuthStateChange(ev=>{if(ev==="SIGNED_OUT")window.location.href="index.html";});
/* le bouton Quitter du chrome (chrome.js) appelle window.logout() ci-dessus */
</script>
</body>
