<!DOCTYPE html>
<html lang="fr">
<head>
<script src="rnr-config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RockNRoad · Souvenir · L'aventure ne s'oublie pas</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="app.css">

<style>
/* SOUVENIR v3 (20/07 suite, B114) — bloc② : l'écran principal est câblé au réel
   (fenêtre de collecte + mode live + galerie temps réel). La carte à tags, le
   tourniquet et le carré d'ambiance restent des emplacements honnêtes (état
   "à venir"), PAS des données inventées — ce sera bloc④/⑤. Zéro couleur en
   dur : tout via tokens.css, comme partout ailleurs sur le site. */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-body);color:var(--ink);background:var(--bg);}

.stage{
  height:calc(100vh - 56px);
  padding:12px;display:grid;gap:11px;
  grid-template-columns:2fr 1fr;
  grid-template-rows:1fr auto;
  grid-template-areas:
    "main   map"
    "shelf  ambiance";
  min-height:0;
}

.blk{background:var(--surface);border:1px solid var(--surface-line);border-radius:var(--r-lg);
  display:flex;flex-direction:column;min-height:0;overflow:hidden;box-shadow:var(--shadow);}
.bh{display:flex;align-items:center;gap:8px;padding:11px 15px;border-bottom:1px solid var(--surface-line);flex-shrink:0;}
.bh .ic{font-size:15px;}
.bh h3{font-family:var(--font-title);font-size:14.5px;font-weight:600;flex:1;color:var(--ink);}

/* ══════════ ÉCRAN PRINCIPAL (2/3) ══════════ */
.b-main{grid-area:main;}
.main-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:auto;}

/* -- état neutre (dates manquantes / avant / après fenêtre) -- */
.etat-vide{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:28px;gap:8px;}
.etat-vide .ic{font-size:30px;opacity:.7;}
.etat-vide .t{font-family:var(--font-title);font-size:16px;font-weight:600;color:var(--ink);max-width:360px;}
.etat-vide .s{font-size:12.5px;color:var(--ink-dim);max-width:340px;line-height:1.4;}
.etat-vide a.lien{font-size:12.5px;color:var(--gold-text);text-decoration:underline;margin-top:2px;}

/* -- mode live -- */
.live-band{background:linear-gradient(90deg,var(--gold-deep),var(--gold) 60%,var(--gold-light));
  color:#1a1208;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--danger,#c0392b);box-shadow:0 0 0 4px rgba(192,57,43,.25);
  animation:pulse 1.6s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.live-band .lb-t{font-family:var(--font-title);font-weight:700;font-size:13.5px;}
.live-band .lb-s{font-size:11px;opacity:.85;}
.live-send{padding:10px 16px 4px;display:flex;justify-content:center;flex-shrink:0;}
.live-send button{font-family:var(--font-title);font-weight:700;font-size:13px;color:#1a1208;
  background:linear-gradient(90deg,var(--gold),var(--gold-light));border:none;border-radius:var(--r-pill);
  padding:9px 22px;display:flex;align-items:center;gap:7px;cursor:pointer;box-shadow:0 6px 16px var(--gold-a35);}
.live-send button:disabled{opacity:.6;cursor:wait;}
.live-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:10px 16px 12px;flex:1;min-height:0;overflow:auto;align-content:start;}
.ph{aspect-ratio:1;border-radius:var(--r);position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--gold-a20),var(--gold-a35));
  background-size:cover;background-position:center;
  display:flex;align-items:center;justify-content:center;font-size:20px;}
.ph .meta{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(to top,rgba(15,13,9,.85),transparent);
  padding:12px 6px 4px;font-size:9.5px;color:#fff;line-height:1.25;}
.ph .meta b{display:block;font-size:10px;}
.live-note{padding:0 16px 10px;font-size:11px;color:var(--ink-dim);font-style:italic;text-align:center;flex-shrink:0;}
.live-vide{padding:20px;text-align:center;font-size:12.5px;color:var(--ink-dim);font-style:italic;}

/* -- montage (après la fenêtre de collecte) -- */
.montage-wrap{flex:1;min-height:0;overflow:auto;padding:14px 16px;}
.montage-h{font-family:var(--font-title);font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--gold-text);margin:14px 0 8px;}
.montage-h:first-child{margin-top:0;}
.tri-item{display:flex;gap:10px;align-items:center;background:var(--gold-a10);border:1px solid var(--surface-line);border-radius:var(--r);padding:8px;margin-bottom:8px;flex-wrap:wrap;}
.tri-item .tri-th{width:56px;height:56px;border-radius:var(--r-sm);background-size:cover;background-position:center;flex-shrink:0;}
.tri-item .tri-meta{font-size:10.5px;color:var(--ink-dim);flex-shrink:0;width:80px;}
.tri-item select,.tri-item input[type=text]{font-family:var(--font-body);font-size:12px;background:var(--surface);color:var(--ink);border:1px solid var(--surface-line);border-radius:6px;padding:6px 8px;}
.tri-item select{flex:1;min-width:120px;}
.tri-item input[type=text]{flex:2;min-width:140px;}
.tri-item button{font-family:var(--font-title);font-weight:700;font-size:11.5px;color:#1a1208;background:linear-gradient(90deg,var(--gold),var(--gold-light));border:none;border-radius:var(--r-pill);padding:6px 14px;cursor:pointer;flex-shrink:0;}
.montage-card{border:1px solid var(--surface-line);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px;background:var(--surface);}
.montage-valid-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 16px;border-top:1px solid var(--surface-line);flex-wrap:wrap;flex-shrink:0;}
.montage-valid-txt{font-size:11.5px;color:var(--ink-dim);}
.montage-valid-btn{font-family:var(--font-title);font-weight:700;font-size:12.5px;color:#1a1208;background:linear-gradient(90deg,var(--gold),var(--gold-light));border:none;border-radius:var(--r-pill);padding:8px 16px;cursor:pointer;}
.montage-badge{background:var(--gold-a10);border:1px solid var(--gold-a35);border-radius:var(--r-pill);padding:5px 12px;font-size:11px;color:var(--gold-light);}

/* ══════════ CARTE À TAGS (1/3) — à venir, bloc④ ══════════ */
.b-map{grid-area:map;}
.map-wrap{position:relative;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 30% 30%,rgba(200,168,75,.10),transparent 50%),
    radial-gradient(circle at 70% 70%,rgba(200,168,75,.08),transparent 50%), var(--bg);}
.a-venir{text-align:center;padding:16px;font-size:12px;color:var(--ink-dim);}
.a-venir .ic{font-size:22px;display:block;margin-bottom:6px;opacity:.6;}
.map-tag{position:absolute;background:var(--surface);border:1px solid var(--gold-a35);border-radius:var(--r-pill);
  padding:4px 9px 4px 5px;display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--ink);
  box-shadow:var(--shadow);cursor:pointer;transition:transform .2s;white-space:nowrap;}
.map-tag:hover{transform:scale(1.08);border-color:var(--gold);z-index:5;}
.map-tag.actif{border-color:var(--gold);background:var(--gold-a20);}
.map-tag .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;}

/* ══════════ TOURNIQUET (bas, large) — à venir, bloc④ ══════════ */
.b-shelf{grid-area:shelf;}
.shelf-vide{flex:1;display:flex;align-items:center;justify-content:center;padding:14px;}
.carousel{flex:1;min-height:0;padding:10px 16px;display:flex;align-items:center;justify-content:flex-start;gap:12px;overflow-x:auto;scrollbar-width:thin;}
.trip{flex-shrink:0;width:96px;border-radius:var(--r);overflow:hidden;cursor:pointer;
  border:1px solid var(--gold-a20);transition:transform .2s,opacity .2s,border-color .2s;opacity:.65;}
.trip:hover{opacity:.9;}
.trip.mid{width:126px;opacity:1;border-color:var(--gold);box-shadow:0 10px 24px rgba(0,0,0,.4);transform:translateY(-3px);}
.trip .ph2{height:64px;background:linear-gradient(135deg,var(--gold-a20),var(--gold-a35));background-size:cover;background-position:center;
  display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--gold-text);}
.trip.mid .ph2{height:86px;font-size:26px;}
.trip .in{padding:6px 7px;background:var(--surface);}
.trip .in .y{font-size:9.5px;font-weight:700;letter-spacing:.8px;color:var(--gold-text);text-transform:uppercase;}
.trip .in .n{font-family:var(--font-title);font-size:11px;font-weight:600;line-height:1.15;margin-top:1px;color:var(--ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.trip.new .ph2{opacity:.7;}
.trip.new .n{color:var(--gold-text);}

/* ══════════ CARRÉ AMBIANCE (bas-droite) — à venir, bloc⑤ ══════════ */
.b-ambiance{grid-area:ambiance;position:relative;align-items:center;justify-content:center;display:flex;}
.amb-photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.1s ease;}
.amb-photo.on{opacity:1;}
.amb-label{position:absolute;left:9px;bottom:8px;z-index:5;font-size:10px;color:#fff;
  background:rgba(15,13,9,.55);padding:3px 8px;border-radius:var(--r-pill);letter-spacing:.3px;}

@media(max-width:820px){
  html,body{overflow:auto;}
  .stage{grid-template-columns:1fr;grid-template-areas:"main" "map" "shelf" "ambiance";height:auto;}
}
</style>
</head>
<body>
<div class="stage">

  <!-- ══════════ ÉCRAN PRINCIPAL (2/3) ══════════ -->
  <div class="blk b-main">
    <div class="bh"><span class="ic">🌅</span><h3 id="souv-titre">Souvenir</h3></div>
    <div class="main-body" id="souv-main">
      <div class="etat-vide"><span class="ic">⏳</span><div class="t">Chargement…</div></div>
    </div>
  </div>

  <!-- ══════════ CARTE À TAGS (1/3) ══════════ -->
  <div class="blk b-map">
    <div class="bh"><span class="ic">🗺️</span><h3>Les images qui restent</h3></div>

</div>

<!-- champ fichier caché pour l'envoi de photo -->
<input type="file" id="souv-photo-file" accept="image/*" style="display:none" onchange="souvPhotoChoisie(this)">

<!-- Supabase + garde d'authentification (même socle que les autres pages) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const {createClient}=supabase;
const sb=createClient(RNR_SURL,RNR_SKEY);
let VOYAGE_ID=null, GROUPE_ID=null, MON_MEMBRE_ID=null;
let MEMBRES=[];
let RB_INFO={nom:'',date_debut:null,date_fin_envisagee:null,destination_libre:'',souvenir_valide_par:null,souvenir_valide_le:null};
let PHOTOS=[];
let CANAL_PHOTOS=null;
let ITINERAIRE=[]; // pour le montage bloc③ : uid, ordre, rattache + tous les champs de la fiche (lieux.*)
let LEADERS=new Set();
let TOUS_VOYAGES=[]; // pour le tourniquet + la carte à tags (bloc④), toujours de vraies données

function esc(t){ const d=document.createElement('div'); d.textContent=(t==null?'':t); return d.innerHTML; }
function fmtDateCourt(d){
  try{ return new Intl.DateTimeFormat('fr-FR',{day:'numeric',month:'long'}).format(d); }
  catch(e){ return ''; }
}
function fmtRelatif(iso){
  const d=new Date(iso); const diffMs=Date.now()-d.getTime();
  const min=Math.floor(diffMs/60000);
  if(min<1) return 'à l\'instant';
  if(min<60) return min+' min';
  const h=Math.floor(min/60);
  if(h<24) return h===1?'il y a 1 h':'il y a '+h+' h';
  const j=Math.floor(h/24);
  return j===1?'hier':'il y a '+j+' j';
}

async function resoutVoyageId(userId){
  let sess=null;
  try{ sess=sessionStorage.getItem('rnr_voyage_id'); }catch(e){}
  const {data:mem}=await sb.from('membres').select('id,groupe_id').eq('user_id',userId).limit(1).single();
  if(mem){ MON_MEMBRE_ID=mem.id; GROUPE_ID=mem.groupe_id; }
  if(sess){ VOYAGE_ID=sess; return; }
  if(!mem) return;
  const {data:vs}=await sb.from('voyages').select('id,est_principal,created_at').eq('groupe_id',mem.groupe_id).order('created_at',{ascending:true});
  const liste=vs||[]; const actif=liste.find(v=>v.est_principal)||liste[0];
  VOYAGE_ID=actif?actif.id:null;
}

// même patron que Cahier/Roadbook — un seul sélecteur de voyage, dans la barre (chrome.js)
async function chargeSelecteurChrome(){
  if(!GROUPE_ID) return;
  try{
    const {data:vs}=await sb.from('voyages').select('id,nom,est_principal,created_at').eq('groupe_id',GROUPE_ID).order('created_at',{ascending:true});
    const liste=vs||[];
    if(!liste.length) return;
    const actif=liste.find(v=>v.id===VOYAGE_ID)||liste.find(v=>v.est_principal)||liste[0];
    if(window.rnrChrome && rnrChrome.setVoyage){
      rnrChrome.setVoyage(actif.nom, liste, function(id){
        if(id==='__new__'){ window.location.href='home.html?nouveau=1'; return; }
        try{ sessionStorage.setItem('rnr_voyage_id',id); const v=liste.find(x=>x.id===id); if(v) sessionStorage.setItem('rnr_voyage_nom',v.nom); }catch(e){}
        window.location.reload();
      });
    }
  }catch(e){ console.warn('Souvenir: sélecteur de voyage', e); }
}

async function chargerInfosVoyage(){
  if(!VOYAGE_ID) return;
  try{
    const {data}=await sb.from('voyages').select('nom,date_debut,date_fin_envisagee,destination_libre,souvenir_valide_par,souvenir_valide_le').eq('id',VOYAGE_ID).single();
    if(data) RB_INFO=data;
  }catch(e){ console.warn('Souvenir: infos voyage', e); }
}

async function chargerMembres(){
  if(!GROUPE_ID) return;
  try{
    const {data}=await sb.from('membres').select('id,pseudo,prenom,avatar,photo_url').eq('groupe_id',GROUPE_ID);
    MEMBRES=data||[];
  }catch(e){ console.warn('Souvenir: membres', e); }
}

// Même source que le Cahier (voyage_itineraire + lieux) — le montage range
// une photo brute sur une VRAIE étape du voyage, jamais une liste inventée.
async function chargerItineraire(){
  if(!VOYAGE_ID){ ITINERAIRE=[]; return; }
  try{
    const {data:rows}=await sb.from('voyage_itineraire').select('uid,lieu_id,ordre,rattache_a_nuit_uid').eq('voyage_id',VOYAGE_ID).order('ordre',{ascending:true});
    const ids=[...new Set((rows||[]).map(r=>r.lieu_id))];
    let infos={};
    if(ids.length){
      const {data:fs}=await sb.from('lieux').select('*').in('id',ids);
      (fs||[]).forEach(f=>{ infos[f.id]=f; });
    }
    ITINERAIRE=(rows||[]).map(r=>{
      const f=infos[r.lieu_id]; if(!f) return null;
      return Object.assign({}, f, {uid:r.uid, ordre:r.ordre, rattache:r.rattache_a_nuit_uid||null});
    }).filter(Boolean);
  }catch(e){ console.warn('Souvenir: itinéraire', e); ITINERAIRE=[]; }
}
async function chargerLeaders(){
  if(!VOYAGE_ID){ LEADERS=new Set(); return; }
  try{
    const {data}=await sb.from('voyage_leaders').select('membre_id').eq('voyage_id',VOYAGE_ID);
    LEADERS=new Set((data||[]).map(r=>r.membre_id));
  }catch(e){ console.warn('Souvenir: leaders', e); }
}

// Tourniquet + carte à tags (bloc④) : les VRAIS voyages du groupe, jamais une
// liste inventée. Couverture = la première photo Souvenir de ce voyage (si
// la collecte a déjà commencé) ; position sur la carte = centroïde des vraies
// coordonnées de son itinéraire (même source que la carto régionale du site).
async function chargerTourniquetEtCarte(){
  if(!GROUPE_ID){ TOUS_VOYAGES=[]; return; }
  try{
    const {data:vs}=await sb.from('voyages').select('id,nom,date_debut,date_fin_envisagee,est_principal,created_at').eq('groupe_id',GROUPE_ID).order('created_at',{ascending:true});
    TOUS_VOYAGES=vs||[];
    if(!TOUS_VOYAGES.length) return;
    const ids=TOUS_VOYAGES.map(v=>v.id);
    const [itinsRes, photosRes]=await Promise.all([
      sb.from('voyage_itineraire').select('voyage_id,lieu_id').in('voyage_id',ids),
      sb.from('voyage_photos').select('voyage_id,url,created_at').in('voyage_id',ids).order('created_at',{ascending:true})
    ]);
    const itins=itinsRes.data||[], photos=photosRes.data||[];
    const lieuIds=[...new Set(itins.map(r=>r.lieu_id))];
    let lieuxMap={};
    if(lieuIds.length){
      const {data:ls}=await sb.from('lieux').select('id,lat,lng').in('id',lieuIds);
      (ls||[]).forEach(l=>{ lieuxMap[l.id]=l; });
    }
    TOUS_VOYAGES.forEach(v=>{
      const pts=itins.filter(r=>r.voyage_id===v.id).map(r=>lieuxMap[r.lieu_id]).filter(l=>l&&l.lat!=null&&l.lng!=null);
      if(pts.length){
        v._lat=pts.reduce((s,p)=>s+Number(p.lat),0)/pts.length;
        v._lng=pts.reduce((s,p)=>s+Number(p.lng),0)/pts.length;
      }
      const cov=photos.find(p=>p.voyage_id===v.id);
      v._cover=cov?cov.url:null;
      const d=v.date_debut||v.created_at;
      v._annee=d?new Date(d).getFullYear():'';
    });
  }catch(e){ console.warn('Souvenir: tourniquet/carte', e); TOUS_VOYAGES=[]; }
}

// Carré d'ambiance (bloc⑤, le plus cosmétique) : un vrai fondu entre de
// vraies photos du groupe (tous voyages confondus, pas seulement celui
// affiché) — jamais d'image inventée. Si le groupe n'a encore aucune photo
// Souvenir nulle part, état honnête plutôt qu'un décor vide qui fait semblant.
let AMBIANCE_PHOTOS=[];
let AMBIANCE_TIMER=null;
async function chargerAmbiance(){
  if(!TOUS_VOYAGES.length){ AMBIANCE_PHOTOS=[]; return; }
  try{
    const ids=TOUS_VOYAGES.map(v=>v.id);
    const {data}=await sb.from('voyage_photos').select('url').in('voyage_id',ids).order('created_at',{ascending:false}).limit(30);
    const urls=[...new Set((data||[]).map(p=>p.url))];
    // mélange léger (Fisher-Yates) puis on garde un petit lot pour le défilement
    for(let i=urls.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [urls[i],urls[j]]=[urls[j],urls[i]]; }
    AMBIANCE_PHOTOS=urls.slice(0,6);
  }catch(e){ console.warn('Souvenir: ambiance', e); AMBIANCE_PHOTOS=[]; }
}
function renderAmbiance(){
  const wrap=document.getElementById('souv-ambiance-wrap'); if(!wrap) return;
  if(AMBIANCE_TIMER){ clearInterval(AMBIANCE_TIMER); AMBIANCE_TIMER=null; }
  if(!AMBIANCE_PHOTOS.length){
    wrap.innerHTML='<div class="a-venir"><span class="ic">✨</span>Les premières photos du groupe<br>animeront ce coin-là.</div>';
    return;
  }
  wrap.innerHTML='<div class="amb-photo on" id="souv-amb-a"></div><div class="amb-photo" id="souv-amb-b"></div>'+
    '<div class="amb-label">✨ souvenirs en vrac</div>';
  let idx=0, surA=true;
  const elA=document.getElementById('souv-amb-a'), elB=document.getElementById('souv-amb-b');
  elA.style.backgroundImage="url('"+AMBIANCE_PHOTOS[0].replace(/'/g,'')+"')";
  if(AMBIANCE_PHOTOS.length<2) return; // une seule photo : rien à faire défiler
  AMBIANCE_TIMER=setInterval(()=>{
    idx=(idx+1)%AMBIANCE_PHOTOS.length;
    const montant = surA?elB:elA, descendant = surA?elA:elB;
    montant.style.backgroundImage="url('"+AMBIANCE_PHOTOS[idx].replace(/'/g,'')+"')";
    montant.classList.add('on'); descendant.classList.remove('on');
    surA=!surA;
  }, 4000);
}

// Positionnement approximatif sur un cadre France (pas un vrai Leaflet ici —
// c'est un accès rapide décoratif, pas un outil de mesure ; le vrai routage/
// la vraie carto restent exclusivement dans Horizon/Roadbook, ORS + maille
// 22 régions, jamais remplacés par cette approximation).
function renderCarteTags(){
  const wrap=document.getElementById('souv-map-wrap'); if(!wrap) return;
  const avecGeo=TOUS_VOYAGES.filter(v=>v._lat!=null&&v._lng!=null);
  if(!avecGeo.length){
    wrap.innerHTML='<div class="a-venir"><span class="ic">🗺️</span>Les tags apparaîtront ici<br>dès qu\'un voyage aura un itinéraire.</div>';
    return;
  }
  const latMin=41, latMax=51.5, lngMin=-5, lngMax=9.6;
  wrap.innerHTML = avecGeo.map(v=>{
    const top=Math.min(92,Math.max(5, (latMax-v._lat)/(latMax-latMin)*100));
    const left=Math.min(92,Math.max(5, (v._lng-lngMin)/(lngMax-lngMin)*100));
    const actif = v.id===VOYAGE_ID ? ' actif' : '';
    return '<div class="map-tag'+actif+'" style="top:'+top.toFixed(1)+'%;left:'+left.toFixed(1)+'%;" onclick="souvSwitchVoyage(\''+v.id+'\')">'+
      '<span class="dot"></span>'+esc(v.nom||'—')+' \''+String(v._annee).slice(-2)+'</div>';
  }).join('');
}

function nomEnvoyeur(membreId){
  const m=MEMBRES.find(x=>x.id===membreId);
  return window.rnrNomMembre ? window.rnrNomMembre(m||null, null) : (m?(m.pseudo||m.prenom):'Un membre') || 'Un membre';
}

// Fenêtre de collecte (B114) : date_debut-7j -> date_fin_envisagee+15j.
// Les deux dates du voyage restent facultatives (voyage.html) — si l'une
// manque, Souvenir ne bloque rien, il explique juste calmement l'état.
function calculeFenetre(){
  if(!RB_INFO.date_debut || !RB_INFO.date_fin_envisagee) return null;
  const debut=new Date(RB_INFO.date_debut+'T00:00:00');
  const fin=new Date(RB_INFO.date_fin_envisagee+'T00:00:00');
  if(isNaN(debut)||isNaN(fin)) return null;
  const ouverture=new Date(debut); ouverture.setDate(ouverture.getDate()-7);
  const fermeture=new Date(fin); fermeture.setDate(fermeture.getDate()+15);
  return {ouverture, fermeture};
}
function etatSouvenir(){
  const fen=calculeFenetre();
  if(!fen) return 'dates_manquantes';
  const now=new Date();
  if(now<fen.ouverture) return 'avant_fenetre';
  if(now>fen.fermeture) return 'apres_fenetre';
  return 'live';
}

async function chargerPhotos(){
  if(!VOYAGE_ID) return;
  try{
    const {data}=await sb.from('voyage_photos').select('id,membre_id,url,created_at').eq('voyage_id',VOYAGE_ID).order('created_at',{ascending:false});
    PHOTOS=data||[];
  }catch(e){ console.warn('Souvenir: photos', e); PHOTOS=[]; }
}

function abonnerRealtime(){
  if(CANAL_PHOTOS){ try{ sb.removeChannel(CANAL_PHOTOS); }catch(e){} CANAL_PHOTOS=null; }
  if(!VOYAGE_ID) return;
  let t=null;
  CANAL_PHOTOS = sb.channel('souv-photos:'+VOYAGE_ID)
    .on('postgres_changes',
      {event:'*', schema:'public', table:'voyage_photos', filter:'voyage_id=eq.'+VOYAGE_ID},
      function(){ if(t) clearTimeout(t); t=setTimeout(async function(){ await chargerPhotos(); renderMain(); }, 150); })
    .subscribe();
}

function souvEnvoyerClic(){ document.getElementById('souv-photo-file').click(); }
window.souvEnvoyerClic = souvEnvoyerClic;

// Même moulinette que partout ailleurs sur le site (redimension canvas, retrait
// EXIF au passage — obligation S9) mais en plus grande taille : c'est une
// galerie souvenir destinée à être regardée/imprimée, pas un avatar.
function souvPhotoChoisie(input){
  const f=input.files&&input.files[0]; input.value='';
  if(!f) return;
  if(!/^image\//.test(f.type)){ alert('Ce fichier n\'est pas une image.'); return; }
  const btn=document.getElementById('souv-btn-envoi');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Envoi…'; }
  const img=new Image(); const url=URL.createObjectURL(f);
  img.onload=()=>{
    URL.revokeObjectURL(url);
    const MAX=1600; let w=img.width,h=img.height;
    if(w>h){ if(w>MAX){ h=Math.round(h*MAX/w); w=MAX; } } else { if(h>MAX){ w=Math.round(w*MAX/h); h=MAX; } }
    const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    cv.toBlob(async(blob)=>{
      if(!blob){ if(btn){btn.disabled=false;btn.textContent='📤 Envoyer une photo';} return; }
      try{
        const chemin=VOYAGE_ID+'/'+Date.now()+'-'+(MON_MEMBRE_ID||'x').slice(0,8)+'.jpg';
        const up=await sb.storage.from('photos-souvenir').upload(chemin, blob, {contentType:'image/jpeg', upsert:true});
        if(up.error) throw up.error;
        const pub=sb.storage.from('photos-souvenir').getPublicUrl(chemin);
        const publicUrl=pub&&pub.data&&pub.data.publicUrl;
        if(!publicUrl) throw new Error('URL publique introuvable');
        const ins=await sb.from('voyage_photos').insert({voyage_id:VOYAGE_ID, groupe_id:GROUPE_ID, membre_id:MON_MEMBRE_ID, url:publicUrl});
        if(ins.error) throw ins.error;
        await chargerPhotos(); renderMain();
      }catch(e){
        console.warn('Souvenir: envoi photo', e);
        alert('La photo n\'a pas pu être envoyée : '+(e&&e.message?e.message:String(e)));
      }finally{
        if(btn){ btn.disabled=false; btn.textContent='📤 Envoyer une photo'; }
      }
    }, 'image/jpeg', 0.85);
  };
  img.onerror=()=>{ URL.revokeObjectURL(url); if(btn){btn.disabled=false;btn.textContent='📤 Envoyer une photo';} };
  img.src=url;
}
window.souvPhotoChoisie = souvPhotoChoisie;

function optionsItineraireHtml(selectedUid){
  let n=0;
  return '<option value="">— choisir une étape —</option>' + ITINERAIRE.map(it=>{
    if(!it.rattache) n++;
    const label = (it.rattache?'↳ ':'') + (it.rattache?'':(n+'. ')) + (it.nom||'—');
    return '<option value="'+esc(it.uid)+'"'+(it.uid===selectedUid?' selected':'')+'>'+esc(label)+'</option>';

async function souvRangerPhoto(photoId){
  const row=document.getElementById('tri-'+photoId); if(!row) return;
  const uid=row.querySelector('.tri-select').value;
  const legende=row.querySelector('.tri-legende').value.trim();
  if(!uid){ alert('Choisis une étape avant de ranger cette photo.'); return; }
  try{
    const up=await sb.from('voyage_photos').update({etape_uid:uid, legende:legende||null}).eq('id',photoId);
    if(up.error) throw up.error;
    await chargerPhotos(); renderMain();
  }catch(e){
    console.warn('Souvenir: rangement photo', e);
    alert('Le rangement n\'a pas pu être enregistré : '+(e&&e.message?e.message:String(e)));
  }
}
window.souvRangerPhoto = souvRangerPhoto;

async function souvValider(){
  if(!VOYAGE_ID||!MON_MEMBRE_ID) return;
  try{
    const up=await sb.from('voyages').update({souvenir_valide_par:MON_MEMBRE_ID, souvenir_valide_le:new Date().toISOString()}).eq('id',VOYAGE_ID);
    if(up.error) throw up.error;
    await chargerInfosVoyage(); renderMain();
  }catch(e){

    alert('La validation n\'a pas pu être enregistrée : '+(e&&e.message?e.message:String(e)));
  }
}
window.souvValider = souvValider;

// Le montage : les photos déjà rangées se regroupent par étape et se rendent
// via le MÊME moteur que le Cahier (RNR_FICHE_COMPLETE) — la fiche réelle du
// lieu, dont on remplace juste la galerie par les vraies photos du voyage et
// la citation par la légende posée par le groupe. Un seul moteur, jamais une
// redite (B114/Q4).
function renderMontage(){
  const aRanger = PHOTOS.filter(p=>!p.etape_uid);
  const rangees = PHOTOS.filter(p=>p.etape_uid);
  const parEtape = {};
  rangees.forEach(p=>{ (parEtape[p.etape_uid] = parEtape[p.etape_uid]||[]).push(p); });

  let html = '<div class="montage-wrap">';

  if(aRanger.length){
    html += '<div class="montage-h">📥 À ranger ('+aRanger.length+')</div>';
    html += aRanger.map(p=>{
      return '<div class="tri-item" id="tri-'+p.id+'">'+
        '<div class="tri-th" style="background-image:url(\''+String(p.url).replace(/'/g,'')+'\')"></div>'+
        '<div class="tri-meta">'+esc(nomEnvoyeur(p.membre_id))+'<br>'+esc(fmtRelatif(p.created_at))+'</div>'+
        '<select class="tri-select">'+optionsItineraireHtml(null)+'</select>'+
        '<input type="text" class="tri-legende" placeholder="Petite légende (optionnel)">'+
        '<button onclick="souvRangerPhoto(\''+p.id+'\')">Ranger</button>'+
      '</div>';
    }).join('');
  }

  const uidsOrdonnes = ITINERAIRE.map(it=>it.uid).filter(uid=>parEtape[uid]);
  if(uidsOrdonnes.length){
    html += '<div class="montage-h">📖 L\'album ('+uidsOrdonnes.length+' étape'+(uidsOrdonnes.length>1?'s':'')+')</div>';
    html += uidsOrdonnes.map(uid=>{
      const item=ITINERAIRE.find(it=>it.uid===uid);
      const photosEtape=parEtape[uid];
      const legendes=[...new Set(photosEtape.map(p=>p.legende).filter(Boolean))];
      const synthetique=Object.assign({}, item, {
        photo_url: photosEtape[0].url,
        photos_urls: photosEtape.slice(1).map(p=>p.url),
        commentaire: legendes.join(' — ') || item.commentaire || ''
      });
      const contenu = window.RNR_FICHE_COMPLETE ? RNR_FICHE_COMPLETE.html(synthetique, {galerieGrande:true}) : '';
      return '<div class="montage-card">'+contenu+'</div>';
    }).join('');
  }

  if(!aRanger.length && !uidsOrdonnes.length){
    html += '<div class="live-vide">Aucune photo n\'a été envoyée pendant la fenêtre de collecte.</div>';
  }

  html += '</div>';

  const estLeader = MON_MEMBRE_ID && LEADERS.has(MON_MEMBRE_ID);
  if(RB_INFO.souvenir_valide_par){
    html += '<div class="montage-valid-bar"><span class="montage-badge">✓ Validé par '+esc(nomEnvoyeur(RB_INFO.souvenir_valide_par))+'</span>'+
      '<span class="montage-valid-txt">Toujours modifiable — ranger une nouvelle photo ne retire pas la validation.</span></div>';
  } else if(estLeader && uidsOrdonnes.length){
    html += '<div class="montage-valid-bar"><span class="montage-valid-txt">Le montage peut continuer même après validation.</span>'+
      '<button class="montage-valid-btn" onclick="souvValider()">Valider le Cahier Souvenir</button></div>';
  } else if(uidsOrdonnes.length){
    html += '<div class="montage-valid-bar"><span class="montage-valid-txt">Seul un leader du voyage peut valider le Cahier Souvenir.</span></div>';
  }

  return html;
}

function renderMain(){
  const el=document.getElementById('souv-main');
  const titre=document.getElementById('souv-titre');
  titre.textContent = RB_INFO.nom ? 'Souvenir — '+RB_INFO.nom : 'Souvenir';
  const etat=etatSouvenir();

  if(etat==='dates_manquantes'){
    el.innerHTML = '<div class="etat-vide"><span class="ic">🗓️</span>'+
      '<div class="t">Pas encore de dates pour ce voyage</div>'+
      '<div class="s">Souvenir s\'active automatiquement une fois les dates de départ et de retour renseignées — ça reste facultatif, mais c\'est ce qui ouvre la fenêtre de collecte des photos.</div>'+
      '<a class="lien" href="voyage.html">Renseigner les dates →</a></div>';
    return;
  }
  if(etat==='avant_fenetre'){
    const fen=calculeFenetre();
    el.innerHTML = '<div class="etat-vide"><span class="ic">⏳</span>'+
      '<div class="t">La collecte de photos n\'a pas encore commencé</div>'+
      '<div class="s">Elle s\'ouvrira le '+esc(fmtDateCourt(fen.ouverture))+', une semaine avant le départ.</div></div>';
    return;
  }
  if(etat==='apres_fenetre'){
    el.innerHTML = renderMontage();
    return;
  }

  // mode live
  const fen=calculeFenetre();
  let html = '<div class="live-band"><span class="live-dot"></span>'+
    '<span class="lb-t">'+esc(RB_INFO.nom||'Ce voyage')+' — en ce moment</span>'+
    '<span class="lb-s">'+esc(fmtDateCourt(fen.ouverture))+' → '+esc(fmtDateCourt(fen.fermeture))+'</span></div>'+
    '<div class="live-send"><button id="souv-btn-envoi" onclick="souvEnvoyerClic()">📤 Envoyer une photo</button></div>';
  if(!PHOTOS.length){
    html += '<div class="live-vide">Personne n\'a encore envoyé de photo — sois le premier !</div>';
  } else {
    html += '<div class="live-grid">'+PHOTOS.map(p=>{
      return '<div class="ph" style="background-image:url(\''+String(p.url).replace(/'/g,'')+'\')"><div class="meta"><b>'+esc(nomEnvoyeur(p.membre_id))+'</b>'+esc(fmtRelatif(p.created_at))+'</div></div>';
    }).join('')+'</div>';
    html += '<div class="live-note">Nom de l\'envoyeur + date — le montage rangera tout après.</div>';
  }
  el.innerHTML = html;
}
