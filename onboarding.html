<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RockNRoad · Mon Profil Groupe</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--sb:215px;--gold:#C8A84B;--dark:#161410;--creme:#F5EFE0;--green:#2C5016;}
body{font-family:'Inter',sans-serif;background:var(--creme);min-height:100vh;display:flex;}

/* ── AUTH ── */
#auth-check{position:fixed;inset:0;z-index:9999;background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;}
#auth-check h2{font-family:'Playfair Display',serif;font-size:24px;margin:14px 0 4px;}
.spinner{width:32px;height:32px;border:3px solid rgba(200,168,75,.3);border-top-color:var(--gold);
  border-radius:50%;animation:spin 1s linear infinite;margin:16px auto 0;}
@keyframes spin{to{transform:rotate(360deg)}}


/* ── HERO MAP ── */
#hero{
  grid-row:1;grid-column:2;
  position:relative;overflow:hidden;
}
#hero-bg{
  position:absolute;inset:0;
  background:
    url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=80') center/cover no-repeat;
  transform:scale(1.05);
  animation:slowzoom 30s ease-in-out infinite alternate;
}
@keyframes slowzoom{from{transform:scale(1.05);}to{transform:scale(1.12);}}
#hero-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(to right, rgba(15,13,9,.5) 0%, rgba(15,13,9,.1) 50%, rgba(15,13,9,.6) 100%),
    linear-gradient(to bottom, rgba(15,13,9,.3) 0%, transparent 40%, rgba(15,13,9,.4) 100%);
}

/* Header */
#hero-header{
  position:absolute;top:0;left:0;right:0;
  padding:24px 28px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:3;
}
.hero-greeting h1{
  font-family:'Playfair Display',serif;
  font-size:32px;font-weight:700;color:white;line-height:1.1;
}
.hero-greeting p{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-style:italic;color:var(--cream-dim);margin-top:4px;
}
.hero-actions{display:flex;align-items:center;gap:12px;}
.avatars{display:flex;}
.avatar{width:34px;height:34px;border-radius:50%;border:2px solid rgba(200,168,75,.6);overflow:hidden;margin-left:-8px;background:var(--dark-3);}
.avatar:first-child{margin-left:0;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.btn-share{
  padding:9px 18px;background:var(--gold);color:var(--dark);
  border:none;border-radius:20px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.5px;
  display:flex;align-items:center;gap:7px;transition:all .2s;
  white-space:nowrap;
}
.btn-share:hover{background:var(--gold-light);transform:translateY(-1px);}

/* SVG Route */
#route-svg{position:absolute;inset:0;z-index:2;pointer-events:none;}

/* Markers */
.marker{
  position:absolute;z-index:3;
  display:flex;align-items:center;gap:8px;
  transform:translate(-50%,-50%);
  cursor:pointer;
}
.marker-circle{
  width:32px;height:32px;border-radius:50%;
  background:var(--dark-2);border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:13px;font-weight:700;
  color:var(--gold);flex-shrink:0;
  box-shadow:0 0 20px rgba(200,168,75,.3);
  transition:all .25s;
}
.marker:hover .marker-circle{background:var(--gold);color:var(--dark);transform:scale(1.15);}
.marker.active .marker-circle{background:var(--gold);color:var(--dark);box-shadow:0 0 30px rgba(200,168,75,.5);}
.marker-label{
  font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;
  color:white;text-shadow:0 1px 8px rgba(0,0,0,.8);white-space:nowrap;
}
.marker-sub{font-size:10px;color:var(--cream-dim);font-style:normal;display:block;}

/* Citation sur la carte */
#map-citation{
  position:absolute;left:28px;bottom:28px;z-index:3;
  max-width:220px;
}
#map-citation p{
  font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;
  color:rgba(245,239,224,.7);line-height:1.6;text-shadow:0 1px 8px rgba(0,0,0,.6);
}

/* ── RIGHT PANEL ── */
#panel{
  grid-row:1;grid-column:3;
  background:rgba(20,17,12,.88);
  border-left:1px solid rgba(200,168,75,.12);
  backdrop-filter:blur(24px);
  display:flex;flex-direction:column;
  overflow-y:auto;scrollbar-width:none;
}
#panel::-webkit-scrollbar{display:none;}

.panel-etape-header{
  padding:16px 20px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.panel-etape-label{
  font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);
  display:flex;align-items:center;gap:5px;
}
.panel-etape-label::before{content:'📍';font-size:10px;}
.panel-etape-dots{display:flex;gap:4px;}
.panel-dot{width:5px;height:5px;border-radius:50%;background:rgba(200,168,75,.2);}
.panel-dot.active{background:var(--gold);width:14px;border-radius:3px;}

.panel-photo{
  margin:14px 20px 0;border-radius:10px;overflow:hidden;
  height:170px;position:relative;flex-shrink:0;
}
.panel-photo-img{
  width:100%;height:100%;
  background:url('https://images.unsplash.com/photo-1510672981848-a1c4f1cb5ccf?w=700&q=80') center/cover;
}
.panel-photo-badge{
  position:absolute;top:10px;left:10px;
  background:rgba(15,13,9,.75);backdrop-filter:blur(8px);
  border:1px solid rgba(200,168,75,.25);
  padding:4px 10px;border-radius:20px;
  font-size:9px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--gold);
}

.panel-body{padding:14px 20px;flex:1;}
.panel-etape-num{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--gold);margin-bottom:3px;}
.panel-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:white;line-height:1.2;margin-bottom:8px;}
.panel-desc{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--cream-dim);line-height:1.6;margin-bottom:14px;}

.panel-meta{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.panel-meta-row{display:flex;align-items:center;gap:10px;}
.panel-meta-icon{width:20px;height:20px;opacity:.6;flex-shrink:0;}
.panel-meta-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(200,168,75,.6);min-width:70px;}
.panel-meta-val{font-size:12px;color:var(--cream-dim);}

.panel-weather{
  display:flex;gap:10px;margin-bottom:14px;
  padding:10px 14px;background:rgba(200,168,75,.05);
  border-radius:8px;border:1px solid rgba(200,168,75,.1);
}
.panel-weather-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--cream-dim);}
.panel-weather-item span{font-size:15px;}

.panel-journal{
  padding:12px 14px;background:rgba(200,168,75,.04);
  border-radius:8px;border:1px solid rgba(200,168,75,.08);
  margin-bottom:12px;
}
.panel-journal-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.panel-journal-text{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--cream-dim);line-height:1.6;}

.panel-photos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.panel-photo-thumb{border-radius:6px;overflow:hidden;aspect-ratio:4/3;}
.panel-photo-thumb div{width:100%;height:100%;background-size:cover!important;background-position:center!important;transition:transform .3s;}
.panel-photo-thumb:hover div{transform:scale(1.08);}

/* ── STATS BAR ── */
#stats-bar{
  grid-row:2;grid-column:2/4;
  background:rgba(10,8,5,.95);
  border-top:1px solid rgba(200,168,75,.1);
  display:flex;align-items:center;
  padding:0 28px;
  gap:0;
  position:relative;z-index:5;
}
.stats-quote{
  flex:1;
  font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;
  color:rgba(200,168,75,.5);line-height:1.4;padding-right:28px;
  border-right:1px solid rgba(200,168,75,.1);
}
.stats-items{display:flex;gap:0;flex:2;}
.stat-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 20px;border-right:1px solid rgba(200,168,75,.08);gap:3px;
}
.stat-item:last-child{border-right:none;}
.stat-icon{font-size:18px;opacity:.7;margin-bottom:2px;}
.stat-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);line-height:1;}
.stat-label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(200,168,75,.4);}
.stats-badge{
  width:58px;height:58px;border-radius:50%;
  border:1.5px solid rgba(200,168,75,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin-left:20px;flex-shrink:0;
}
.stats-badge-rnr{font-family:'Playfair Display',serif;font-size:13px;font-weight:900;color:var(--gold);letter-spacing:1px;}
.stats-badge-sub{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(200,168,75,.4);}

/* ── CARDS ITINÉRAIRE ── */
#itineraire{
  grid-row:3;grid-column:2/4;
  background:rgba(15,13,9,.97);
  border-top:1px solid rgba(200,168,75,.08);
  padding:14px 0;
  position:relative;z-index:5;
}
.itin-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;margin-bottom:12px;
}
.itin-title{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.itin-link{font-size:11px;color:rgba(200,168,75,.5);cursor:pointer;transition:color .2s;display:flex;align-items:center;gap:4px;}
.itin-link:hover{color:var(--gold);}

.itin-track{
  display:flex;gap:10px;padding:0 28px;
  overflow-x:auto;scrollbar-width:none;
  padding-bottom:4px;
}
.itin-track::-webkit-scrollbar{display:none;}

/* Timeline line */
.itin-timeline{
  position:absolute;bottom:24px;left:28px;right:28px;
  height:2px;background:rgba(200,168,75,.1);
}
.itin-progress{
  height:100%;background:linear-gradient(to right, var(--gold), rgba(200,168,75,.3));
  width:37%;border-radius:1px;
}
.itin-timeline-dots{
  position:absolute;top:50%;transform:translateY(-50%);
  width:100%;display:flex;justify-content:space-between;padding:0 0;
}
.itin-tdot{width:7px;height:7px;border-radius:50%;background:rgba(200,168,75,.2);border:1.5px solid rgba(200,168,75,.3);flex-shrink:0;}
.itin-tdot.done{background:var(--gold);border-color:var(--gold);}
.itin-tdot.active{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(200,168,75,.5);width:10px;height:10px;}

.card-stop{
  flex-shrink:0;width:140px;border-radius:10px;overflow:hidden;
  position:relative;cursor:pointer;transition:all .25s;
  border:2px solid transparent;height:100px;
}
.card-stop:hover{transform:translateY(-3px);border-color:rgba(200,168,75,.3);}
.card-stop.active{border-color:var(--gold);box-shadow:0 0 20px rgba(200,168,75,.25);}
.card-stop-bg{width:100%;height:100%;background-size:cover!important;background-position:center!important;position:relative;}
.card-stop-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(0,0,0,.65) 100%);}
.card-stop-jour{position:absolute;top:8px;left:9px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(200,168,75,.9);}
.card-stop-info{position:absolute;bottom:8px;left:9px;right:9px;}
.card-stop-city{font-size:13px;font-weight:700;color:white;line-height:1.1;}
.card-stop-region{font-size:9px;color:rgba(245,239,224,.6);margin-top:1px;}

/* Nav arrows */
.itin-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.2);
  color:var(--gold);width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;transition:all .2s;z-index:2;
}
.itin-nav:hover{background:rgba(200,168,75,.2);}
#itin-prev{left:4px;top:60px;}
#itin-next{right:368px;top:60px;}

/* ── ANIMATIONS ── */
@keyframes fadeup{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fadeup{animation:fadeup .6s ease forwards;}
.fadeup-2{animation:fadeup .6s .15s ease forwards;opacity:0;}
.fadeup-3{animation:fadeup .6s .3s ease forwards;opacity:0;}
.fadeup-4{animation:fadeup .6s .45s ease forwards;opacity:0;}

/* Route SVG animation */
.sb-user{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;background:rgba(255,255,255,.03);margin-bottom:6px;}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:#C8A84B;color:#0f0d09;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.sb-user-name{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.sb-user-role{font-size:9.5px;color:rgba(255,255,255,.4);margin-top:1px;}
.sb-logout{width:100%;padding:6px;background:rgba(200,168,75,.06);border:1px solid rgba(200,168,75,.2);color:rgba(200,168,75,.75);font-size:10px;font-weight:600;letter-spacing:1px;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.sb-logout:hover{background:rgba(200,168,75,.14);color:#C8A84B;}

/* ── MAIN ── */
#app-main{margin-left:var(--sb);width:calc(100vw - var(--sb));min-height:100vh;display:flex;flex-direction:column;}
#top-bar{background:rgba(22,20,16,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,168,75,.15);
  padding:0 28px;height:46px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.top-bar-title{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--gold);}

.inner{max-width:760px;margin:0 auto;padding:36px 32px 80px;width:100%;}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:36px;}
.page-title{font-family:'Playfair Display',serif;font-size:30px;color:#1a1208;margin-bottom:6px;}
.page-title em{color:var(--gold);font-style:italic;}
.page-sub{font-size:13px;color:#888;line-height:1.6;}

/* ── CARDS ── */
.cfg-card{background:white;border-radius:14px;padding:28px;box-shadow:0 2px 16px rgba(0,0,0,.06);
  margin-bottom:20px;border:1px solid rgba(0,0,0,.04);}
.cfg-card-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:#aaa;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #f0ece4;
  display:flex;align-items:center;gap:8px;}
.cfg-card-title span{font-size:16px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.fg{display:flex;flex-direction:column;gap:6px;}
.fg.full{grid-column:1/-1;}

label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:#666;margin-bottom:0;}
input[type=text],input[type=email],textarea,select{
  width:100%;padding:12px 14px;border:2px solid #E8DECE;border-radius:9px;
  font-family:'Inter',sans-serif;font-size:13px;color:#1a1208;background:white;
  transition:border-color .2s;outline:none;}
input[type=text]:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,168,75,.1);}
textarea{resize:vertical;min-height:80px;}

/* Géo status */
.geo-status{font-size:11px;margin-top:4px;min-height:16px;}
.geo-status.ok{color:var(--green);}
.geo-status.err{color:#cc4400;}
.geo-status.loading{color:#888;}

/* Types voyages */
.voyage-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px;}
.vtype{padding:7px 13px;border:2px solid #E8DECE;border-radius:20px;
  font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;
  color:#888;background:white;user-select:none;}
.vtype.on{border-color:var(--gold);background:rgba(200,168,75,.1);color:#7a5c10;}

/* Membres */
.membres-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.membre-row{display:flex;gap:8px;align-items:center;}
.membre-input{flex:1;padding:10px 12px;border:2px solid #E8DECE;border-radius:8px;
  font-family:'Inter',sans-serif;font-size:13px;color:#1a1208;outline:none;transition:border-color .2s;}
.membre-input:focus{border-color:var(--gold);}
.membre-del{width:32px;height:32px;background:none;border:1.5px solid #f0ece4;border-radius:7px;
  cursor:pointer;color:#ccc;font-size:14px;transition:all .15s;flex-shrink:0;}
.membre-del:hover{background:#fff0ee;border-color:#ffccc7;color:#cc4400;}
.add-membre-btn{display:flex;align-items:center;gap:6px;padding:9px 14px;background:#faf7f0;
  border:1.5px dashed #e0d8cc;border-radius:8px;font-size:12px;color:#888;cursor:pointer;
  transition:all .2s;font-family:'Inter',sans-serif;font-weight:500;}
.add-membre-btn:hover{border-color:var(--gold);color:#7a5c10;background:#fffbe8;}
.membre-limit-note{font-size:10.5px;color:#bbb;margin-top:8px;font-style:italic;
  background:#fafafa;border-radius:6px;padding:7px 10px;border:1px solid #f0ece4;}

/* Avatar */
.avatar-zone{display:flex;align-items:center;gap:16px;}
.avatar-preview{width:64px;height:64px;border-radius:50%;background:rgba(200,168,75,.1);
  border:2px solid rgba(200,168,75,.2);display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;overflow:hidden;}
.avatar-preview img{width:100%;height:100%;object-fit:cover;}
.avatar-upload{flex:1;padding:10px 14px;background:#faf7f0;border:1.5px dashed #c8b898;
  border-radius:9px;font-size:12px;color:#888;cursor:pointer;text-align:center;transition:all .2s;}
.avatar-upload:hover{border-color:var(--gold);color:#7a5c10;}

/* Save button */
.save-btn{width:100%;padding:14px;background:var(--dark);color:var(--gold);
  font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;border:none;border-radius:9px;cursor:pointer;transition:all .3s;}
.save-btn:hover{background:var(--gold);color:var(--dark);}
.save-btn:disabled{opacity:.5;cursor:not-allowed;}

.error-msg{background:#fff0ee;border:1px solid #ffccc7;border-radius:8px;
  padding:11px 14px;font-size:12px;color:#cc3300;margin-top:12px;display:none;}
.error-msg.show{display:block;}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:9px;
  font-size:13px;font-weight:600;z-index:1000;transform:translateY(80px);transition:transform .3s;}
.toast.show{transform:translateY(0);}
.toast.success{background:#2C5016;color:white;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.toast.error{background:#cc4400;color:white;}

@media(max-width:768px){
  #sidebar{transform:translateX(-100%);transition:transform .25s;}
  #sidebar.open{transform:translateX(0);}
  #app-main{margin-left:0;width:100%;}
  .form-grid{grid-template-columns:1fr;}
  .inner{padding:24px 16px 60px;}
}
/* ── SIDEBAR ── */
#sidebar{
  position:fixed;top:0;left:0;bottom:0;
  background:rgba(15,13,9,.95);
  border-right:1px solid rgba(200,168,75,.1);
  display:flex;flex-direction:column;
  padding:0;
  position:relative;z-index:10;
}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(200,168,75,.08);cursor:pointer;}
.sb-logo-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:white;line-height:1;}
.sb-logo-title span{color:var(--gold);}
.sb-logo-sub{font-size:7px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:rgba(200,168,75,.4);margin-top:3px;}
.sb-nav{flex:1;padding:12px 0;display:flex;flex-direction:column;gap:2px;overflow-y:auto;scrollbar-width:none;}
.sb-nav::-webkit-scrollbar{display:none;}

<script>
const SURL='https://cazqllstxhuecoqpktwm.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhenFsbHN0eGh1ZWNvcXBrdHdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTExNTQsImV4cCI6MjA5NDk2NzE1NH0.6YYAJXG4s-h78YUp2pd7fBvQJzDprSxtSkUZTv6ZtZs';
const {createClient}=supabase;
const sb=createClient(SURL,SKEY);

let currentUser=null, existingGroupeId=null, avatarFile=null;
let geoResult={lat:null,lng:null}, geoTimer=null;
let membres=[]; // [{nom:'Bruno'},{nom:'Marie'}]

// ── Auth & chargement ─────────────────────────────────────────────────────────
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  currentUser=session.user;
  document.getElementById('auth-check').style.display='none';
  const e=currentUser.email;
  const av=document.getElementById('sb-avatar');if(av)av.textContent=e.charAt(0).toUpperCase();
  const un=document.getElementById('sb-username');if(un)un.textContent=e.split('@')[0];

  // Types de voyages toggle
  document.querySelectorAll('.vtype').forEach(el=>el.addEventListener('click',()=>el.classList.toggle('on')));

  // Charger le profil existant
  const cached=sessionStorage.getItem('rnr_groupe');
  if(cached){ fillForm(JSON.parse(cached)); return; }
  const {data:membre}=await sb.from('membres').select('groupe_id, groupes(*)').eq('user_id',currentUser.id).single();
  if(membre?.groupes) fillForm(membre.groupes);
})();

function fillForm(g){
  existingGroupeId=g.id;
  document.getElementById('g-nom').value=g.nom||'';
  document.getElementById('g-adresse').value=g.adresse_depart||'';
  document.getElementById('g-description').value=g.description||'';
  document.getElementById('g-partage').checked=g.partage_public||false;
  const sbn=document.getElementById('sb-groupe-nom');if(sbn)sbn.textContent=g.nom||'Famille RockNRoad';
  if(g.lat_depart&&g.lng_depart){
    geoResult={lat:g.lat_depart,lng:g.lng_depart};
    const gs=document.getElementById('geo-status');
    gs.className='geo-status ok';
    gs.textContent='✅ '+g.adresse_depart;
  }
  if(g.type_voyages?.length){
    document.querySelectorAll('.vtype').forEach(el=>el.classList.toggle('on',g.type_voyages.includes(el.dataset.v)));
  }
  if(g.membres_noms?.length){ membres=g.membres_noms.map(n=>({nom:n})); }
  else { membres=[]; }
  renderMembres();
  if(g.avatar_url){
    const prev=document.getElementById('avatar-preview');
    prev.innerHTML=`<img src="${g.avatar_url}" alt="avatar">`;
  }
}

// ── Membres ───────────────────────────────────────────────────────────────────
function renderMembres(){
  const list=document.getElementById('membres-list');
  list.innerHTML=membres.map((m,i)=>`
    <div class="membre-row">
      <input class="membre-input" type="text" value="${m.nom||''}" placeholder="Prénom ou nom…"
        oninput="membres[${i}].nom=this.value">
      <button class="membre-del" onclick="removeMembre(${i})" title="Retirer">✕</button>
    </div>
  `).join('');
}
function addMembre(){
  membres.push({nom:''});
  renderMembres();
  // Focus le dernier input
  const inputs=document.querySelectorAll('.membre-input');
  if(inputs.length) inputs[inputs.length-1].focus();
}
function removeMembre(i){
  membres.splice(i,1);
  renderMembres();
}

// ── Géocodage ─────────────────────────────────────────────────────────────────
function scheduleGeocode(){
  clearTimeout(geoTimer);
  geoResult={lat:null,lng:null};
  const val=document.getElementById('g-adresse').value.trim();
  if(val.length<4){document.getElementById('geo-status').textContent='';return;}
  document.getElementById('geo-status').className='geo-status loading';
  document.getElementById('geo-status').textContent='📍 Recherche…';
  geoTimer=setTimeout(()=>geocodeAddress(val),700);
}
async function geocodeAddress(addr){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`,{headers:{'Accept-Language':'fr'}});
    const d=await r.json();
    if(d&&d.length>0){
      geoResult={lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
      document.getElementById('geo-status').className='geo-status ok';
      document.getElementById('geo-status').textContent='✅ '+d[0].display_name.split(',').slice(0,3).join(', ');
    } else {
      geoResult={lat:null,lng:null};
      document.getElementById('geo-status').className='geo-status err';
      document.getElementById('geo-status').textContent='⚠️ Adresse introuvable — vérifiez ou essayez une ville proche';
    }
  }catch(e){
    document.getElementById('geo-status').className='geo-status err';
    document.getElementById('geo-status').textContent='⚠️ Erreur réseau';
  }
}

// ── Avatar ────────────────────────────────────────────────────────────────────
function previewAvatar(input){
  if(!input.files||!input.files[0])return;
  avatarFile=input.files[0];
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('avatar-preview').innerHTML=`<img src="${e.target.result}" alt="avatar">`;
  };
  reader.readAsDataURL(avatarFile);
}

// ── Sauvegarde ────────────────────────────────────────────────────────────────
async function saveGroupe(){
  const btn=document.getElementById('save-btn');
  const nom=document.getElementById('g-nom').value.trim();
  const adresse=document.getElementById('g-adresse').value.trim();
  if(!nom||!adresse){
    showError('Le nom et l\'adresse de départ sont obligatoires.');return;
  }
  hideError();
  btn.disabled=true; btn.textContent='⏳ Enregistrement…';

  try{
    // Lire les champs depuis les inputs (les membres peuvent avoir été modifiés)
    const membreInputs=document.querySelectorAll('.membre-input');
    membreInputs.forEach((inp,i)=>{if(membres[i])membres[i].nom=inp.value;});
    const membresNoms=membres.map(m=>m.nom).filter(n=>n.trim());

    const types=[...document.querySelectorAll('.vtype.on')].map(el=>el.dataset.v);
    const partage=document.getElementById('g-partage').checked;
    const desc=document.getElementById('g-description').value.trim();

    let avatar_url=undefined;
    if(avatarFile){
      const ext=avatarFile.name.split('.').pop();
      const fname=`avatars/${currentUser.id}.${ext}`;
      const {error:ue}=await sb.storage.from('photos-lieux').upload(fname,avatarFile,{contentType:avatarFile.type,upsert:true});
      if(!ue){const {data:{publicUrl}}=sb.storage.from('photos-lieux').getPublicUrl(fname);avatar_url=publicUrl;}
    }

    const payload={
      nom, adresse_depart:adresse,
      lat_depart:geoResult.lat||null,
      lng_depart:geoResult.lng||null,
      type_voyages:types.length?types:null,
      description:desc||null,
      partage_public:partage,
      membres_noms:membresNoms.length?membresNoms:null,
      ...(avatar_url!==undefined?{avatar_url}:{})
    };

    let groupe;
    if(existingGroupeId){
      const {data,error}=await sb.from('groupes').update(payload).eq('id',existingGroupeId).select().single();
      if(error)throw error;
      groupe=data;
    } else {
      const {data,error}=await sb.from('groupes').insert(payload).select().single();
      if(error)throw error;
      groupe=data;
      await sb.from('membres').insert({user_id:currentUser.id,groupe_id:groupe.id,role:'admin'});
      existingGroupeId=groupe.id;
    }
    sessionStorage.setItem('rnr_groupe',JSON.stringify(groupe));
    showToast('✅ Profil enregistré !','success');
    const sbn=document.getElementById('sb-groupe-nom');if(sbn)sbn.textContent=groupe.nom;
  }catch(e){
    showError('Erreur : '+e.message);
  }finally{
    btn.disabled=false; btn.textContent='💾 Enregistrer le profil';
  }
}

function showError(msg){const el=document.getElementById('error-msg');el.textContent=msg;el.classList.add('show');}
function hideError(){document.getElementById('error-msg').classList.remove('show');}
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),2800);
}
async function logout(){await sb.auth.signOut();window.location.href='index.html';}
</script>
